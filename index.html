<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RS Team Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f4fa;--card:#fff;--bg2:#f5f7fb;--bg3:#eaeff7;
  --accent:#2878e8;--a2:#1a65d4;--green:#16b47a;--red:#e03a3a;--gold:#d4920a;--purple:#7c5ce8;
  --t1:#0f1f35;--t2:#4a6080;--t3:#8fa3be;
  --border:#e0e8f5;--r:12px;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh}
a{text-decoration:none}
input,textarea,select{font-family:'Inter',sans-serif}
button{cursor:pointer;font-family:'Inter',sans-serif}

/* ── TOPNAV ── */
#topnav{height:56px;background:#fff;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 1.5rem;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:9px}
.logo-mark{width:32px;height:32px;border-radius:9px;
  background:linear-gradient(135deg,var(--accent),#60c8ff);
  display:flex;align-items:center;justify-content:center;
  font-family:'Space Grotesk';font-size:13px;font-weight:800;color:#fff}
.logo-name{font-family:'Space Grotesk';font-size:15px;font-weight:700;color:var(--t1)}
.nav-right{display:flex;align-items:center;gap:8px}
.nav-icon-btn{width:36px;height:36px;border-radius:50%;border:none;background:none;
  font-size:18px;display:flex;align-items:center;justify-content:center;
  color:var(--t2);position:relative;transition:background .15s}
.nav-icon-btn:hover{background:var(--bg2)}
.nav-badge{position:absolute;top:1px;right:1px;width:16px;height:16px;
  background:var(--red);border-radius:50%;font-size:9px;font-weight:700;
  color:#fff;display:flex;align-items:center;justify-content:center;border:2px solid #fff}

/* ── PAGE SHELL ── */
#shell{display:flex;max-width:1180px;margin:0 auto;padding:1.25rem 1rem;gap:1.25rem;align-items:flex-start}

/* ── SIDEBAR ── */
#sidebar{width:230px;flex-shrink:0;position:sticky;top:68px}
.s-profile{display:flex;align-items:center;gap:10px;padding:1rem;
  background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  margin-bottom:.625rem;cursor:pointer}
.s-profile:hover{background:var(--bg2)}
.s-name{font-weight:600;font-size:14px}
.s-role{font-size:11px;color:var(--accent);margin-top:2px}
.s-nav{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:.5rem}
.s-btn{display:flex;align-items:center;gap:10px;width:100%;padding:9px 12px;
  border-radius:9px;border:none;background:none;font-size:13px;font-weight:500;
  color:var(--t2);text-align:left;transition:background .15s,color .15s}
.s-btn:hover{background:var(--bg2);color:var(--t1)}
.s-btn.on{background:rgba(40,120,232,.1);color:var(--accent);font-weight:600}
.s-btn-ico{width:18px;text-align:center;font-size:15px;flex-shrink:0}
.s-divider{border:none;border-top:1px solid var(--border);margin:.375rem 0}

/* ── MAIN ── */
#main{flex:1;min-width:0}

/* ── RIGHT ── */
#rightbar{width:270px;flex-shrink:0;position:sticky;top:68px;display:flex;flex-direction:column;gap:.875rem}

/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r)}
.card-pad{padding:1.25rem}

/* ── FEED ── */
.feed{display:flex;flex-direction:column;gap:.875rem}
.composer{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1rem}
.composer-row{display:flex;gap:10px;align-items:flex-start}
.composer-ta{flex:1;resize:none;border:1.5px solid var(--border);border-radius:9px;
  padding:9px 13px;font-size:14px;color:var(--t1);background:var(--bg2);outline:none;
  transition:border .15s;min-height:42px;line-height:1.5}
.composer-ta:focus{border-color:var(--accent);min-height:80px}
.composer-ta::placeholder{color:var(--t3)}
.composer-foot{display:flex;justify-content:space-between;align-items:center;margin-top:.75rem}
.post-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.post-head{display:flex;align-items:center;gap:10px;padding:.875rem .875rem .625rem}
.post-author{flex:1}
.post-name{font-weight:600;font-size:14px;cursor:pointer}
.post-name:hover{color:var(--accent)}
.post-meta{font-size:11px;color:var(--t3);margin-top:2px}
.post-text{padding:0 .875rem .75rem;font-size:14px;line-height:1.65;white-space:pre-wrap}
.post-img{width:100%;max-height:420px;object-fit:cover;display:block}
.post-foot{padding:.625rem .875rem;border-top:1px solid var(--border);display:flex;gap:.625rem}
.act-btn{display:flex;align-items:center;gap:5px;border:none;background:none;
  font-size:13px;color:var(--t3);padding:5px 10px;border-radius:8px;transition:all .15s}
.act-btn:hover{background:var(--bg2);color:var(--t1)}
.act-btn.liked{color:var(--red)}
.comments{padding:.5rem .875rem .875rem;border-top:1px solid var(--border);display:none}
.comments.open{display:block}
.comment{display:flex;gap:8px;margin-bottom:.5rem}
.comment-bubble{background:var(--bg2);border-radius:10px;padding:7px 11px;flex:1}
.comment-cname{font-size:12px;font-weight:600;margin-bottom:2px}
.comment-text{font-size:13px;color:var(--t2);line-height:1.5}
.comment-row{display:flex;gap:7px;align-items:center;margin-top:.5rem}
.comment-inp{flex:1;border:1.5px solid var(--border);border-radius:20px;
  padding:7px 13px;font-size:13px;outline:none;background:var(--bg2);color:var(--t1)}
.comment-inp:focus{border-color:var(--accent)}
.send-btn{width:30px;height:30px;border-radius:50%;border:none;
  background:var(--accent);color:#fff;font-size:13px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center}

/* ── BUTTONS ── */
.btn{padding:8px 20px;border-radius:9px;border:none;font-weight:600;font-size:13px;transition:all .15s}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--a2));color:#fff}
.btn-primary:hover{opacity:.9}
.btn-secondary{background:var(--bg2);border:1px solid var(--border);color:var(--t1)}
.btn-secondary:hover{background:var(--bg3)}
.btn-danger{background:none;border:1px solid rgba(224,58,58,.4);color:var(--red)}
.btn-danger:hover{background:rgba(224,58,58,.08)}

/* ── AVATAR ── */
.av{border-radius:50%;object-fit:cover;flex-shrink:0}
.av-ph{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}

/* ── PROFILE PAGE ── */
.profile-cover{height:150px;background:linear-gradient(135deg,#dbeafe,#ede9fe);
  border-radius:var(--r) var(--r) 0 0;position:relative;overflow:hidden}
.profile-cover img{width:100%;height:100%;object-fit:cover}
.profile-av-wrap{position:relative;display:inline-block;margin-top:-38px;margin-bottom:.75rem}
.profile-av-edit{position:absolute;bottom:2px;right:2px;width:24px;height:24px;
  background:var(--accent);border-radius:50%;border:2px solid #fff;
  display:flex;align-items:center;justify-content:center;font-size:11px;cursor:pointer}
.profile-stats{display:flex;gap:1.5rem;padding-top:.875rem;border-top:1px solid var(--border);margin-top:.875rem}
.pstat-n{font-family:'Space Grotesk';font-size:18px;font-weight:700;text-align:center}
.pstat-l{font-size:11px;color:var(--t3);text-align:center;margin-top:2px}

/* ── TEAM ── */
.team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:.875rem}
.team-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:1.25rem;text-align:center;cursor:pointer;transition:border-color .15s,box-shadow .15s}
.team-card:hover{border-color:var(--accent);box-shadow:0 4px 16px rgba(40,120,232,.1)}

/* ── CALENDAR ── */
.cal-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.cal-month-title{font-family:'Space Grotesk';font-size:20px;font-weight:700}
.cal-year{font-size:14px;color:var(--t3);margin-left:6px}
.cal-nav{display:flex;gap:6px;align-items:center}
.cal-nav-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);
  background:none;font-size:14px;color:var(--t2);transition:all .15s}
.cal-nav-btn:hover{border-color:var(--accent);color:var(--accent)}
.cal-today-btn{padding:5px 12px;border-radius:8px;border:1px solid var(--border);
  background:none;font-size:12px;font-weight:600;color:var(--t2);transition:all .15s}
.cal-today-btn:hover{border-color:var(--accent);color:var(--accent)}
.month-strip{display:flex;gap:4px;overflow-x:auto;margin-bottom:1rem;padding-bottom:2px;scrollbar-width:none}
.month-strip::-webkit-scrollbar{display:none}
.ms-btn{padding:6px 10px;border-radius:8px;border:1px solid var(--border);background:none;
  font-size:11px;font-weight:700;color:var(--t2);cursor:pointer;flex-shrink:0;
  transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:3px;min-width:50px}
.ms-btn:hover{border-color:var(--accent);color:var(--accent)}
.ms-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.ms-dots{display:flex;gap:2px}
.ms-dot{width:4px;height:4px;border-radius:50%}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-dh{text-align:center;font-size:11px;font-weight:600;color:var(--t3);padding:.5rem 0}
.cal-day{min-height:68px;border-radius:9px;padding:.375rem;cursor:pointer;
  background:var(--bg2);border:1.5px solid transparent;transition:all .15s;position:relative}
.cal-day:hover{background:var(--bg3);border-color:var(--border)}
.cal-day.other{opacity:.3;cursor:default}
.cal-day.other:hover{background:var(--bg2);border-color:transparent}
.cal-day.today{background:var(--accent);border-color:var(--accent)}
.cal-day.today .cal-dn{color:#fff;font-weight:800}
.cal-day.hol{background:rgba(212,146,10,.08);border-color:rgba(212,146,10,.2)}
.cal-day.myvac{background:rgba(40,120,232,.1);border-color:rgba(40,120,232,.25)}
.cal-day.sel{border-color:var(--accent);box-shadow:0 0 0 3px rgba(40,120,232,.15)}
.cal-dn{font-size:13px;font-weight:600;display:block}
.cal-hol-label{font-size:9px;color:var(--gold);display:block;margin-top:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cal-pips{display:flex;gap:2px;margin-top:3px;flex-wrap:wrap}
.cal-pip{width:6px;height:6px;border-radius:50%}
.cal-detail{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);
  padding:1.125rem;margin-bottom:1rem}
.cal-detail-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:.875rem}
.cal-detail-title{font-family:'Space Grotesk';font-size:15px;font-weight:700}
.cal-legend{display:flex;gap:1rem;margin-top:1rem;flex-wrap:wrap}
.cal-legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--t2)}
.cal-legend-dot{width:10px;height:10px;border-radius:3px}
.vac-row{background:var(--card);border:1px solid var(--border);border-radius:9px;
  padding:.625rem .875rem;margin-bottom:.5rem;display:flex;align-items:center;gap:10px}
.vac-dates{font-size:13px;font-weight:500;flex:1}
.vac-bar-wrap{height:6px;background:var(--bg3);border-radius:6px;overflow:hidden;margin-top:4px}
.vac-bar{height:100%;border-radius:6px}

/* ── MESSAGES ── */
.dm-layout{display:flex;gap:.875rem}
.dm-list{width:260px;flex-shrink:0;background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.dm-head{padding:.875rem 1rem;border-bottom:1px solid var(--border);font-weight:700;font-size:14px}
.dm-item{display:flex;align-items:center;gap:9px;padding:9px 14px;cursor:pointer;
  transition:background .15s;border-left:3px solid transparent}
.dm-item:hover{background:var(--bg2)}
.dm-item.active{background:rgba(40,120,232,.06);border-left-color:var(--accent)}
.dm-info{flex:1;min-width:0}
.dm-iname{font-size:13px;font-weight:600}
.dm-preview{font-size:11px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.dm-badge{background:var(--accent);color:#fff;border-radius:10px;padding:1px 7px;font-size:10px;font-weight:700}
.dm-chat{flex:1;background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  display:flex;flex-direction:column;min-height:460px}
.dm-chat-hdr{padding:.875rem 1rem;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:9px;flex-shrink:0}
.dm-msgs{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:.5rem}
.msg{display:flex;gap:7px;max-width:75%;align-items:flex-end}
.msg.me{align-self:flex-end;flex-direction:row-reverse}
.msg-meta{font-size:10px;color:var(--t3);margin-bottom:3px}
.msg.me .msg-meta{text-align:right}
.msg-bubble{background:var(--bg2);border:1px solid var(--border);border-radius:12px;
  padding:8px 12px;font-size:13px;line-height:1.5;word-break:break-word}
.msg.me .msg-bubble{background:rgba(40,120,232,.12);border-color:rgba(40,120,232,.2)}
.dm-inp-bar{padding:.75rem 1rem;border-top:1px solid var(--border);display:flex;gap:8px}
.dm-inp{flex:1;border:1.5px solid var(--border);border-radius:20px;padding:8px 14px;
  font-size:13px;outline:none;background:var(--bg2);color:var(--t1)}
.dm-inp:focus{border-color:var(--accent)}
.dm-send{width:34px;height:34px;border-radius:50%;border:none;background:var(--accent);
  color:#fff;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* ── FILES ── */
.fitem{background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:.875rem 1rem;margin-bottom:.5rem}
.fitem-top{display:flex;align-items:center;gap:10px}
.fitem-info{flex:1;min-width:0}
.fitem-name{font-size:13px;font-weight:600}
.fitem-meta{font-size:11px;color:var(--t3);margin-top:2px}
.fitem-btns{display:flex;gap:.5rem;margin-top:.625rem}
.flink{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:7px;
  font-size:12px;font-weight:600;text-decoration:none;transition:all .15s}
.flink-open{background:rgba(40,120,232,.1);color:var(--accent);border:1px solid rgba(40,120,232,.2)}
.flink-open:hover{background:rgba(40,120,232,.18)}
.flink-dl{background:rgba(22,180,122,.1);color:var(--green);border:1px solid rgba(22,180,122,.2)}
.flink-dl:hover{background:rgba(22,180,122,.18)}

/* ── KANBAN ── */
.kanban{display:grid;grid-template-columns:repeat(3,1fr);gap:.875rem}
.kb-col{background:var(--bg2);border-radius:var(--r);padding:.875rem}
.kb-col-head{font-family:'Space Grotesk';font-size:13px;font-weight:700;
  margin-bottom:.875rem;display:flex;align-items:center;gap:7px}
.kb-count{background:var(--bg3);border-radius:20px;padding:1px 8px;font-size:11px;font-weight:600;color:var(--t2)}
.kb-card{background:var(--card);border:1px solid var(--border);border-radius:9px;
  padding:.875rem;margin-bottom:.625rem}
.kb-card-title{font-size:13px;font-weight:600;margin-bottom:.375rem}
.kb-card-meta{font-size:11px;color:var(--t3);display:flex;align-items:center;gap:6px}
.kb-add{width:100%;background:none;border:1.5px dashed var(--border);border-radius:8px;
  padding:8px;color:var(--t3);font-size:13px;transition:all .15s}
.kb-add:hover{border-color:var(--accent);color:var(--accent)}

/* ── WIKI ── */
.wiki-item{background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:1rem 1.25rem;margin-bottom:.625rem;cursor:pointer;transition:border-color .15s}
.wiki-item:hover{border-color:var(--accent)}
.wiki-item-title{font-weight:600;font-size:14px;margin-bottom:3px}
.wiki-item-meta{font-size:11px;color:var(--t3)}
.wiki-item-preview{font-size:13px;color:var(--t2);margin-top:.375rem;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wiki-full-title{font-family:'Space Grotesk';font-size:20px;font-weight:800;margin-bottom:.5rem}
.wiki-full-meta{font-size:12px;color:var(--t3);margin-bottom:1rem;padding-bottom:1rem;border-bottom:1px solid var(--border)}
.wiki-full-body{font-size:14px;color:var(--t2);line-height:1.8;white-space:pre-wrap}

/* ── TOOLS ── */
.tools-tabs{display:flex;gap:4px;background:var(--bg2);border-radius:10px;padding:3px;margin-bottom:1.25rem}
.tools-tab{flex:1;padding:8px;border:none;background:none;border-radius:8px;
  font-size:12px;font-weight:600;color:var(--t2);cursor:pointer;transition:all .15s;text-align:center}
.tools-tab.on{background:var(--card);color:var(--accent);border:1px solid var(--border)}
.tools-section{display:none}
.tools-section.on{display:block}
.tools-group{background:var(--bg2);border-radius:9px;padding:.875rem;margin-bottom:.875rem}
.tools-label{font-size:10px;color:var(--t3);letter-spacing:.5px;margin-bottom:.375rem;font-weight:500}
.tools-result-grid{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-top:.875rem}
.tools-result{background:linear-gradient(135deg,rgba(40,120,232,.07),rgba(124,92,232,.05));
  border:1px solid var(--border);border-radius:9px;padding:.875rem;text-align:center}
.tools-result-val{font-family:'Space Grotesk';font-size:24px;font-weight:800;color:var(--accent)}
.tools-result-unit{font-size:12px;color:var(--t2);margin-top:3px}
.weather-card{background:linear-gradient(135deg,#e8f4ff,#f0f8ff);border:1px solid rgba(40,120,232,.2);
  border-radius:var(--r);padding:1.25rem;display:flex;align-items:center;gap:1rem;margin-bottom:1rem;cursor:pointer}
.weather-ico{font-size:44px}
.weather-temp{font-family:'Space Grotesk';font-size:30px;font-weight:800}
.weather-desc{font-size:13px;color:var(--t2);margin-top:2px}
.weather-details{font-size:11px;color:var(--t3);margin-top:4px}

/* ── WIDGET ── */
.widget-title{font-size:11px;font-weight:700;color:var(--t3);letter-spacing:.5px;margin-bottom:.875rem}
.member-row{display:flex;align-items:center;gap:9px;margin-bottom:.75rem;cursor:pointer}
.member-row:hover .mr-name{color:var(--accent)}
.mr-name{font-size:13px;font-weight:500;transition:color .15s}
.mr-role{font-size:11px;color:var(--t3)}

/* ── BIRTHDAY WIDGET ── */
.bday-card{background:linear-gradient(135deg,rgba(212,146,10,.08),rgba(224,58,58,.06));
  border:1px solid rgba(212,146,10,.25);border-radius:var(--r);padding:1rem;margin-bottom:.875rem}

/* ── POLLS ── */
.poll-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:1.25rem;margin-bottom:.875rem}
.poll-q{font-weight:700;font-size:15px;margin-bottom:.875rem}
.poll-opt{background:var(--bg2);border:1px solid var(--border);border-radius:8px;
  padding:9px 14px;margin-bottom:.5rem;cursor:pointer;transition:all .15s;
  display:flex;align-items:center;justify-content:space-between;position:relative;overflow:hidden}
.poll-opt:hover{border-color:var(--accent)}
.poll-opt.voted{border-color:var(--accent);background:rgba(40,120,232,.05)}
.poll-bar{position:absolute;left:0;top:0;bottom:0;background:rgba(40,120,232,.1);z-index:0}
.poll-opt-text{position:relative;z-index:1;font-size:13px;font-weight:500}
.poll-pct{position:relative;z-index:1;font-size:12px;color:var(--accent);font-weight:700}

/* ── AUTH ── */
#auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem}
.auth-box{width:100%;max-width:460px}
.auth-logo{width:56px;height:56px;border-radius:16px;
  background:linear-gradient(135deg,var(--accent),#60c8ff);
  margin:0 auto 1rem;display:flex;align-items:center;justify-content:center;
  font-family:'Space Grotesk';font-size:20px;font-weight:800;color:#fff}
.auth-title{font-family:'Space Grotesk';font-size:24px;font-weight:800;text-align:center;margin-bottom:4px}
.auth-sub{font-size:13px;color:var(--t2);text-align:center;margin-bottom:1.5rem}
.auth-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:2rem}
.auth-tabs{display:flex;background:var(--bg2);border-radius:10px;padding:3px;margin-bottom:1.5rem;gap:3px}
.auth-tab{flex:1;padding:8px;border:none;background:none;border-radius:8px;
  font-size:13px;font-weight:500;color:var(--t2);cursor:pointer;transition:all .15s}
.auth-tab.on{background:var(--card);color:var(--accent);border:1px solid var(--border)}
.fg{margin-bottom:.875rem}
.fg label{display:block;font-size:10px;color:var(--t3);margin-bottom:4px;font-weight:600;letter-spacing:.5px}
.fg input,.fg select,.fg textarea{width:100%;background:var(--bg2);border:1.5px solid var(--border);
  border-radius:9px;padding:9px 12px;color:var(--t1);font-size:13px;outline:none;transition:border .15s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--accent)}
.fg input::placeholder,.fg textarea::placeholder{color:var(--t3)}
.fg select option{background:var(--card)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.submit-btn{width:100%;padding:11px;border-radius:10px;border:none;
  background:linear-gradient(135deg,var(--accent),var(--a2));
  color:#fff;font-weight:700;font-size:14px;margin-top:4px;transition:all .15s}
.submit-btn:hover{opacity:.9}
.auth-hint{text-align:center;font-size:12px;color:var(--t3);margin-top:1rem}
.auth-hint span{color:var(--accent);cursor:pointer}
.fsec{font-size:10px;color:var(--t3);letter-spacing:1px;margin:.875rem 0 .625rem;
  padding-bottom:5px;border-bottom:1px solid var(--border)}

/* ── MODAL ── */
#modal{display:none;position:fixed;inset:0;background:rgba(15,31,53,.5);
  z-index:9999;align-items:center;justify-content:center;padding:1rem}
#modal.open{display:flex}
.modal-box{background:var(--card);border-radius:var(--r);padding:1.75rem;
  width:100%;max-width:480px;max-height:88vh;overflow-y:auto}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem}
.modal-title{font-family:'Space Grotesk';font-size:16px;font-weight:700}
.modal-close{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);
  background:none;font-size:14px;color:var(--t2);display:flex;align-items:center;justify-content:center;transition:all .15s}
.modal-close:hover{border-color:var(--red);color:var(--red)}

/* ── NOTIF ── */
#notif-panel{display:none;position:fixed;top:60px;right:1rem;width:300px;
  background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  z-index:200;box-shadow:0 8px 24px rgba(0,0,0,.1);max-height:400px;overflow-y:auto}
#notif-panel.open{display:block}
.np-head{padding:10px 14px;border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
  position:sticky;top:0;background:var(--card)}
.np-item{padding:9px 14px;border-bottom:1px solid var(--border);display:flex;gap:9px}
.np-item.unread{background:rgba(40,120,232,.04)}
.np-ico{width:26px;height:26px;border-radius:50%;background:rgba(40,120,232,.1);
  display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}

/* ── LOADING ── */
#loading{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);
  border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── TOAST ── */
#toast{position:fixed;bottom:1.5rem;right:1.5rem;z-index:9999;
  background:var(--card);border:1px solid var(--green);border-radius:10px;
  padding:10px 16px;font-size:13px;color:var(--green);display:none;
  box-shadow:0 4px 16px rgba(22,180,122,.15)}
#toast.err{border-color:var(--red);color:var(--red)}

/* ── GAME ── */
.game-wrap{max-width:860px;margin:0 auto}
.game-lobby-card{background:var(--card);border:1px solid var(--border);border-radius:20px;
  padding:2.5rem 2rem;text-align:center}
.game-code{font-family:'Space Grotesk';font-size:48px;font-weight:800;
  color:var(--accent);letter-spacing:8px;margin:1rem 0}
.game-teams{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin:1.5rem 0}
.team-box{border-radius:12px;padding:1.25rem;border:2px solid}
.team-red{background:rgba(224,58,58,.05);border-color:rgba(224,58,58,.2)}
.team-blue{background:rgba(40,120,232,.05);border-color:rgba(40,120,232,.2)}
.cn-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:.5rem}
.cn-card{border-radius:9px;padding:.75rem .5rem;text-align:center;cursor:pointer;
  border:2px solid transparent;transition:all .15s;font-weight:600;font-size:12px;
  min-height:60px;display:flex;align-items:center;justify-content:center;
  background:var(--card);border-color:var(--border);user-select:none}
.cn-card:hover:not(.revealed){transform:translateY(-2px);border-color:var(--t3)}
.cn-card.rev-red{background:#e03a3a;color:#fff;border-color:#c82020;cursor:default}
.cn-card.rev-blue{background:#2878e8;color:#fff;border-color:#1a65d4;cursor:default}
.cn-card.rev-neutral{background:#c8b89a;color:#fff;border-color:#b0a088;cursor:default}
.cn-card.rev-black{background:#1a1a2e;color:#fff;border-color:#000;cursor:default}
.cn-spy-red{background:rgba(224,58,58,.12);border-color:rgba(224,58,58,.35)}
.cn-spy-blue{background:rgba(40,120,232,.12);border-color:rgba(40,120,232,.35)}
.cn-spy-neutral{background:rgba(200,184,154,.12);border-color:rgba(200,184,154,.3)}
.cn-spy-black{background:rgba(26,26,46,.12);border-color:rgba(26,26,46,.3)}

/* ── QUIZ ── */
.quiz-wrap{max-width:780px;margin:0 auto}
.quiz-lobby-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:2.5rem 2rem;text-align:center}
.quiz-pin{font-family:'Space Grotesk';font-size:52px;font-weight:800;color:var(--accent);letter-spacing:10px;margin:1rem 0}
.quiz-answers{display:grid;grid-template-columns:1fr 1fr;gap:.875rem}
.quiz-ans{border:none;border-radius:14px;padding:1.25rem 1.5rem;cursor:pointer;
  font-size:14px;font-weight:700;transition:all .15s;text-align:left;
  display:flex;align-items:center;gap:.875rem;min-height:68px;color:#fff}
.quiz-ans:hover:not(:disabled){filter:brightness(1.07);transform:translateY(-2px)}
.quiz-ans.qa-0{background:linear-gradient(135deg,#e03a3a,#c82020)}
.quiz-ans.qa-1{background:linear-gradient(135deg,#2878e8,#1a65d4)}
.quiz-ans.qa-2{background:linear-gradient(135deg,#d4920a,#b87b00)}
.quiz-ans.qa-3{background:linear-gradient(135deg,#16b47a,#0e9566)}
.quiz-ans.show-correct{box-shadow:0 0 0 4px #fff,0 0 0 7px var(--green)}
.quiz-ans.wrong{opacity:.5;filter:grayscale(.5)}
.quiz-timer-bar{height:6px;background:var(--border);border-radius:6px;overflow:hidden;margin:8px 0}
.quiz-timer-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--accent),#60c8ff);transition:width .9s linear}
.quiz-timer-fill.urgent{background:linear-gradient(90deg,var(--red),#f87171)}
.qlb-item{display:flex;align-items:center;gap:.875rem;padding:.75rem 1rem;
  border-radius:11px;margin-bottom:.5rem;background:var(--bg2);border:1.5px solid var(--border)}
.qlb-item.p1{background:linear-gradient(135deg,#fff8e1,#fff3c4);border-color:#f5c842}
.qlb-item.p2{background:linear-gradient(135deg,#f5f5f5,#ebebeb);border-color:#bbb}
.qlb-item.p3{background:linear-gradient(135deg,#fdf0e6,#fde4cc);border-color:#f59e42}
.qlb-item.me{border-color:var(--accent) !important}
.qlb-rank{font-family:'Space Grotesk';font-size:18px;font-weight:800;width:30px;text-align:center}
.qlb-score{font-family:'Space Grotesk';font-size:16px;font-weight:800;color:var(--accent)}

/* ── UTIL ── */
.empty{text-align:center;padding:2.5rem 1rem;color:var(--t3);font-size:14px}
.empty-ico{font-size:36px;margin-bottom:.75rem}
.tag{padding:2px 8px;border-radius:5px;font-size:10px;font-weight:600;
  background:rgba(40,120,232,.08);color:var(--accent);border:1px solid rgba(40,120,232,.18)}

/* ── MOBILE ── */
#bottom-nav{display:none}
@media(max-width:800px){
  #shell{flex-direction:column;padding:.75rem}
  #sidebar,#rightbar{display:none}
  #main{width:100%}
  #bottom-nav{display:flex;position:fixed;bottom:0;left:0;right:0;z-index:100;
    background:#fff;border-top:1px solid var(--border);height:58px;
    box-shadow:0 -2px 12px rgba(40,120,232,.08);padding-bottom:env(safe-area-inset-bottom)}
  .bnav-btn{flex:1;border:none;background:none;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:2px;color:var(--t3);font-size:10px;font-weight:500;
    -webkit-tap-highlight-color:transparent;cursor:pointer}
  .bnav-btn.on{color:var(--accent)}
  .bnav-btn-ico{font-size:20px;line-height:1}
  #main{padding-bottom:70px}
}
@media(max-width:600px){
  .auth-card{padding:1.5rem}
  .row2,.row3{grid-template-columns:1fr}
  .quiz-answers,.game-teams{grid-template-columns:1fr}
  .kanban{grid-template-columns:1fr}
  .cn-card{font-size:10px;min-height:46px;padding:.5rem .25rem}
}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading">
  <div class="spinner"></div>
  <div style="font-size:13px;color:var(--t2)">Загрузка...</div>
</div>

<!-- AUTH -->
<div id="auth-screen" style="display:none"></div>

<!-- APP -->
<div id="app" style="display:none">
  <nav id="topnav">
    <div class="logo" onclick="nav('feed')" style="cursor:pointer">
      <div class="logo-mark">RS</div>
      <span class="logo-name">RS Team</span>
    </div>
    <div class="nav-right" id="nav-right"></div>
  </nav>

  <div id="shell">
    <div id="sidebar"></div>
    <div id="main"></div>
    <div id="rightbar"></div>
  </div>

  <div id="bottom-nav"></div>
</div>

<!-- MODAL -->
<div id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal-box" id="modal-box"></div>
</div>

<!-- NOTIF -->
<div id="notif-panel">
  <div class="np-head">
    <span style="font-weight:700;font-size:13px">Уведомления</span>
    <button onclick="clearNotifs()" style="border:none;background:none;font-size:12px;color:var(--accent);cursor:pointer">Очистить</button>
  </div>
  <div id="notif-list"><div style="padding:1.5rem;text-align:center;font-size:13px;color:var(--t3)">Нет уведомлений</div></div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getDatabase,ref,set,get,push,onValue,update,remove}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

/* ── FIREBASE ── */
const fbApp=initializeApp({
  apiKey:"AIzaSyDQlrj-U1rck6gLsPg3RilLq-h8amXKcPo",
  authDomain:"reservoir-simulation.firebaseapp.com",
  databaseURL:"https://reservoir-simulation-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"reservoir-simulation",
  storageBucket:"reservoir-simulation.firebasestorage.app",
  messagingSenderId:"924476318258",
  appId:"1:924476318258:web:75ebc4fff16dd4a424922b"
});
const db=getDatabase(fbApp);
const fbRef=p=>ref(db,p);
const fbSet=(p,v)=>set(fbRef(p),v);
const fbUpd=(p,v)=>update(fbRef(p),v);
const fbPush=(p,v)=>push(fbRef(p),v);
const fbGet=async p=>{const s=await get(fbRef(p));return s.exists()?s.val():null};
const fbDel=p=>remove(fbRef(p));
const fbOn=(p,cb)=>onValue(fbRef(p),s=>cb(s.exists()?s.val():null));

/* ── CONSTANTS ── */
const COLORS=['#2878e8','#16b47a','#d4920a','#e03a3a','#7c5ce8','#0891b2','#ea580c','#db2777'];
const MN=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const MN_S=['ЯНВ','ФЕВ','МАР','АПР','МАЙ','ИЮН','ИЮЛ','АВГ','СЕН','ОКТ','НОЯ','ДЕК'];
const HOL={
  '2026-01-01':'Новый год','2026-01-02':'Новый год','2026-01-07':'Рождество',
  '2026-03-08':'Женский день','2026-03-09':'Перенос 8 марта',
  '2026-03-21':'Наурыз','2026-03-22':'Наурыз','2026-03-23':'Наурыз',
  '2026-03-24':'Перенос Наурыза','2026-03-25':'Перенос Наурыза',
  '2026-05-01':'День единства','2026-05-07':'День защитника',
  '2026-05-09':'День Победы','2026-05-11':'Перенос 9 мая',
  '2026-05-27':'Курбан айт',
  '2026-07-06':'День столицы',
  '2026-08-30':'День Конституции','2026-08-31':'Перенос 30 авг',
  '2026-10-25':'День Республики','2026-10-26':'Перенос 25 окт',
  '2026-12-01':'День Первого Президента',
  '2026-12-16':'День Независимости','2026-12-17':'День Независимости',
  '2025-01-01':'Новый год','2025-01-02':'Новый год',
  '2025-03-08':'Женский день','2025-03-21':'Наурыз','2025-03-22':'Наурыз','2025-03-23':'Наурыз',
  '2025-05-01':'День единства','2025-05-07':'День защитника','2025-05-09':'День Победы',
  '2025-06-30':'Курбан айт','2025-07-06':'День столицы',
  '2025-08-30':'День Конституции','2025-10-25':'День Республики',
  '2025-12-01':'День Первого Президента','2025-12-16':'День Независимости','2025-12-17':'День Независимости',
};

/* ── STATE ── */
let PAGE='feed';
let USER=null;
let DB={members:{},posts:{},comments:{},files:{},vacations:{},dms:{},polls:{},kanban:{},wiki:{}};
let UI={notifs:[],notifOpen:false,activeDM:null,calYear:new Date().getFullYear(),
  calMonth:new Date().getMonth(),selDay:null,wikiView:null,
  postExpanded:{},weather:null,toolsTab:'pressure',
  gameRoom:null,quizRoom:null,quizRoomId:null};

/* ── UTILS ── */
const ini=n=>(n||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const escA=s=>(s||'').replace(/"/g,'&quot;');
const fmtAgo=ts=>{const d=Date.now()-ts;if(d<60000)return'только что';if(d<3600000)return Math.floor(d/60000)+' мин назад';if(d<86400000)return Math.floor(d/3600000)+' ч назад';return Math.floor(d/86400000)+' д назад'};
const dmKey=(a,b)=>[a,b].sort().join('_');
const scroll=id=>{const e=document.getElementById(id);if(e)e.scrollTop=e.scrollHeight};
const isVac=mid=>{const t=new Date().toISOString().split('T')[0];return Object.values(DB.vacations||{}).some(v=>v.memberId===mid&&v.from<=t&&t<=v.to)};
const members=()=>Object.values(DB.members||{});
const posts=()=>Object.entries(DB.posts||{}).map(([k,v])=>({...v,_k:k})).sort((a,b)=>b.ts-a.ts);

function av(src,name,size,color,extra=''){
  const s=size||36;
  if(src)return`<img src="${escA(src)}" style="width:${s}px;height:${s}px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,.5);flex-shrink:0" ${extra}>`;
  const bg=color||COLORS[0];
  const rgb=bg.replace('#','').match(/.{2}/g).map(x=>parseInt(x,16));
  return`<div style="width:${s}px;height:${s}px;border-radius:50%;background:${bg};opacity:.85;
    display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;
    font-size:${Math.floor(s*.3)}px;flex-shrink:0;border:2px solid rgba(255,255,255,.4)" ${extra}>${ini(name)}</div>`;
}

function toast(msg,err=false){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className=err?'err':'';el.style.display='block';
  setTimeout(()=>el.style.display='none',2800);
}

function addNotif(text,ico='🔔'){
  UI.notifs.unshift({id:Date.now(),text,ico,time:new Date().toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'}),read:false});
  if(UI.notifs.length>30)UI.notifs.pop();
  renderNavRight();
  renderNotifList();
}

/* ── NAVIGATION — core function ── */
window.nav=function(page){
  PAGE=page;
  UI.selDay=null;
  renderSidebar();
  renderMain();
  renderBottomNav();
  if(page==='messages'&&UI.activeDM)setTimeout(()=>scroll('dm-msgs'),80);
};

/* ── LISTENERS ── */
function startListeners(){
  fbOn('members',v=>{DB.members=v||{};renderSidebar();renderMain();renderRightbar();renderNavRight();renderBottomNav();});
  fbOn('posts',v=>{DB.posts=v||{};if(PAGE==='feed'||PAGE==='profile')renderMain();});
  fbOn('comments',v=>{DB.comments=v||{};if(PAGE==='feed'||PAGE==='profile')renderMain();});
  fbOn('files',v=>{DB.files=v||{};if(PAGE==='files')renderMain();});
  fbOn('vacations',v=>{DB.vacations=v||{};if(PAGE==='calendar')renderMain();});
  fbOn('dms',v=>{DB.dms=v||{};renderNavRight();renderBottomNav();if(PAGE==='messages')renderMain();});
  fbOn('polls',v=>{DB.polls=v||{};if(PAGE==='feed')renderMain();});
  fbOn('kanban',v=>{DB.kanban=v||{};if(PAGE==='kanban')renderMain();});
  fbOn('wiki',v=>{DB.wiki=v||{};if(PAGE==='wiki')renderMain();});
  fbOn('weather_cache',v=>{if(v&&Date.now()-v.ts<600000){UI.weather=v;if(PAGE==='tools')renderMain();}});
  fbOn('game/rooms',v=>{if(!v)return;if(UI.gameRoom&&v[UI.gameRoom]){DB.gameData=v[UI.gameRoom];if(PAGE==='game')renderMain();}});
  fbOn(`quiz/rooms`,v=>{if(!v)return;if(UI.quizRoomId&&v[UI.quizRoomId]){UI.quizRoom=v[UI.quizRoomId];if(PAGE==='quiz')renderMain();}});
}

/* ── RENDER FUNCTIONS ── */
function renderNavRight(){
  const el=document.getElementById('nav-right');
  if(!el||!USER)return;
  const me=DB.members[USER.id]||USER;
  const uc=UI.notifs.filter(n=>!n.read).length;
  const dmU=Object.entries(DB.dms).reduce((a,[k,v])=>{
    if(!k.includes(USER.id))return a;
    return a+Object.values(v||{}).filter(m=>m.from!==USER.id&&!m.read).length;
  },0);
  el.innerHTML=`
    <button class="nav-icon-btn" onclick="toggleNotif()" data-notif>🔔${uc?`<span class="nav-badge">${uc}</span>`:''}
    </button>
    <button class="nav-icon-btn" onclick="nav('messages')">💬${dmU?`<span class="nav-badge">${dmU}</span>`:''}
    </button>
    <div onclick="nav('profile')" style="cursor:pointer">${av(me.avatar,me.name,34,me.color||COLORS[0])}</div>
    <button class="nav-icon-btn" onclick="doLogout()" title="Выйти" style="font-size:14px">⏻</button>`;
}

function renderSidebar(){
  const el=document.getElementById('sidebar');
  if(!el||!USER)return;
  const me=DB.members[USER.id]||USER;
  const NAV=[
    {id:'feed',ico:'🏠',label:'Лента'},
    {id:'profile',ico:'👤',label:'Мой профиль'},
    {id:'team',ico:'👥',label:'Команда'},
    {id:'calendar',ico:'📅',label:'Календарь'},
    {id:'files',ico:'📁',label:'Файлы'},
    {id:'messages',ico:'💬',label:'Сообщения'},
    {id:'game',ico:'🎯',label:'Кодовые имена'},
    {id:'quiz',ico:'🧠',label:'Викторина'},
    {id:'kanban',ico:'📋',label:'Задачи'},
    {id:'wiki',ico:'📚',label:'База знаний'},
    {id:'tools',ico:'🧮',label:'Инструменты'},
  ];
  el.innerHTML=`
    <div class="s-profile" onclick="nav('profile')">
      ${av(me.avatar,me.name,44,me.color||COLORS[0])}
      <div><div class="s-name">${esc(me.name)}</div><div class="s-role">${esc(me.role||'')}</div></div>
    </div>
    <div class="s-nav">
      ${NAV.map(n=>`<button class="s-btn${PAGE===n.id?' on':''}" onclick="nav('${n.id}')">
        <span class="s-btn-ico">${n.ico}</span>${n.label}
      </button>`).join('')}
      <hr class="s-divider">
      <button class="s-btn" onclick="doLogout()"><span class="s-btn-ico">⏻</span>Выйти</button>
    </div>`;
}

function renderBottomNav(){

function buildPoll(id,p){
  const total=Object.values(p.votes||{}).reduce((s,v)=>s+v,0)||1;

  const isAuthor=p.authorId===USER.id;
  return`<div class="poll-card">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.75rem">

    </div>
    ${(p.options||[]).map((opt,i)=>{
      const cnt=p.votes&&p.votes[i]?p.votes[i]:0;
      const pct=Math.round(cnt/total*100);
      const voted=myVote===String(i);
      return`<div class="poll-opt${voted?' voted':''}" onclick="votePoll('${id}',${i})">
        <div class="poll-bar" style="width:${myVote!==undefined?pct:0}%"></div>
        <span class="poll-opt-text">${voted?'✓ ':''}${esc(opt)}</span>

    }).join('')}
    <div style="font-size:11px;color:var(--t3);margin-top:.5rem">${Object.values(p.userVotes||{}).length} голосов · ${p.authorName||''}</div>
  </div>`;
}

/* ── CALENDAR ── */
function buildCalendar(){
  const y=UI.calYear,m=UI.calMonth;
  const todayStr=new Date().toISOString().split('T')[0];
  // build vac map
  const vacMap={};
  Object.entries(DB.vacations||{}).forEach(([k,v])=>{
    let d=new Date(v.from),e=new Date(v.to);
    while(d<=e){const ds=d.toISOString().split('T')[0];if(!vacMap[ds])vacMap[ds]=[];vacMap[ds].push({...v,_k:k});d.setDate(d.getDate()+1);}
  });
  // build calendar grid
  const fd=new Date(y,m,1).getDay(),off=fd===0?6:fd-1,dim=new Date(y,m+1,0).getDate();
  const prevDim=new Date(y,m,0).getDate();
  let cells='';
  for(let i=0;i<off;i++)cells+=`<div class="cal-day other"><span class="cal-dn">${prevDim-off+1+i}</span></div>`;
  for(let d=1;d<=dim;d++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isT=ds===todayStr,isH=!!HOL[ds];
    const dv=vacMap[ds]||[];
    const myV=dv.some(v=>v.memberId===USER.id);
    const teamV=dv.filter(v=>v.memberId!==USER.id);
    const isSel=UI.selDay===ds;
    let cls='cal-day';
    if(isSel)cls+=' sel';else if(isT)cls+=' today';
    if(isH&&!isSel)cls+=' hol';
    if(myV&&!isSel)cls+=' myvac';
    const pips=teamV.slice(0,4).map(v=>{const mem=DB.members[v.memberId];return`<div class="cal-pip" style="background:${mem?mem.color||COLORS[0]:COLORS[0]}"></div>`;}).join('');
    cells+=`<div class="${cls}" onclick="selDay('${ds}')">
      <span class="cal-dn">${d}</span>
      ${isH&&!isT?`<span class="cal-hol-label">${HOL[ds].split(' ')[0]}</span>`:''}
      ${pips?`<div class="cal-pips">${pips}</div>`:''}
    </div>`;
  }
  const rem=(7-(off+dim)%7)%7;
  for(let i=1;i<=rem;i++)cells+=`<div class="cal-day other"><span class="cal-dn">${i}</span></div>`;
  // month strip
  const strip=MN_S.map((n,i)=>{
    const hasH=Object.keys(HOL).some(k=>k.startsWith(`${y}-${String(i+1).padStart(2,'0')}`));
    const hasV=Object.values(DB.vacations||{}).some(v=>v.from.startsWith(`${y}-${String(i+1).padStart(2,'0')}`));
    return`<button class="ms-btn${i===m?' active':''}" onclick="goMonth(${i})">
      ${n}
      <div class="ms-dots">
        ${hasH?`<div class="ms-dot" style="background:var(--gold)"></div>`:''}
        ${hasV?`<div class="ms-dot" style="background:var(--green)"></div>`:''}
      </div>
    </button>`;
  }).join('');
  // selected day detail
  let detail='';
  if(UI.selDay){
    const ds=UI.selDay;
    const[dy,dm2,dd]=ds.split('-');
    const hol=HOL[ds];
    const dv=vacMap[ds]||[];
    const myDV=dv.filter(v=>v.memberId===USER.id);
    const teamDV=[...new Map(dv.filter(v=>v.memberId!==USER.id).map(v=>[v._k,v])).values()];
    const isFut=ds>=todayStr;
    detail=`<div class="cal-detail">
      <div class="cal-detail-head">
        <div class="cal-detail-title">${parseInt(dd)} ${MN[parseInt(dm2)-1]} ${dy}</div>
        <button onclick="clearSelDay()" class="modal-close">✕</button>
      </div>
      ${hol?`<div style="background:rgba(212,146,10,.08);border:1px solid rgba(212,146,10,.2);border-radius:8px;padding:7px 10px;font-size:12px;color:var(--gold);font-weight:500;margin-bottom:.75rem">🎉 ${esc(hol)}</div>`:''}
      ${myDV.length?`<div style="font-size:10px;color:var(--t3);letter-spacing:.5px;font-weight:600;margin-bottom:.5rem">МОЙ ОТПУСК</div>
        ${[...new Map(myDV.map(v=>[v._k,v])).values()].map(v=>`
          <div class="vac-row">
            <div style="flex:1"><div class="vac-dates">📅 ${v.from} — ${v.to}</div></div>
            <button class="btn btn-secondary" style="font-size:11px;padding:4px 10px" onclick="openEditVac('${v._k}','${v.from}','${v.to}')">Изменить</button>
            <button class="btn btn-danger" style="font-size:11px;padding:4px 10px" onclick="deleteVac('${v._k}')">Отменить</button>
          </div>`).join('')}`:''}
      ${teamDV.length?`<div style="font-size:10px;color:var(--t3);letter-spacing:.5px;font-weight:600;margin:${myDV.length?'.75rem 0':0} 0 .5rem">КОЛЛЕГИ В ОТПУСКЕ</div>
        ${teamDV.map(v=>{const mem=DB.members[v.memberId]||{name:'?'};return`<div style="display:flex;align-items:center;gap:8px;margin-bottom:.5rem">
          ${av(mem.avatar,mem.name,26,mem.color||COLORS[0])}
          <div><div style="font-size:13px;font-weight:500">${esc(mem.name)}</div>
          <div style="font-size:11px;color:var(--t3)">${v.from} — ${v.to}</div></div>
        </div>`;}).join('')}`:''}
      ${!myDV.length&&!teamDV.length&&!hol?`<div style="font-size:13px;color:var(--t3)">Нет событий</div>`:''}
      ${isFut?`<div style="border-top:1px solid var(--border);padding-top:.875rem;margin-top:${(myDV.length||teamDV.length||hol)?'.875rem':'0'}">
        <div style="font-size:10px;color:var(--t3);letter-spacing:.5px;font-weight:600;margin-bottom:.5rem">ДОБАВИТЬ ОТПУСК</div>
        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
          <input type="date" id="vfrom" value="${ds}" style="background:var(--bg2);border:1.5px solid var(--border);border-radius:8px;padding:6px 10px;font-size:12px;outline:none;flex:1;min-width:120px">
          <span style="color:var(--t2);font-size:12px">—</span>
          <input type="date" id="vto" value="${ds}" min="${ds}" style="background:var(--bg2);border:1.5px solid var(--border);border-radius:8px;padding:6px 10px;font-size:12px;outline:none;flex:1;min-width:120px">
          <button class="btn btn-primary" style="font-size:12px;padding:7px 14px" onclick="saveVac()">+ Добавить</button>
        </div>
      </div>`:''}
    </div>`;
  }
  // vac bars this month
  const seen=new Set();const monthVacs=[];
  for(let d=1;d<=dim;d++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    (vacMap[ds]||[]).forEach(v=>{if(!seen.has(v._k)){seen.add(v._k);monthVacs.push(v);}});
  }
  const vacBars=monthVacs.length?`<div style="margin-top:1rem;border-top:1px solid var(--border);padding-top:.875rem">
    <div style="font-size:10px;color:var(--t3);letter-spacing:1px;font-weight:600;margin-bottom:.75rem">ОТПУСКА В ЭТОМ МЕСЯЦЕ</div>
    ${monthVacs.map(v=>{
      const mem=DB.members[v.memberId]||{name:'?',color:COLORS[0]};
      const c=mem.color||COLORS[0];
      const mS=new Date(y,m,1),mE=new Date(y,m+1,0);
      const vS=new Date(v.from),vE=new Date(v.to);
      const s=vS<mS?mS:vS,e=vE>mE?mE:vE;
      const pl=((s.getDate()-1)/dim*100).toFixed(1);
      const pw=((e.getDate()-s.getDate()+1)/dim*100).toFixed(1);
      return`<div style="margin-bottom:.75rem">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">
          ${av(mem.avatar,mem.name,22,c)}
          <span style="font-size:13px;font-weight:600">${esc(mem.name)}</span>
          <span style="font-size:11px;color:var(--t3);margin-left:auto">📅 ${v.from} — ${v.to}</span>
        </div>
        <div class="vac-bar-wrap"><div class="vac-bar" style="width:${pw}%;margin-left:${pl}%;background:${c}"></div></div>
        <div style="display:flex;justify-content:space-between;font-size:9px;color:var(--t3);margin-top:2px"><span>1</span><span>${dim}</span></div>
      </div>`;
    }).join('')}
  </div>`:'';
  return`<div class="cal-wrap">
    <div class="cal-header">
      <div style="display:flex;align-items:baseline;gap:.5rem">
        <span class="cal-month-title">${MN[m]}</span>
        <span class="cal-year">${y}</span>
      </div>
      <div class="cal-nav">
        <button class="cal-nav-btn" onclick="prevMonth()">←</button>
        <button class="cal-today-btn" onclick="goToday()">Сегодня</button>
        <button class="cal-nav-btn" onclick="nextMonth()">→</button>
      </div>
    </div>
    <div class="month-strip" id="month-strip">${strip}</div>
    ${detail}
    <div class="cal-grid">
      ${['Пн','Вт','Ср','Чт','Пт','Сб','Вс'].map(d=>`<div class="cal-dh">${d}</div>`).join('')}
      ${cells}
    </div>
    <div class="cal-legend">
      <div class="cal-legend-item"><div class="cal-legend-dot" style="background:var(--accent)"></div>Сегодня</div>
      <div class="cal-legend-item"><div class="cal-legend-dot" style="background:rgba(40,120,232,.3)"></div>Мой отпуск</div>
      <div class="cal-legend-item"><div class="cal-legend-dot" style="background:rgba(212,146,10,.3)"></div>Праздник РК</div>
      <div class="cal-legend-item">● Отпуск коллеги</div>
    </div>
    ${vacBars}
  </div>`;
}

/* ── FILES ── */
function buildFiles(){
  const ICONS={pdf:'📄',xlsx:'📊',xls:'📊',docx:'📝',doc:'📝',pptx:'📊',dat:'💾',txt:'📋',csv:'📊',png:'🖼',jpg:'🖼',jpeg:'🖼',zip:'📦',rar:'📦',mp4:'🎬',mp3:'🎵'};
  const all=Object.entries(DB.files||{}).sort((a,b)=>(b[1].ts||0)-(a[1].ts||0));
  const mine=all.filter(([,f])=>f.memberId===USER.id);
  const team=all.filter(([,f])=>f.memberId!==USER.id);
  const fi=([id,f],canDel)=>{
    const ext=(f.name.split('.').pop()||'').toLowerCase();
    const mem=DB.members[f.memberId]||{name:''};
    return`<div class="fitem">
      <div class="fitem-top">
        <div style="font-size:22px">${ICONS[ext]||'📎'}</div>
        <div class="fitem-info"><div class="fitem-name">${esc(f.name)}</div>
          <div class="fitem-meta">${esc(mem.name)} · ${f.date}</div></div>
        ${canDel?`<button onclick="fbDel('files/${id}').then(()=>toast('Удалено'))" style="border:none;background:none;color:var(--t3);cursor:pointer;font-size:14px">🗑</button>`:''}
      </div>
      ${f.desc?`<div style="font-size:12px;color:var(--t2);margin-top:.5rem">${esc(f.desc)}</div>`:''}
      ${f.driveUrl?`<div class="fitem-btns">
        <a href="${escA(driveView(f.driveUrl))}" target="_blank" class="flink flink-open">👁 Открыть</a>
        <a href="${escA(driveDl(f.driveUrl))}" target="_blank" class="flink flink-dl">⬇ Скачать</a>
      </div>`:`<div style="font-size:11px;color:var(--t3);margin-top:.375rem;font-style:italic">Ссылка не добавлена</div>`}
    </div>`;
  };
  return`<div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
      <div style="font-family:'Space Grotesk';font-size:18px;font-weight:700">Файлы отдела</div>
      <button class="btn btn-primary" onclick="toggleAddFile()">+ Добавить файл</button>
    </div>
    <div id="add-file-form" style="display:none;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem;margin-bottom:1rem">
      <div style="font-weight:600;font-size:14px;margin-bottom:.875rem">📎 Добавить через Google Drive</div>
      <div class="fg"><label>НАЗВАНИЕ</label><input type="text" id="f-name" placeholder="Отчёт Q1 2026.pdf"></div>
      <div class="fg"><label>ССЫЛКА GOOGLE DRIVE</label><input type="url" id="f-url" placeholder="https://drive.google.com/file/d/..."></div>
      <div class="fg"><label>ОПИСАНИЕ</label><input type="text" id="f-desc" placeholder="Краткое описание..."></div>
      <div style="background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:.875rem;margin-bottom:.875rem;font-size:12px;color:var(--t2);line-height:1.7">
        <b style="color:var(--t1)">Как получить ссылку:</b><br>
        1. Откройте файл на Google Drive<br>
        2. Правой кнопкой → «Поделиться» → «Все, у кого есть ссылка»<br>
        3. Скопируйте ссылку и вставьте выше
      </div>
      <div style="display:flex;gap:.625rem">
        <button class="btn btn-primary" onclick="addDriveFile()">Сохранить</button>
        <button class="btn btn-secondary" onclick="toggleAddFile()">Отмена</button>
      </div>
    </div>
    <div style="font-size:10px;color:var(--t3);letter-spacing:1px;margin-bottom:.5rem">МОИ ФАЙЛЫ (${mine.length})</div>
    ${mine.length?mine.map(f=>fi(f,true)).join(''):`<div style="font-size:13px;color:var(--t3);margin-bottom:1rem">Вы ещё не добавляли файлы</div>`}
    ${team.length?`<div style="border-top:1px solid var(--border);margin:.875rem 0"></div>
      <div style="font-size:10px;color:var(--t3);letter-spacing:1px;margin-bottom:.5rem">ФАЙЛЫ КОМАНДЫ (${team.length})</div>
      ${team.map(f=>fi(f,false)).join('')}`:''}
    ${!mine.length&&!team.length?`<div class="empty"><div class="empty-ico">📂</div>Файлов пока нет</div>`:''}
  </div>`;
}
function driveView(url){const m=url.match(/\/d\/([a-zA-Z0-9_-]+)/);return m?`https://drive.google.com/file/d/${m[1]}/view`:url}
function driveDl(url){const m=url.match(/\/d\/([a-zA-Z0-9_-]+)/);return m?`https://drive.google.com/uc?export=download&id=${m[1]}`:url}

/* ── MESSAGES ── */
function buildMessages(){
  const others=members().filter(m=>m.id!==USER.id);
  const sidebar=others.map(m=>{
    const key=dmKey(USER.id,m.id);
    const msgs=Object.values(DB.dms[key]||{}).sort((a,b)=>a.ts-b.ts);
    const last=msgs[msgs.length-1];
    const uc=msgs.filter(msg=>msg.from!==USER.id&&!msg.read).length;
    return`<div class="dm-item${UI.activeDM===m.id?' active':''}" onclick="openDM('${m.id}')">
      ${av(m.avatar,m.name,34,m.color||COLORS[0])}
      <div class="dm-info"><div class="dm-iname">${esc(m.name)}</div>
        <div class="dm-preview">${last?(last.from===USER.id?'Вы: ':'')+esc(last.text.slice(0,28)):'Нет сообщений'}</div>
      </div>
      ${uc?`<span class="dm-badge">${uc}</span>`:''}
    </div>`;
  }).join('');
  let chat='<div class="dm-chat" style="align-items:center;justify-content:center"><div style="text-align:center;color:var(--t3)"><div style="font-size:40px;margin-bottom:.5rem">💬</div>Выберите коллегу</div></div>';
  if(UI.activeDM){
    const peer=DB.members[UI.activeDM];
    if(peer){
      const key=dmKey(USER.id,peer.id);
      const msgs=Object.values(DB.dms[key]||{}).sort((a,b)=>a.ts-b.ts);
      msgs.forEach(msg=>{if(msg.from!==USER.id&&!msg.read&&msg._key)fbUpd(`dms/${key}/${msg._key}`,{read:true})});
      chat=`<div class="dm-chat">
        <div class="dm-chat-hdr">
          ${av(peer.avatar,peer.name,36,peer.color||COLORS[0])}
          <div><div style="font-weight:700;font-size:14px">${esc(peer.name)}</div><div style="font-size:11px;color:var(--t2)">${esc(peer.role||'')}</div></div>
        </div>
        <div class="dm-msgs" id="dm-msgs">
          ${msgs.length?msgs.map(msg=>{
            const isMe=msg.from===USER.id;
            const s=isMe?(DB.members[USER.id]||USER):peer;
            return`<div class="msg${isMe?' me':''}">
              ${av(s.avatar,s.name,26,s.color||COLORS[0])}
              <div><div class="msg-meta">${isMe?'Вы':esc(peer.name.split(' ')[0])} · ${msg.time}</div>
              <div class="msg-bubble">${esc(msg.text)}</div></div>
            </div>`;
          }).join(''):`<div style="flex:1;display:flex;align-items:center;justify-content:center;text-align:center;color:var(--t3)"><div><div style="font-size:32px;margin-bottom:.5rem">👋</div>Начните диалог</div></div>`}
        </div>
        <div class="dm-inp-bar">
          <input class="dm-inp" id="dm-inp" placeholder="Написать ${escA(peer.name.split(' ')[0])}..."
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendDM('${peer.id}')}">
          <button class="dm-send" onclick="sendDM('${peer.id}')">➤</button>
        </div>
      </div>`;
    }
  }
  return`<div class="dm-layout">
    <div class="dm-list">
      <div class="dm-head">Сообщения</div>
      ${others.length?sidebar:`<div style="padding:1rem;font-size:13px;color:var(--t3)">Коллеги появятся после регистрации</div>`}
    </div>
    ${chat}
  </div>`;
}

/* ── KANBAN ── */
function buildKanban(){
  const cols=[{id:'todo',label:'📋 Нужно сделать'},{id:'doing',label:'⚡ В процессе'},{id:'done',label:'✅ Готово'}];
  const cards=Object.entries(DB.kanban||{}).map(([k,v])=>({...v,_k:k}));
  return`<div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
      <div style="font-family:'Space Grotesk';font-size:18px;font-weight:700">📋 Доска задач</div>
      <button class="btn btn-primary" onclick="openAddCard()">+ Задача</button>
    </div>
    <div class="kanban">
      ${cols.map(col=>{
        const cc=cards.filter(c=>c.col===col.id).sort((a,b)=>(b.ts||0)-(a.ts||0));
        return`<div class="kb-col">
          <div class="kb-col-head">${col.label}<span class="kb-count">${cc.length}</span></div>
          ${cc.map(c=>{
            const as=c.assigneeId?DB.members[c.assigneeId]:null;
            const isOwner=c.creatorId===USER.id;
            return`<div class="kb-card">
              <div class="kb-card-title">${esc(c.title)}</div>
              ${c.desc?`<div style="font-size:12px;color:var(--t2);margin-bottom:.375rem">${esc(c.desc)}</div>`:''}
              <div class="kb-card-meta">
                ${as?av(as.avatar,as.name,18,as.color||COLORS[0]):''}
                <span>${as?esc(as.name.split(' ')[0]):'Не назначен'}</span>
                ${isOwner?`<span style="margin-left:auto;display:flex;gap:3px">
                  ${col.id!=='todo'?`<button onclick="fbUpd('kanban/${c._k}',{col:'todo'})" style="border:1px solid var(--border);background:none;border-radius:5px;padding:2px 6px;font-size:10px;cursor:pointer">◀</button>`:''}
                  ${col.id!=='done'?`<button onclick="fbUpd('kanban/${c._k}',{col:'${col.id==='todo'?'doing':'done'}'})" style="border:1px solid var(--border);background:none;border-radius:5px;padding:2px 6px;font-size:10px;cursor:pointer">▶</button>`:''}
                  <button onclick="fbDel('kanban/${c._k}')" style="border:1px solid var(--border);background:none;border-radius:5px;padding:2px 6px;font-size:10px;cursor:pointer;color:var(--red)">🗑</button>
                </span>`:''}
              </div>
            </div>`;
          }).join('')}
          <button class="kb-add" onclick="openAddCard('${col.id}')">+ Добавить</button>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function buildGameRoom(g){
  const me=USER.id;
  const red=Object.values(g.redTeam||{});
  const blue=Object.values(g.blueTeam||{});
  const myTeam=red.find(p=>p.id===me)?'red':blue.find(p=>p.id===me)?'blue':null;
  const isHost=g.hostId===me;
  const canStart=red.length>=2&&blue.length>=2&&g.redCap&&g.blueCap;
  return`<div class="game-wrap">
    <div class="game-lobby-card">
      <div style="font-size:12px;color:var(--t2);margin-bottom:.375rem">КОД КОМНАТЫ</div>
      <div class="game-code">${UI.gameRoom}</div>
      <div class="game-teams">
        <div class="team-box team-red">
          <div style="font-weight:700;font-size:14px;color:var(--red);margin-bottom:.75rem">🔴 Красные (${red.length})</div>
          ${red.map(p=>`<div style="display:flex;align-items:center;gap:7px;margin-bottom:.5rem">
            ${av(p.avatar,p.name,24,p.color||COLORS[0])}<span style="font-size:13px">${esc(p.name)}</span>
            ${g.redCap===p.id?'<span style="font-size:11px">👑</span>':''}
          </div>`).join('')||'<div style="font-size:12px;color:var(--t3)">Нет игроков</div>'}
          ${myTeam!=='red'?`<button class="btn btn-secondary" style="margin-top:.5rem;font-size:12px;padding:5px 12px" onclick="joinTeam('red')">+ Войти</button>`:''}
          ${myTeam==='red'&&g.redCap!==me?`<button class="btn btn-secondary" style="margin-top:.5rem;font-size:12px;padding:5px 12px" onclick="becomeCapt('red')">👑 Стать капитаном</button>`:''}
        </div>
        <div class="team-box team-blue">
          <div style="font-weight:700;font-size:14px;color:var(--accent);margin-bottom:.75rem">🔵 Синие (${blue.length})</div>
          ${blue.map(p=>`<div style="display:flex;align-items:center;gap:7px;margin-bottom:.5rem">
            ${av(p.avatar,p.name,24,p.color||COLORS[0])}<span style="font-size:13px">${esc(p.name)}</span>
            ${g.blueCap===p.id?'<span style="font-size:11px">👑</span>':''}
          </div>`).join('')||'<div style="font-size:12px;color:var(--t3)">Нет игроков</div>'}
          ${myTeam!=='blue'?`<button class="btn btn-secondary" style="margin-top:.5rem;font-size:12px;padding:5px 12px" onclick="joinTeam('blue')">+ Войти</button>`:''}
          ${myTeam==='blue'&&g.blueCap!==me?`<button class="btn btn-secondary" style="margin-top:.5rem;font-size:12px;padding:5px 12px" onclick="becomeCapt('blue')">👑 Стать капитаном</button>`:''}
        </div>
      </div>
      ${isHost?`<button class="btn btn-primary" style="padding:12px 28px;font-size:14px" ${canStart?'':'disabled style="opacity:.4;cursor:not-allowed"'} onclick="startGame()">🚀 Начать игру</button>
        ${!canStart?`<div style="font-size:12px;color:var(--t3);margin-top:.5rem">Нужно 2+2 игрока и оба капитана</div>`:''}`
      :`<div style="font-size:13px;color:var(--t2);margin-top:1rem">⏳ Ждём пока ведущий начнёт...</div>`}
      <div style="margin-top:1rem"><button class="btn btn-secondary" onclick="leaveGame()">Выйти из комнаты</button></div>
    </div>
  </div>`;
}
function buildGameBoard(g){
  const me=USER.id;
  const isSpy=g.redCap===me||g.blueCap===me;
  const myTeam=Object.values(g.redTeam||{}).find(p=>p.id===me)?'red':'blue';
  const isMyTurn=g.turn===myTeam;
  const isMyCapt=(g.turn==='red'&&g.redCap===me)||(g.turn==='blue'&&g.blueCap===me);
  const board=g.board||[];
  const redLeft=board.filter(c=>c.color==='red'&&!c.revealed).length;
  const blueLeft=board.filter(c=>c.color==='blue'&&!c.revealed).length;
  if(g.winner)return`<div class="game-wrap">
    <div class="game-lobby-card">
      <div style="font-size:64px;margin-bottom:1rem">${g.winner==='red'?'🔴':'🔵'}</div>
      <div style="font-family:'Space Grotesk';font-size:26px;font-weight:800;margin-bottom:.5rem;color:${g.winner==='red'?'var(--red)':'var(--accent)'}">${g.winner==='red'?'Красные победили!':'Синие победили!'}</div>
      <div style="display:flex;gap:1rem;justify-content:center;margin-top:1.5rem">
        <button class="btn btn-primary" onclick="rematch()">🔄 Реванш</button>
        <button class="btn btn-secondary" onclick="leaveGame()">Выйти</button>
      </div>
    </div>
  </div>`;
  return`<div class="game-wrap">
    <div style="background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.75rem;margin-bottom:1rem">
      <div style="display:flex;gap:1.5rem">
        <span style="font-family:'Space Grotesk';font-size:22px;font-weight:800;color:var(--red)">🔴 ${redLeft}</span>
        <span style="font-size:18px;color:var(--t3)">vs</span>
        <span style="font-family:'Space Grotesk';font-size:22px;font-weight:800;color:var(--accent)">${blueLeft} 🔵</span>
      </div>
      <div style="padding:6px 14px;border-radius:20px;font-size:13px;font-weight:700;background:${g.turn==='red'?'rgba(224,58,58,.12)':'rgba(40,120,232,.12)'};color:${g.turn==='red'?'var(--red)':'var(--accent)'}">${g.turn==='red'?'🔴 Ход красных':'🔵 Ход синих'}</div>
      ${g.clue?`<div style="background:var(--bg2);border-radius:9px;padding:6px 12px;font-size:13px"><b>${esc(g.clue.word)}</b> <span style="background:var(--accent);color:#fff;border-radius:50%;width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700">${g.clue.num}</span></div>`
      :`<div style="font-size:13px;color:var(--t3)">Ждём подсказку капитана...</div>`}
      <button class="btn btn-secondary" style="font-size:12px;padding:6px 14px" onclick="leaveGame()">Выйти</button>
    </div>
    <div class="cn-grid" style="margin-bottom:1rem">
      ${board.map((c,i)=>{
        let cls='cn-card';
        if(c.revealed)cls+=` rev-${c.color}`;
        else if(isSpy)cls+=` cn-spy-${c.color}`;
        const canClick=isMyTurn&&!isMyCapt&&!c.revealed&&g.clue;
        return`<div class="${cls}"${canClick?` onclick="guessCard(${i})"`:''}>${esc(c.word)}</div>`;
      }).join('')}
    </div>
    ${isMyCapt&&isMyTurn&&!g.clue?`<div style="background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1rem;display:flex;gap:.75rem;align-items:center;flex-wrap:wrap">
      <div style="font-size:13px;font-weight:600;color:var(--t2)">👑 Ваша подсказка:</div>
      <input id="clue-inp" placeholder="Слово..." style="flex:1;min-width:120px;background:var(--bg2);border:1.5px solid var(--border);border-radius:9px;padding:8px 12px;font-size:13px;outline:none">
      <select id="clue-num" style="background:var(--bg2);border:1.5px solid var(--border);border-radius:9px;padding:8px;font-size:13px;outline:none">
        ${[1,2,3,4,5,6,7,8,9].map(n=>`<option value="${n}">${n}</option>`).join('')}
      </select>
      <button class="btn btn-primary" style="font-size:13px" onclick="giveClue()">Дать подсказку</button>
    </div>`:''}
    ${isMyTurn&&!isMyCapt&&g.clue?`<div style="text-align:center">
      <button class="btn btn-secondary" onclick="endTurn()">Завершить ход →</button>
    </div>`:''}
    ${isSpy?`<div style="text-align:center;font-size:12px;color:var(--t3);margin-top:.5rem">👑 Вы — капитан. Цвета видны только вам.</div>`:''}
  </div>`;
}

/* ── BIRTHDAY ── */
function getBdays(){
  const today=new Date();
  const mm=String(today.getMonth()+1).padStart(2,'0');
  const dd=String(today.getDate()).padStart(2,'0');
  const res={today:[],soon:[]};
  members().forEach(m=>{
    if(!m.birthday)return;
    const p=m.birthday.split('-');
    if(p.length<3)return;
    const mmd=`${p[1]}-${p[2]}`;
    if(mmd===`${mm}-${dd}`){res.today.push(m);return;}
    const b=new Date(today.getFullYear(),parseInt(p[1])-1,parseInt(p[2]));
    if(b<today)b.setFullYear(today.getFullYear()+1);
    const diff=Math.ceil((b-today)/(86400000));
    if(diff<=7)res.soon.push({...m,d:diff});
  });
  return res;
}

window.calcPressure=()=>{
  const v=parseFloat(document.getElementById('pv')?.value)||0;
  const f=document.getElementById('pf')?.value||'psi';
  const toBar={psi:0.0689476,bar:1,atm:1.01325,mpa:10,kpa:0.01};
  const fromBar={psi:14.5038,bar:1,atm:0.986923,mpa:0.1,kpa:100};
  const bar=v*toBar[f];
  const el=document.getElementById('p-result');if(!el)return;
  const units=['psi','bar','atm','mpa','kpa'],labels={psi:'psi',bar:'bar',atm:'атм',mpa:'МПа',kpa:'кПа'};
  el.innerHTML=units.filter(u=>u!==f).map(u=>`<div class="tools-result"><div class="tools-result-val">${(bar*fromBar[u]).toFixed(3).replace(/\.?0+$/,'')}</div><div class="tools-result-unit">${labels[u]}</div></div>`).join('');
};
window.calcFlow=()=>{
  const pi=parseFloat(document.getElementById('fpi')?.value)||0;
  const pr=parseFloat(document.getElementById('fpr')?.value)||0;

  el.innerHTML=`<div class="tools-result"><div class="tools-result-val">${q.toFixed(1)}</div><div class="tools-result-unit">м³/сут</div></div>
    <div class="tools-result"><div class="tools-result-val">${(q/6.29).toFixed(1)}</div><div class="tools-result-unit">баррель/сут</div></div>
    <div class="tools-result"><div class="tools-result-val">${(q/30).toFixed(0)}</div><div class="tools-result-unit">м³/месяц</div></div>

};
window.fetchWeather=async()=>{

    const d=await r.json();const c=d.current;
    const code=c.weather_code;
    let main='Clear',desc='Ясно';
    if(code>=95){main='Thunderstorm';desc='Гроза';}
    else if(code>=71){main='Snow';desc='Снег';}
    else if(code>=61){main='Rain';desc='Дождь';}
    else if(code>=51){main='Drizzle';desc='Морось';}
    else if(code>=45){main='Fog';desc='Туман';}
    else if(code>=3){main='Clouds';desc='Облачно';}
    else if(code>=1){main='Clouds';desc='Переменная облачность';}
    UI.weather={temp:c.temperature_2m,feels:c.apparent_temperature,humidity:c.relative_humidity_2m,wind:c.wind_speed_10m,main,desc,ts:Date.now()};
    await fbSet('weather_cache',UI.weather);renderMain();

  const colors=shuffleArr([...Array(9).fill('red'),...Array(8).fill('blue'),...Array(7).fill('neutral'),'black']);
  const board=words.map((w,i)=>({word:w,color:colors[i],revealed:false}));
  await fbUpd(`game/rooms/${UI.gameRoom}`,{started:true,board,turn:'red',clue:null,winner:null});
};

  const word=(document.getElementById('clue-inp')?.value||'').trim();

window.guessCard=async idx=>{
  const g=DB.gameData;if(!g||!g.board)return;
  const card=g.board[idx];if(!card||card.revealed)return;
  const myTeam=Object.values(g.redTeam||{}).find(p=>p.id===USER.id)?'red':'blue';
  if(g.turn!==myTeam)return;
  await fbUpd(`game/rooms/${UI.gameRoom}/board/${idx}`,{revealed:true});
  const board=[...g.board];board[idx]={...card,revealed:true};
  if(card.color==='black'){await fbSet(`game/rooms/${UI.gameRoom}/winner`,myTeam==='red'?'blue':'red');return;}
  if(board.filter(c=>c.color===myTeam&&!c.revealed).length===0){await fbSet(`game/rooms/${UI.gameRoom}/winner`,myTeam);return;}
  if(card.color!==myTeam){await fbUpd(`game/rooms/${UI.gameRoom}`,{turn:myTeam==='red'?'blue':'red',clue:null});return;}
  const guessed=(g.clue?.guessed||0)+1;
  await fbSet(`game/rooms/${UI.gameRoom}/clue/guessed`,guessed);
  if(guessed>=(g.clue?.num||1)){await fbUpd(`game/rooms/${UI.gameRoom}`,{turn:myTeam==='red'?'blue':'red',clue:null});}
};

  if(pin.length!==4){toast('Введите 4-значный PIN',true);return;}
  const room=await fbGet(`quiz/rooms/${pin}`);
  if(!room){toast('Комната не найдена',true);return;}
  if(room.status!=='waiting'){toast('Игра уже началась',true);return;}
  const me=DB.members[USER.id]||USER;
  const pd={id:me.id,name:me.name,avatar:me.avatar||'',color:me.color||COLORS[0],score:0};
  await fbUpd(`quiz/rooms/${pin}/players`,{[me.id]:pd});
  UI.quizRoomId=pin;UI.quizRoom=room;
  fbOn(`quiz/rooms/${pin}`,v=>{UI.quizRoom=v;if(PAGE==='quiz')renderMain();});
  renderMain();
};
window.startQuiz=async()=>{
  if(!UI.quizRoomId)return;
  await fbUpd(`quiz/rooms/${UI.quizRoomId}`,{status:'question',currentQuestion:0,answers:{},showAnswers:false,timeLeft:QTIME,lastPoints:{}});
  startQTimer();
};
window.quizAnswer=async idx=>{
  if(!UI.quizRoomId||!UI.quizRoom)return;
  const room=UI.quizRoom;
  if(room.answers&&room.answers[USER.id]!==undefined)return;
  await fbUpd(`quiz/rooms/${UI.quizRoomId}/answers`,{[USER.id]:idx});
  await fbUpd(`quiz/rooms/${UI.quizRoomId}/answerTimes`,{[USER.id]:room.timeLeft||0});
  renderMain();
};
window.quizNext=async()=>{
  if(!UI.quizRoomId||!UI.quizRoom)return;
  stopQTimer();
  const room=UI.quizRoom;
  const next=(room.currentQuestion||0)+1;
  if(next>=(room.shuffled||QQ).length){await quizFinishFn();return;}
  await fbUpd(`quiz/rooms/${UI.quizRoomId}`,{status:'question',currentQuestion:next,answers:{},showAnswers:false,timeLeft:QTIME,lastPoints:{}});
  startQTimer();
};
window.quizFinish=async()=>{stopQTimer();if(!UI.quizRoomId)return;await fbUpd(`quiz/rooms/${UI.quizRoomId}`,{status:'finished'});};
async function quizFinishFn(){stopQTimer();if(!UI.quizRoomId)return;await fbUpd(`quiz/rooms/${UI.quizRoomId}`,{status:'finished'});}
window.leaveQuiz=async()=>{stopQTimer();if(UI.quizRoomId&&USER)await fbDel(`quiz/rooms/${UI.quizRoomId}/players/${USER.id}`);UI.quizRoomId=null;UI.quizRoom=null;renderMain();};
window.quizRestart=async()=>{
  if(!UI.quizRoomId||!UI.quizRoom)return;
  const players=UI.quizRoom.players||{};
  const reset={};Object.entries(players).forEach(([id,p])=>{reset[id]={...p,score:0};});
  const shuffled=shuffleArr(QQ).slice(0,15);
  await fbUpd(`quiz/rooms/${UI.quizRoomId}`,{status:'waiting',currentQuestion:0,players:reset,answers:{},showAnswers:false,timeLeft:QTIME,lastPoints:{},shuffled});
};

function startQTimer(){
  stopQTimer();
  const room=UI.quizRoom;if(!room||room.hostId!==USER.id)return;
  qTimeLeft=QTIME;
  qTimer=setInterval(async()=>{
    qTimeLeft--;
    if(!UI.quizRoomId){clearInterval(qTimer);return;}
    await fbUpd(`quiz/rooms/${UI.quizRoomId}`,{timeLeft:qTimeLeft});
    if(qTimeLeft<=0){clearInterval(qTimer);await revealQuizAnswer();}
  },1000);
}
function stopQTimer(){if(qTimer){clearInterval(qTimer);qTimer=null;}}
async function revealQuizAnswer(){
  if(!UI.quizRoomId||!UI.quizRoom)return;
  const room=UI.quizRoom;
  const qi=room.currentQuestion||0;
  const q=(room.shuffled||QQ)[qi];if(!q)return;
  const updates={};const lastPts={};
  const players=room.players||{};const answers=room.answers||{};const times=room.answerTimes||{};
  Object.entries(players).forEach(([pid,p])=>{
    const ans=answers[pid];const t=times[pid]||0;
    if(ans===q.cor){const pts=Math.max(100,Math.round(1000*(t/QTIME)));updates[`players/${pid}/score`]=(p.score||0)+pts;lastPts[pid]=pts;}
    else lastPts[pid]=0;
  });
  await fbUpd(`quiz/rooms/${UI.quizRoomId}`,{...updates,showAnswers:true,lastPoints:lastPts,status:'leaderboard'});
}

/* ── NOTIF PANEL — click outside closes ── */
document.addEventListener('click',e=>{
  if(UI.notifOpen&&!e.target.closest('#notif-panel')&&!e.target.closest('[data-notif]')){
    UI.notifOpen=false;document.getElementById('notif-panel').className='';
  }
});

/* ── OVERRIDE renderMain to support viewProfile ── */
const _renderMain=renderMain;
window.viewProfile=id=>{
  window._profileId=id;PAGE='profile';
  // Override profile rendering for non-self
  const origBuildProfile=buildProfile;
  renderMain();
};
// Fix profile rendering to use _profileId when set
const origRenderMain=renderMain;
function renderMain(){
  const el=document.getElementById('main');
  if(!el||!USER)return;
  if(PAGE==='feed')el.innerHTML=buildFeed();
  else if(PAGE==='profile')el.innerHTML=buildProfile(window._profileId||USER.id);
  else if(PAGE==='team')el.innerHTML=buildTeam();
  else if(PAGE==='calendar')el.innerHTML=buildCalendar();
  else if(PAGE==='files')el.innerHTML=buildFiles();
  else if(PAGE==='messages')el.innerHTML=buildMessages();
  else if(PAGE==='game')el.innerHTML=buildGame();
  else if(PAGE==='quiz')el.innerHTML=buildQuiz();
  else if(PAGE==='kanban')el.innerHTML=buildKanban();
  else if(PAGE==='wiki')el.innerHTML=buildWiki();
  else if(PAGE==='tools')el.innerHTML=buildTools();
  if(PAGE==='messages'&&UI.activeDM)setTimeout(()=>scroll('dm-msgs'),60);
}
window.nav=function(page){
  PAGE=page;UI.selDay=null;
  if(page!=='profile')window._profileId=USER?.id;
  renderSidebar();renderMain();renderBottomNav();
  if(page==='messages'&&UI.activeDM)setTimeout(()=>scroll('dm-msgs'),80);
};

/* ── INIT ── */
const saved=sessionStorage.getItem('rs_user');
if(saved){
  try{
    USER=JSON.parse(saved);
    showApp();
    renderNavRight();renderSidebar();renderMain();renderRightbar();renderBottomNav();
    startListeners();
  }catch(e){
    document.getElementById('loading').style.display='none';
    PAGE='login';renderAuth();
  }
}else{
  document.getElementById('loading').style.display='none';
  PAGE='login';renderAuth();
}
</script>
