/* ── ACTIONS ── */
window.quizCreate = async()=>{
  const pin = makePin();
  const me = S.members[S.user.id]||S.user;
  const playerData = {id:me.id,name:me.name,avatar:me.avatar||'',color:me.color||COLORS[0],score:0};
  const room = {
    hostId:me.id,
    status:'waiting',
    currentQuestion:0,
    players:{[me.id]:playerData},
    answers:{},
    showAnswers:false,
    timeLeft:QUIZ_TIME,
    lastPoints:{},
    createdAt:Date.now()
  };
  await fbSet(`quiz/rooms/${pin}`, room);
  S.quizRoomId = pin;
  fbListen(`quiz/rooms/${pin}`, v=>{
    S.quizRoom=v;
    if(S.page==='quiz') rerender();
  });
  rerender();
};

window.quizJoin = async()=>{
  const pin = (document.getElementById('quiz-pin-inp')?.value||'').trim();
  if(pin.length!==4){showToast('Введите 4-значный PIN',true);return;}
  const room = await fbGet(`quiz/rooms/${pin}`);
  if(!room){showToast('Комната не найдена',true);return;}
  if(room.status!=='waiting'){showToast('Игра уже началась',true);return;}
  const me = S.members[S.user.id]||S.user;
  const playerData = {id:me.id,name:me.name,avatar:me.avatar||'',color:me.color||COLORS[0],score:0};
  await fbUpd(`quiz/rooms/${pin}/players`,{[me.id]:playerData});
  S.quizRoomId = pin;
  fbListen(`quiz/rooms/${pin}`, v=>{
    S.quizRoom=v;
    if(S.page==='quiz') rerender();
  });
  rerender();
};

window.quizStart = async()=>{
  if(!S.quizRoomId)return;
  const questions = shuffleQuiz(QUIZ_QUESTIONS).slice(0,15);
  await fbUpd(`quiz/rooms/${S.quizRoomId}`,{
    status:'question', currentQuestion:0,
    questionOrder: questions.map((_,i)=>i),
    shuffledQuestions: questions,
    answers:{}, showAnswers:false,
    timeLeft:QUIZ_TIME, lastPoints:{}
  });
  startQuizTimer();
};

window.quizAnswer = async(idx)=>{
  if(!S.quizRoomId||!S.quizRoom)return;
  const room = S.quizRoom;
  if(room.answers&&room.answers[S.user.id]!==undefined)return;
  const timeLeft = room.timeLeft||0;
  // Score: max 1000 points, decreases with time
  const pts = Math.max(100, Math.round(1000*(timeLeft/QUIZ_TIME)));
  await fbUpd(`quiz/rooms/${S.quizRoomId}/answers`,{[S.user.id]:idx});
  // Store time-based score for this answer
  await fbUpd(`quiz/rooms/${S.quizRoomId}/answerTimes`,{[S.user.id]:timeLeft});
  rerender();
};

window.quizNextQuestion = async()=>{
  if(!S.quizRoomId||!S.quizRoom)return;
  stopQuizTimer();
  const room = S.quizRoom;
  const next = (room.currentQuestion||0)+1;
  if(next >= (room.shuffledQuestions||QUIZ_QUESTIONS).length){
    await quizFinish(); return;
  }
  await fbUpd(`quiz/rooms/${S.quizRoomId}`,{
    status:'question', currentQuestion:next,
    answers:{}, showAnswers:false,
    timeLeft:QUIZ_TIME, lastPoints:{}
  });
  startQuizTimer();
};

window.quizFinish = async()=>{
  if(!S.quizRoomId)return;
  stopQuizTimer();
  await fbUpd(`quiz/rooms/${S.quizRoomId}`,{status:'finished'});
};

window.quizLeave = async()=>{
  stopQuizTimer();
  if(S.quizRoomId&&S.user){
    await fbDel(`quiz/rooms/${S.quizRoomId}/players/${S.user.id}`);
  }
  S.quizRoomId=null; S.quizRoom=null;
  rerender();
};

window.quizRestart = async()=>{
  if(!S.quizRoomId||!S.quizRoom)return;
  const players = S.quizRoom.players||{};
  // Reset scores
  const resetPlayers = {};
  Object.entries(players).forEach(([id,p])=>{resetPlayers[id]={...p,score:0};});
  await fbUpd(`quiz/rooms/${S.quizRoomId}`,{
    status:'waiting', currentQuestion:0,
    players:resetPlayers, answers:{}, showAnswers:false,
    timeLeft:QUIZ_TIME, lastPoints:{}
  });
};

/* ── TIMER (host only) ── */
function startQuizTimer(){
  stopQuizTimer();
  if(!quizIsHost(S.quizRoom))return;
  quizTimeLeft = QUIZ_TIME;
  quizTimer = setInterval(async()=>{
    quizTimeLeft--;
    if(!S.quizRoomId)return clearInterval(quizTimer);
    await fbUpd(`quiz/rooms/${S.quizRoomId}`,{timeLeft:quizTimeLeft});
    if(quizTimeLeft<=0){
      clearInterval(quizTimer);
      await quizRevealAnswer();
    }
  },1000);
}

function stopQuizTimer(){
  if(quizTimer){clearInterval(quizTimer);quizTimer=null;}
}

async function quizRevealAnswer(){
  if(!S.quizRoomId||!S.quizRoom)return;
  const room = S.quizRoom;
  const qi = room.currentQuestion||0;
  const qs = room.shuffledQuestions||QUIZ_QUESTIONS;
  const q = qs[qi];
  if(!q)return;
  // Calculate points for each player
  const updates = {};
  const lastPts = {};
  const players = room.players||{};
  const answers = room.answers||{};
  const times = room.answerTimes||{};
  Object.entries(players).forEach(([pid,p])=>{
    const ans = answers[pid];
    const t = times[pid]||0;
    if(ans===q.cor){
      const pts = Math.max(100, Math.round(1000*(t/QUIZ_TIME)));
      updates[`players/${pid}/score`] = (p.score||0)+pts;
      lastPts[pid] = pts;
    } else {
      lastPts[pid] = 0;
    }
  });
  await fbUpd(`quiz/rooms/${S.quizRoomId}`,{
    ...updates, showAnswers:true, lastPoints:lastPts, status:'leaderboard'
  });
}

function shuffleQuiz(arr){
  return arr.slice().sort(()=>Math.random()-.5);
}


/* ══════════════════════════════════════════════════════
   ВИКТОРИНА — KAHOOT-STYLE

/* ── HELPERS ── */
function quizPIN(){
  return String(Math.floor(1000+Math.random()*9000));
}
function quizShuffle(arr){
  return arr.slice().sort(()=>Math.random()-.5);
}
function getQSet(n=20){
  // Берём по несколько вопросов из каждой категории
  const cats={};
  QUIZ_QUESTIONS.forEach((q,i)=>{
    if(!cats[q.cat])cats[q.cat]=[];
    cats[q.cat].push(i);
  });
  const selected=[];
  Object.values(cats).forEach(idxs=>{
    quizShuffle(idxs).slice(0,Math.ceil(n/Object.keys(cats).length)+1).forEach(i=>selected.push(i));
  });
  return quizShuffle(selected).slice(0,n).map(i=>QUIZ_QUESTIONS[i]);
}

let _quizTimer=null;

function clearQuizTimer(){ if(_quizTimer){clearInterval(_quizTimer);_quizTimer=null;} }

/* ── RENDER QUIZ ── */
function renderQuiz(){
  const r=S.quizRoom;
  const rid=S.quizRoomId;

  // No room
  if(!r||!rid) return renderQuizLobby();

  // Check I'm in this room
  const allP=[...Object.values(r.players||{})];
  const me=allP.find(p=>p.id===S.user.id);
  if(!me) return renderQuizLobby();

  // Final
  if(r.status==='finished') return renderQuizFinal(r);

  // Between questions — show leaderboard
  if(r.status==='leaderboard') return renderQuizLeaderboard(r,false);

  // Question active
  if(r.status==='question') return renderQuizQuestion(r,me);

  // Waiting room
  return renderQuizWaiting(r);
}

function renderQuizQuestion(r,me){
  const qi=r.currentQ||0;
  const q=(r.questions||[])[qi];
  if(!q) return renderQuizLobby();

  const isHost=r.hostId===S.user.id;
  const total=(r.questions||[]).length;
  const timeLeft=r.timeLeft!==undefined?r.timeLeft:20;
  const timerPct=(timeLeft/20*100).toFixed(1);
  const myAnswers=r.answers||{};
  const myAns=myAnswers[S.user.id];
  const answered=myAns!==undefined;
  const answersCount=Object.keys(myAnswers).length;
  const totalPlayers=Object.keys(r.players||{}).length;
  const myScore=(r.scores&&r.scores[S.user.id])||0;
  const urgent=timeLeft<=5;

  // If already answered — show waiting
  if(answered&&!isHost){
    return`<div class="quiz-wrap">
      <div class="quiz-question-screen">
        <div class="quiz-topbar">
          <div class="quiz-q-num">ВОПРОС ${qi+1} / ${total}</div>
          <div class="quiz-timer-wrap">
            <div class="quiz-timer ${urgent?'urgent':''}">${timeLeft}</div>
            <div class="quiz-timer-bar-wrap">
              <div class="quiz-timer-bar ${urgent?'urgent':''}" style="width:${timerPct}%"></div>
            </div>
          </div>
          <div><div class="quiz-score-display">${myScore}</div><div class="quiz-score-label">очков</div></div>
        </div>
        <div class="quiz-waiting-answer">
          <div class="qwa-icon">⏳</div>
          <div style="font-family:'Space Grotesk';font-size:18px;font-weight:700;margin-bottom:.5rem">Ответ принят!</div>
          <div style="font-size:14px;color:var(--t2)">Ждём остальных… ${answersCount}/${totalPlayers}</div>
        </div>
      </div>
    </div>`;
  }

  return`<div class="quiz-wrap">
    <div class="quiz-question-screen">
      <!-- Top bar -->
      <div class="quiz-topbar">
        <div class="quiz-q-num">ВОПРОС ${qi+1} / ${total} · <span style="color:var(--accent)">${escH(q.cat)}</span></div>
        <div class="quiz-timer-wrap">
          <div class="quiz-timer ${urgent?'urgent':''}" id="quiz-timer-num">${timeLeft}</div>
          <div class="quiz-timer-bar-wrap">
            <div class="quiz-timer-bar ${urgent?'urgent':''}" id="quiz-timer-bar" style="width:${timerPct}%"></div>
          </div>
        </div>
        <div>
          <div class="quiz-score-display">${myScore}</div>
          <div class="quiz-score-label">очков</div>
        </div>
      </div>

      <!-- Question card -->
      <div class="quiz-card">
        <div class="quiz-q-cat">${escH(q.cat)}</div>
        <div class="quiz-q-text">${escH(q.q)}</div>
        ${isHost?`<div style="font-size:13px;color:var(--t2);margin-top:.75rem">Ответили: ${answersCount} / ${totalPlayers}</div>`:''}
      </div>

      <!-- Answer buttons -->
      <div class="quiz-answers">
        ${q.opts.map((opt,i)=>{
          const icons=['▲','◆','●','★'];
          return`<button class="quiz-answer qa-${i} ${answered&&myAns===i?'selected':''}"
            ${answered||isHost?'disabled':''} onclick="quizAnswer(${i})">
            <span class="qa-icon">${icons[i]}</span>
            <span class="qa-text">${escH(opt)}</span>
          </button>`;
        }).join('')}
      </div>

      ${isHost?`
        <div style="text-align:center">
          <button class="qbtn qbtn-primary" onclick="quizNextStep()">
            ${qi+1>=total?'Завершить':'Следующий вопрос →'}
          </button>
        </div>`:''}
    </div>
  </div>`;
}

function renderQuizLeaderboard(r,isFinal){
  const players=Object.values(r.players||{});
  const scores=r.scores||{};
  const qi=r.currentQ||0;
  const total=(r.questions||[]).length;
  const isHost=r.hostId===S.user.id;
  const lastQ=(r.questions||[])[Math.max(0,qi-1)];
  const lastAns=r.answers||{};

  const sorted=players.map(p=>({
    ...p,score:scores[p.id]||0,
    answered:lastAns[p.id]!==undefined,
    correct:lastAns[p.id]===((r.questions||[])[r.currentQ>=total?total-1:r.currentQ-1]||{}).ans
  })).sort((a,b)=>b.score-a.score);

  const medals=['🥇','🥈','🥉'];

  return`<div class="quiz-wrap">
    <div class="quiz-question-screen">
      ${lastQ?`
      <div class="quiz-result-overlay">
        <div class="qro-emoji">${lastQ.ans!==undefined?'✅':''}</div>
        <div class="qro-correct">Правильный ответ: ${escH(lastQ.opts[lastQ.ans])}</div>
        <div class="qro-explain">${escH(lastQ.explain||'')}</div>
      </div>`:''}
      <div class="quiz-leaderboard">
        <div class="qlb-title">🏆 Таблица лидеров</div>
        ${sorted.slice(0,10).map((p,i)=>`
          <div class="qlb-item ${i===0?'top-1':i===1?'top-2':i===2?'top-3':''} ${p.id===S.user.id?'me':''}">
            <div class="qlb-rank">${i<3?medals[i]:i+1}</div>
            ${avImg(p.avatar,p.name,32,p.color||COLORS[0])}
            <div style="flex:1;min-width:0">
              <div class="qlb-name">${escH(p.name)} ${p.id===S.user.id?'<span style="font-size:11px;color:var(--accent)">(вы)</span>':''}</div>
              <div class="qlb-streak">${p.answered?(p.correct?'✅ верно':'❌ неверно'):'— не ответил'}</div>
            </div>
            <div class="qlb-score">+${p.score}</div>
          </div>`).join('')}
      </div>
      ${isHost?`
        <div style="text-align:center">
          <button class="qbtn qbtn-primary" onclick="quizNextQuestion()">
            ${qi>=total?'Завершить игру 🏁':'Следующий вопрос →'}
          </button>
        </div>`:`<div style="text-align:center;font-size:14px;color:var(--t2)">Ждём ведущего…</div>`}
    </div>
  </div>`;
}

function renderQuizFinal(r){
  const players=Object.values(r.players||{});
  const scores=r.scores||{};
  const isHost=r.hostId===S.user.id;
  const sorted=players.map(p=>({...p,score:scores[p.id]||0})).sort((a,b)=>b.score-a.score);
  const winner=sorted[0];
  const medals=['🥇','🥈','🥉'];

  return`<div class="quiz-wrap">
    <div class="quiz-question-screen">
      <div class="quiz-final">
        <div class="quiz-winner-trophy">🏆</div>
        <div class="quiz-winner-name">${escH(winner?.name||'?')}</div>
        <div class="quiz-winner-sub">Победитель викторины · ${scores[winner?.id]||0} очков</div>
        <div style="display:flex;gap:.75rem;justify-content:center;flex-wrap:wrap">
          ${isHost?`<button class="qbtn qbtn-primary" onclick="quizRestart()">🔄 Играть снова</button>`:''}
          <button class="qbtn qbtn-secondary" onclick="quizLeave()">Выйти</button>
        </div>
      </div>
      <div class="quiz-leaderboard" style="margin-top:1rem">
        <div class="qlb-title">Итоговая таблица</div>
        ${sorted.map((p,i)=>`
          <div class="qlb-item ${i===0?'top-1':i===1?'top-2':i===2?'top-3':''} ${p.id===S.user.id?'me':''}">
            <div class="qlb-rank">${i<3?medals[i]:i+1}</div>
            ${avImg(p.avatar,p.name,32,p.color||COLORS[0])}
            <div style="flex:1"><div class="qlb-name">${escH(p.name)}</div></div>
            <div class="qlb-score">${p.score}</div>
          </div>`).join('')}
      </div>
    </div>
  </div>`;
}

/* ── QUIZ ACTIONS ── */
window.quizShowJoin = ()=>{
  const f=document.getElementById('quiz-join-form');
  if(f){f.style.display=f.style.display==='none'?'block':'none';}
  setTimeout(()=>document.getElementById('quiz-pin-inp')?.focus(),50);
};

window.quizCreate = async()=>{
  const me=S.members[S.user.id]||S.user;
  const pin=quizPIN();
  const qs=getQSet(20);
  const room={
    hostId:me.id,
    status:'waiting',
    currentQ:0,
    timeLeft:20,
    questions:qs,
    players:{[me.id]:{id:me.id,name:me.name,avatar:me.avatar||'',color:me.color||COLORS[0]}},
    scores:{},
    answers:{},
    createdAt:Date.now()
  };
  await fbSet(`quiz/${pin}`,room);
  S.quizRoomId=pin;
  fbListen(`quiz/${pin}`,v=>{S.quizRoom=v;if(S.page==='quiz')rerender();});
  showToast(`Комната создана! PIN: ${pin}`);
  rerender();
};

window.quizJoin = async()=>{
  const pin=(document.getElementById('quiz-pin-inp')?.value||'').trim();
  if(pin.length!==4){showToast('Введите 4-значный PIN',true);return;}
  const room=await fbGet(`quiz/${pin}`);
  if(!room){showToast('Комната не найдена',true);return;}
  if(room.status!=='waiting'){showToast('Игра уже началась',true);return;}
  const me=S.members[S.user.id]||S.user;
  await fbUpd(`quiz/${pin}/players`,{
    [me.id]:{id:me.id,name:me.name,avatar:me.avatar||'',color:me.color||COLORS[0]}
  });
  S.quizRoomId=pin;
  fbListen(`quiz/${pin}`,v=>{S.quizRoom=v;if(S.page==='quiz')rerender();});
  rerender();
};

window.quizStart = async()=>{
  if(!S.quizRoomId)return;
  await fbUpd(`quiz/${S.quizRoomId}`,{status:'question',currentQ:0,timeLeft:20,answers:{},scores:{}});
  quizStartTimer();
};

function quizStartTimer(){
  clearQuizTimer();
  let t=20;
  _quizTimer=setInterval(async()=>{
    if(!S.quizRoomId||S.quizRoom?.hostId!==S.user.id){clearQuizTimer();return;}
    t--;
    await fbUpd(`quiz/${S.quizRoomId}`,{timeLeft:t});
    if(t<=0){
      clearQuizTimer();
      // Auto-advance to leaderboard
      await quizShowLeaderboard();
    }
  },1000);
}

async function quizShowLeaderboard(){
  if(!S.quizRoomId)return;
  const r=await fbGet(`quiz/${S.quizRoomId}`);
  if(!r)return;
  // Calculate scores for this round
  const qi=r.currentQ||0;
  const q=(r.questions||[])[qi];
  const answers=r.answers||{};
  const scores={...(r.scores||{})};
  const timeLeft=r.timeLeft||0;
  Object.entries(answers).forEach(([pid,ans])=>{
    if(ans===q?.ans){
      // Points: base 500 + up to 500 for speed
      const speedBonus=Math.round((timeLeft/20)*500);
      scores[pid]=(scores[pid]||0)+500+speedBonus;
    }
  });
  await fbUpd(`quiz/${S.quizRoomId}`,{status:'leaderboard',scores,currentQ:qi+1});
}

window.quizNextStep = async()=>{
  if(!S.quizRoomId||!S.quizRoom)return;
  if(S.quizRoom.hostId!==S.user.id)return;
  clearQuizTimer();
  await quizShowLeaderboard();
};

window.quizNextQuestion = async()=>{
  if(!S.quizRoomId||!S.quizRoom)return;
  if(S.quizRoom.hostId!==S.user.id)return;
  const qi=S.quizRoom.currentQ||0;
  const total=(S.quizRoom.questions||[]).length;
  if(qi>=total){
    await fbUpd(`quiz/${S.quizRoomId}`,{status:'finished'});
    return;
  }
  await fbUpd(`quiz/${S.quizRoomId}`,{status:'question',timeLeft:20,answers:{}});
  quizStartTimer();
};

window.quizAnswer = async(idx)=>{
  if(!S.quizRoomId||!S.quizRoom)return;
  const r=S.quizRoom;
  if(r.status!=='question')return;
  const myAnswers=r.answers||{};
  if(myAnswers[S.user.id]!==undefined)return; // already answered
  await fbUpd(`quiz/${S.quizRoomId}/answers`,{[S.user.id]:idx});
};

window.quizRestart = async()=>{
  if(!S.quizRoomId||!S.quizRoom)return;
  const qs=getQSet(20);
  await fbUpd(`quiz/${S.quizRoomId}`,{
    status:'waiting',currentQ:0,timeLeft:20,
    questions:qs,scores:{},answers:{}
  });
};

window.quizLeave = async()=>{
  if(!S.quizRoomId)return;
  const me=S.user.id;
  const r=S.quizRoom;
  if(r&&r.hostId===me){
    // Host leaves — delete room
    await fbDel(`quiz/${S.quizRoomId}`);
  } else {
    await fbDel(`quiz/${S.quizRoomId}/players/${me}`);
  }
  clearQuizTimer();
  S.quizRoomId=null;
  S.quizRoom=null;
  rerender();
};

document.addEventListener('click',e=>{
  if(S.notifOpen&&!e.target.closest('#npanel')&&!e.target.closest('[data-notif]')){
    S.notifOpen=false;document.getElementById('npanel').className='notif-panel';
  }
});
</script>
