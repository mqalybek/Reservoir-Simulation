<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RS Team Portal — Reservoir Simulation</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0e17;--bg2:#111827;--bg3:#1a2236;--bg4:#212d42;
  --accent:#4f8ef7;--accent2:#3a7ae0;--accentg:#4ff7c0;
  --gold:#f7c44f;--red:#f75f5f;--green:#4ff7a0;
  --t1:#f0f4ff;--t2:#8fa3c0;--t3:#4a6080;
  --border:rgba(79,142,247,0.12);--border2:rgba(79,142,247,0.25);
  --card:rgba(17,24,39,0.9);--r:10px;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 80% 50% at 50% -20%,rgba(79,142,247,0.08),transparent),
  linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);
  background-size:100% 100%,48px 48px,48px 48px;pointer-events:none;z-index:0}
.app{position:relative;z-index:1;display:flex;flex-direction:column;min-height:100vh}

/* NAV */
nav{display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;height:56px;
  background:rgba(10,14,23,0.95);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200;backdrop-filter:blur(16px)}
.logo{display:flex;align-items:center;gap:8px}
.logo-mark{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,var(--accent),var(--accentg));
  display:flex;align-items:center;justify-content:center;font-family:'Syne';font-size:12px;font-weight:700;color:#000}
.logo-text{font-family:'Syne';font-size:14px;font-weight:600;color:var(--t1);letter-spacing:.5px}
.logo-sub{font-size:11px;color:var(--t3);margin-left:4px}
.nav-tabs{display:flex;gap:2px}
.ntab{padding:6px 13px;border-radius:7px;cursor:pointer;font-size:13px;font-weight:500;color:var(--t2);
  transition:all .2s;border:none;background:none;font-family:'Inter'}
.ntab:hover{color:var(--t1);background:var(--bg3)}
.ntab.active{color:var(--accent);background:rgba(79,142,247,0.12)}
.nav-right{display:flex;align-items:center;gap:8px}
.notif-btn{position:relative;background:none;border:1px solid var(--border);border-radius:8px;width:34px;height:34px;
  cursor:pointer;color:var(--t2);display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .2s}
.notif-btn:hover{border-color:var(--accent);color:var(--accent)}
.notif-badge{position:absolute;top:-4px;right:-4px;background:var(--red);color:#fff;
  border-radius:50%;width:16px;height:16px;font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center}
.nav-av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accentg));
  display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#000;cursor:pointer;border:2px solid transparent;transition:all .2s}
.nav-av:hover{border-color:var(--accent)}
.btn-out{padding:5px 11px;border-radius:7px;border:1px solid var(--border);background:none;color:var(--t3);font-size:12px;cursor:pointer;transition:all .2s;font-family:'Inter'}
.btn-out:hover{border-color:var(--red);color:var(--red)}

/* NOTIF PANEL */
.notif-panel{position:fixed;top:60px;right:1rem;width:320px;background:var(--bg2);border:1px solid var(--border2);
  border-radius:var(--r);z-index:300;box-shadow:0 16px 48px rgba(0,0,0,.5);display:none}
.notif-panel.open{display:block}
.np-head{padding:14px 16px 10px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.np-title{font-family:'Syne';font-size:13px;font-weight:600;color:var(--t1)}
.np-clear{font-size:11px;color:var(--accent);cursor:pointer;border:none;background:none;font-family:'Inter'}
.np-item{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:flex-start}
.np-item.unread{background:rgba(79,142,247,0.05)}
.np-icon{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;background:rgba(79,142,247,0.1)}
.np-body{flex:1}
.np-text{font-size:12px;color:var(--t1);line-height:1.5}
.np-time{font-size:11px;color:var(--t3);margin-top:2px}
.np-empty{padding:1.5rem;text-align:center;font-size:13px;color:var(--t3)}

/* AUTH */
.auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem}
.auth-wrap{width:100%;max-width:400px}
.auth-header{text-align:center;margin-bottom:2rem}
.auth-logo{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,var(--accent),var(--accentg));
  margin:0 auto 1rem;display:flex;align-items:center;justify-content:center;font-family:'Syne';font-size:18px;font-weight:700;color:#000}
.auth-title{font-family:'Syne';font-size:24px;font-weight:700;margin-bottom:6px}
.auth-sub{font-size:13px;color:var(--t2)}
.auth-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:2rem;backdrop-filter:blur(20px)}
.atabs{display:flex;background:var(--bg3);border-radius:8px;padding:3px;margin-bottom:1.5rem;gap:3px}
.atab{flex:1;padding:7px;text-align:center;cursor:pointer;font-size:13px;font-weight:500;color:var(--t2);
  border-radius:6px;border:none;background:none;transition:all .2s;font-family:'Inter'}
.atab.active{background:var(--bg2);color:var(--accent);border:1px solid var(--border)}
.fg{margin-bottom:1rem}
label{display:block;font-size:11px;color:var(--t3);margin-bottom:5px;font-weight:500;letter-spacing:.5px}
input,select,textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;
  padding:9px 13px;color:var(--t1);font-size:13px;font-family:'Inter';transition:border .2s;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
input::placeholder,textarea::placeholder{color:var(--t3)}
select option{background:var(--bg2)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{width:100%;padding:10px;border-radius:8px;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;font-weight:600;font-size:14px;cursor:pointer;transition:all .2s;font-family:'Inter';margin-top:4px}
.btn:hover{opacity:.9;transform:translateY(-1px)}
.auth-hint{text-align:center;font-size:12px;color:var(--t3);margin-top:1rem}
.auth-hint span{color:var(--accent);cursor:pointer}

/* SHELL */
.shell{display:flex;flex:1;min-height:calc(100vh - 56px)}
.content{flex:1;overflow-y:auto;padding:1.5rem}

/* PAGE */
.ph{margin-bottom:1.5rem}
.pt{font-family:'Syne';font-size:18px;font-weight:700}
.ps{font-size:13px;color:var(--t2);margin-top:3px}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem;backdrop-filter:blur(10px)}

/* TEAM GRID */
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:.75rem}
.mcard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem;
  cursor:pointer;transition:all .25s}
.mcard:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 24px rgba(79,142,247,.12)}
.mcard-top{display:flex;gap:10px;align-items:center;margin-bottom:10px}
.mav{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;flex-shrink:0;border:2px solid var(--border2)}
.mname{font-size:14px;font-weight:600}
.mrole{font-size:11px;color:var(--accent);margin-top:2px;font-weight:500}
.msep{border:none;border-top:1px solid var(--border);margin:10px 0}
.mrow{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px}
.mrow span:first-child{color:var(--t2)}
.mtags{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.tag{padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;letter-spacing:.3px;
  background:rgba(79,142,247,.1);color:var(--accent);border:1px solid rgba(79,142,247,.2)}
.tag.vac{background:rgba(247,196,79,.1);color:var(--gold);border-color:rgba(247,196,79,.2)}
.tag.skill{background:rgba(79,247,192,.08);color:var(--accentg);border-color:rgba(79,247,192,.2)}

/* STATUS DOT */
.sdot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:4px}
.sdot.on{background:var(--green)}
.sdot.vac{background:var(--gold)}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:400;display:flex;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(6px)}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;width:100%;max-width:520px;max-height:88vh;overflow-y:auto;padding:2rem}
.mhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem}
.mtitle{font-family:'Syne';font-size:16px;font-weight:700}
.btnx{background:none;border:1px solid var(--border);color:var(--t2);width:30px;height:30px;border-radius:6px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.btnx:hover{border-color:var(--red);color:var(--red)}
.mav-lg{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;margin:0 auto 1rem;border:3px solid var(--border2)}
.mn{text-align:center;font-family:'Syne';font-size:17px;font-weight:700}
.mr-lbl{text-align:center;font-size:12px;color:var(--accent);margin-top:4px;margin-bottom:1.5rem;font-weight:500}
.igrid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1rem}
.iitem .il{font-size:10px;color:var(--t3);letter-spacing:.5px;margin-bottom:3px}
.iitem .iv{font-size:13px;font-weight:500}
.sec{font-size:10px;color:var(--t3);letter-spacing:1px;margin:1rem 0 .5rem;border-bottom:1px solid var(--border);padding-bottom:6px}

/* CALENDAR */
.cal-wrap{margin-bottom:1.25rem;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem}
.cal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
.cal-m{font-family:'Syne';font-size:15px;font-weight:700}
.cal-nav{display:flex;gap:4px}
.cnbtn{padding:5px 9px;border-radius:6px;border:1px solid var(--border);background:none;color:var(--t2);cursor:pointer;font-size:12px;transition:all .2s;font-family:'Inter'}
.cnbtn:hover{border-color:var(--accent);color:var(--accent)}
.cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cdh{text-align:center;font-size:10px;color:var(--t3);padding:4px;font-weight:500;letter-spacing:.3px}
.cday{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:6px;font-size:12px;cursor:default;position:relative;transition:all .15s;color:var(--t2)}
.cday.cur{background:rgba(79,142,247,.2);color:var(--accent);font-weight:700}
.cday.hol{background:rgba(247,196,79,.12);color:var(--gold)}
.cday.vac{background:rgba(79,247,160,.08)}
.cday .dd{position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--accentg)}
.cleg{display:flex;gap:1rem;margin-top:.75rem;flex-wrap:wrap}
.li{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--t2)}
.ld{width:10px;height:10px;border-radius:3px}

/* EVENTS */
.evlist{display:flex;flex-direction:column;gap:6px}
.evitem{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:9px 12px;display:flex;align-items:center;gap:10px}
.evbar{width:3px;height:32px;border-radius:2px;flex-shrink:0}
.evinfo{flex:1}
.evt{font-size:12px;font-weight:600}
.evm{font-size:11px;color:var(--t2);margin-top:2px}

/* FILES */
.upzone{border:2px dashed var(--border);border-radius:10px;padding:1.5rem;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:1rem}
.upzone:hover{border-color:var(--accent);background:rgba(79,142,247,.04)}
.upico{font-size:28px;margin-bottom:6px}
.upt{font-size:13px;color:var(--t2)}
.upt span{color:var(--accent);font-weight:500}
.flist{display:flex;flex-direction:column;gap:6px}
.fitem{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:9px 13px;display:flex;align-items:center;gap:10px}
.fico{font-size:18px}
.fi{flex:1}
.fn{font-size:13px;font-weight:500}
.fm{font-size:11px;color:var(--t3);margin-top:1px}
.fdel{background:none;border:none;color:var(--t3);cursor:pointer;font-size:13px;transition:color .2s;padding:4px}
.fdel:hover{color:var(--red)}

/* PROFILE */
.pcard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1.5rem;margin-bottom:1rem}
.ptop{display:flex;align-items:center;gap:1.25rem;margin-bottom:1.25rem}
.pav{width:68px;height:68px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;flex-shrink:0;border:3px solid var(--border2)}
.pname{font-family:'Syne';font-size:18px;font-weight:700}
.prole{color:var(--accent);font-size:13px;margin-top:3px;font-weight:500}
.pemail{color:var(--t2);font-size:12px;margin-top:2px}
.btedit{padding:7px 14px;border-radius:7px;border:1px solid var(--border);background:none;color:var(--t2);font-size:12px;cursor:pointer;transition:all .2s;font-family:'Inter'}
.btedit:hover{border-color:var(--accent);color:var(--accent)}
.sep{border:none;border-top:1px solid var(--border);margin:1rem 0}

/* CHAT */
.chat-layout{display:flex;flex:1;height:calc(100vh - 56px)}
.chat-sidebar{width:220px;flex-shrink:0;border-right:1px solid var(--border);overflow-y:auto;background:rgba(10,14,23,.6)}
.chat-main{flex:1;display:flex;flex-direction:column;min-height:0}
.chat-rooms{padding:.75rem .5rem}
.chat-room-title{font-size:10px;color:var(--t3);letter-spacing:1px;padding:4px 8px;margin-bottom:4px}
.croom{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;cursor:pointer;transition:all .2s;font-size:13px;color:var(--t2)}
.croom:hover{background:var(--bg3);color:var(--t1)}
.croom.active{background:rgba(79,142,247,.12);color:var(--accent)}
.croom-ico{width:28px;height:28px;border-radius:7px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.croom-name{font-size:13px;font-weight:500}
.croom-last{font-size:11px;color:var(--t3)}
.chat-header{padding:.875rem 1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0}
.chat-header-name{font-family:'Syne';font-size:14px;font-weight:700}
.chat-header-sub{font-size:11px;color:var(--t2)}
.messages{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:.625rem}
.msg{display:flex;gap:8px;align-items:flex-start;max-width:78%}
.msg.me{flex-direction:row-reverse;align-self:flex-end}
.msg-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;border:1px solid var(--border)}
.msg-body{}
.msg-meta{font-size:10px;color:var(--t3);margin-bottom:3px}
.msg.me .msg-meta{text-align:right}
.msg-bubble{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:8px 12px;font-size:13px;line-height:1.5;max-width:320px;word-break:break-word}
.msg.me .msg-bubble{background:rgba(79,142,247,.15);border-color:rgba(79,142,247,.25);color:var(--t1)}
.chat-input-bar{padding:.75rem 1rem;border-top:1px solid var(--border);display:flex;gap:8px;align-items:center;flex-shrink:0}
.chat-input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:8px;
  padding:8px 13px;color:var(--t1);font-size:13px;font-family:'Inter';outline:none;transition:border .2s}
.chat-input:focus{border-color:var(--accent)}
.chat-send{padding:8px 16px;border-radius:8px;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;font-weight:600;font-size:13px;cursor:pointer;transition:all .2s;font-family:'Inter';white-space:nowrap}
.chat-send:hover{opacity:.9}

/* TOAST */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;z-index:600;background:var(--bg2);border:1px solid var(--green);
  border-radius:8px;padding:10px 16px;font-size:12px;color:var(--green);display:none;max-width:280px}
.toast.show{display:block;animation:si .3s ease}
@keyframes si{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}

.empty{text-align:center;padding:2rem;color:var(--t3);font-size:13px}

@media(max-width:768px){
  .logo-sub{display:none}
  .nav-tabs .ntab{padding:5px 8px;font-size:11px}
  .row2{grid-template-columns:1fr}
  .igrid{grid-template-columns:1fr}
  .ptop{flex-direction:column;text-align:center}
  .chat-sidebar{width:60px}
  .croom-name,.croom-last{display:none}
  .chat-room-title{display:none}
}
@media(max-width:480px){
  nav{padding:0 .75rem}
  .nav-tabs{display:none}
  .content{padding:1rem}
}
</style>
</head>

function ls(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d}}
function lss(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}

let S = {
  page:'auth', authTab:'login', currentUser:null,
  members: ls('rs_members', DEMO_MEMBERS),
  files: ls('rs_files', []),
  vacations: ls('rs_vacs', []),
  msgs: ls('rs_msgs', DEMO_MSGS),
  notifications: ls('rs_notifs', []),
  calY: new Date().getFullYear(), calM: new Date().getMonth(),
  modalMember: null, editingProfile: false,
  activeRoom: 'general', notifOpen: false,
};

function save(){
  lss('rs_members',S.members); lss('rs_files',S.files);
  lss('rs_vacs',S.vacations); lss('rs_msgs',S.msgs);
  lss('rs_notifs',S.notifications);
}

function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2800);
}

function ini(n){return(n||'??').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()}

function hexA(hex,a){
  if(!hex||hex.length<7)return`rgba(79,142,247,${a})`;
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return`rgba(${r},${g},${b},${a})`;
}

function addNotif(text,icon='🔔'){
  const n={id:Date.now(),text,icon,time:new Date().toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'}),read:false};
  S.notifications.unshift(n);
  if(S.notifications.length>30)S.notifications.pop();
  save();
}

function unread(){return S.notifications.filter(n=>!n.read).length}

function render(){
  document.getElementById('app').innerHTML = S.page==='auth' ? renderAuth() : renderShell();
}

/* ═══ CALENDAR ═══ */
function renderCal(){
  const MN=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  const DN=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
  const y=S.calY, m=S.calM;
  const fd=new Date(y,m,1).getDay(), off=fd===0?6:fd-1, dim=new Date(y,m+1,0).getDate();
  const today=new Date();

  const vacD={};
  S.vacations.forEach(v=>{
    let d=new Date(v.from); const e=new Date(v.to);
    while(d<=e){
      const k=d.toISOString().split('T')[0];
      if(!vacD[k])vacD[k]=[];
      const mem=S.members.find(mb=>mb.id===v.memberId);
      if(mem)vacD[k].push(mem.name.split(' ')[0]);
      d.setDate(d.getDate()+1);
    }
  });

  let cells='';
  for(let i=0;i<off;i++) cells+=`<div></div>`;
  for(let d=1;d<=dim;d++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isT=d===today.getDate()&&m===today.getMonth()&&y===today.getFullYear();
    const isH=HOLIDAYS[ds]; const isV=vacD[ds];
    let cls='cday'; if(isT)cls+=' cur'; if(isH)cls+=' hol'; if(isV)cls+=' vac';
    const tt=[isH,isV&&('Отпуск: '+isV.join(', '))].filter(Boolean).join(' | ');
    cells+=`<div class="${cls}" title="${tt}">${d}${isV?'<div class="dd"></div>':''}</div>`;
  }

  const mStr=`${y}-${String(m+1).padStart(2,'0')}`;
  const mH=Object.entries(HOLIDAYS).filter(([k])=>k.startsWith(mStr));
  const mV=S.vacations.filter(v=>v.from.substring(0,7)===mStr);

  return `
    <div class="ph"><div class="pt">Календарь</div><div class="ps">Праздники и отпуска команды</div></div>
    <div class="cal-wrap">
      <div class="cal-hd">
        <div class="cal-m">${MN[m]} ${y}</div>
        <div class="cal-nav">
          <button class="cnbtn" onclick="cn(-1)">← Пред</button>
          <button class="cnbtn" onclick="cn(1)">След →</button>
        </div>
      </div>
      <div class="cgrid">
        ${DN.map(d=>`<div class="cdh">${d}</div>`).join('')}
        ${cells}
      </div>
      <div class="cleg">
        <div class="li"><div class="ld" style="background:rgba(79,142,247,.4)"></div>Сегодня</div>
        <div class="li"><div class="ld" style="background:rgba(247,196,79,.4)"></div>Праздник РК</div>
        <div class="li"><div class="ld" style="background:rgba(79,247,160,.3)"></div>Отпуск коллеги</div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem">
      <div>
        <div class="sec" style="margin-top:0;border-top:none;padding-top:0">ПРАЗДНИКИ МЕСЯЦА</div>
        <div class="evlist">
          ${mH.length ? mH.map(([k,n])=>`
            <div class="evitem">
              <div class="evbar" style="background:var(--gold)"></div>
              <div class="evinfo"><div class="evt">${n}</div><div class="evm">${k}</div></div>
            </div>`).join('') : '<div class="empty" style="padding:1rem">Нет праздников</div>'}
        </div>
      </div>
      <div>
        <div class="sec" style="margin-top:0;border-top:none;padding-top:0">ОТПУСКА</div>
        <button class="btedit" style="width:100%;text-align:center;margin-bottom:8px" onclick="showVF()">+ Добавить мой отпуск</button>
        <div id="vf" style="display:none;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:8px">
          <div class="row2">
            <div class="fg"><label>С</label><input type="date" id="vfrom"></div>
            <div class="fg"><label>ПО</label><input type="date" id="vto"></div>
          </div>
          <button class="btn" onclick="saveVac()">Сохранить</button>
        </div>
        <div class="evlist">
          ${mV.length ? mV.map(v=>{
            const mem=S.members.find(mb=>mb.id===v.memberId);
            return `<div class="evitem">
              <div class="evbar" style="background:var(--green)"></div>
              <div class="evinfo"><div class="evt">${mem?mem.name:'Сотрудник'}</div><div class="evm">${v.from} — ${v.to}</div></div>
            </div>`;
          }).join('') : '<div class="empty" style="padding:1rem">Нет отпусков в этом месяце</div>'}
        </div>
      </div>
    </div>`;
}

/* ═══ FILES ═══ */
function renderFiles(){
  const myF = S.files.filter(f=>f.memberId===S.currentUser.id);
  const tmF = S.files.filter(f=>f.memberId!==S.currentUser.id);
  const ICONS={pdf:'📄',xlsx:'📊',xls:'📊',docx:'📝',doc:'📝',pptx:'📊',ppt:'📊',dat:'💾',txt:'📋',csv:'📊',png:'🖼',jpg:'🖼',jpeg:'🖼',zip:'📦',rar:'📦'};
  const fItem = (f,canDel) => {
    const ext=(f.name.split('.').pop()||'').toLowerCase();
    const mem=S.members.find(m=>m.id===f.memberId)||{name:''};
    return `<div class="fitem">
      <div class="fico">${ICONS[ext]||'📎'}</div>
      <div class="fi">
        <div class="fn">${f.name}</div>
        <div class="fm">${mem.name} · ${f.date} · ${f.size}</div>
      </div>
      ${canDel?`<button class="fdel" onclick="delF('${f.id}')" title="Удалить">🗑</button>`:''}
    </div>`;
  };
  return `
    <div class="ph"><div class="pt">Файлы</div><div class="ps">Документы, отчёты, модели отдела</div></div>
    <div class="upzone" onclick="document.getElementById('fi').click()">
      <div class="upico">📁</div>
      <div class="upt">Перетащите или <span>выберите файл</span></div>
      <div style="font-size:11px;color:var(--t3);margin-top:4px">PDF, XLSX, DOCX, DAT, CSV и другие</div>
      <input type="file" id="fi" style="display:none" onchange="upF(event)" multiple>
    </div>
    <div class="sec" style="margin-top:0;border-top:none;padding-top:0">МОИ ФАЙЛЫ (${myF.length})</div>
    ${myF.length ? `<div class="flist">${myF.map(f=>fItem(f,true)).join('')}</div>` : '<div class="empty">Вы ещё не загружали файлы</div>'}
    ${tmF.length ? `
      <div class="sep"></div>
      <div class="sec" style="border-top:none;padding-top:0">ФАЙЛЫ КОМАНДЫ (${tmF.length})</div>
      <div class="flist">${tmF.map(f=>fItem(f,false)).join('')}</div>` : ''}`;
}

        <div class="iitem"><div class="il">ОТДЕЛ</div><div class="iv">Reservoir Simulation</div></div>
        <div class="iitem"><div class="il">В КОМПАНИИ С</div><div class="iv">${me.joined||'—'}</div></div>
        <div class="iitem"><div class="il">ТЕЛЕФОН</div><div class="iv">${me.phone||'—'}</div></div>
        <div class="iitem"><div class="il">СТАТУС</div><div class="iv" style="color:var(--green)">● Активен</div></div>
      </div>
      <div class="sep"></div>
      <div class="sec" style="border-top:none;padding-top:0">НАВЫКИ</div>
      <div class="mtags">
        ${(me.skills||[]).map(s=>`<span class="tag skill">${s}</span>`).join('')||'<span style="color:var(--t3);font-size:13px">Не указаны — нажмите Редактировать</span>'}
      </div>
      ${me.bio?`<div class="sep"></div><div class="sec" style="border-top:none;padding-top:0">О СЕБЕ</div><p style="font-size:13px;color:var(--t2);line-height:1.7">${me.bio}</p>`:''}
    </div>`;
}

/* ═══ UTILS ═══ */
function escHtml(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function scrollMsgs(){
  const el=document.getElementById('msgs');
  if(el) el.scrollTop=el.scrollHeight;
}

/* ═══ ACTIONS ═══ */
function setAt(t){S.authTab=t;render()}

function gp(p){
  S.page=p; S.notifOpen=false; S.modalMember=null; S.editingProfile=false;
  render();
  if(p==='chat') setTimeout(scrollMsgs,50);
}

function logout(){S.currentUser=null;S.page='auth';render()}

function doLogin(){
  const email=(document.getElementById('le')||{}).value||'';
  if(!email){showToast('Введите email');return}
  let member=S.members.find(m=>m.email===email.trim());
  if(!member){
    // Demo mode: log in as first member
    member=S.members[0];
  }
  S.currentUser=member; S.page='team';
  addNotif(`Добро пожаловать, ${member.name.split(' ')[0]}! 👋`,'🏠');
  render();
}

function doReg(){
  const fn=(document.getElementById('rf')||{}).value||'';
  const ln=(document.getElementById('rl')||{}).value||'';
  const em=(document.getElementById('re')||{}).value||'';
  const ro=(document.getElementById('rr')||{}).value||'';
  const p=(document.getElementById('rp')||{}).value||'';
  const p2=(document.getElementById('rp2')||{}).value||'';
  if(!fn||!ln||!em){showToast('Заполните все обязательные поля');return}
  if(p!==p2){showToast('Пароли не совпадают');return}
  const ex=S.members.find(m=>m.email===em.trim());
  if(ex){S.currentUser=ex;S.page='team';render();return}
  const idx=S.members.length%COLORS.length;
  const nm={id:Date.now(),name:`${fn.trim()} ${ln.trim()}`,role:ro.trim()||'Сотрудник',
    email:em.trim(),phone:'',joined:new Date().getFullYear().toString(),
    skills:[],bio:'',color:COLORS[idx]};
  S.members.push(nm);
  S.currentUser=nm; S.page='team';
  save();
  addNotif(`${nm.name} присоединился к команде! 🎉`,'👤');
  showToast('Аккаунт создан!');
  render();
}

function openM(id){S.modalMember=S.members.find(m=>m.id===id)||null;render()}
function closeM(){S.modalMember=null;render()}
function toggleEdit(){S.editingProfile=!S.editingProfile;render()}

function cn(d){
  S.calM+=d;
  if(S.calM>11){S.calM=0;S.calY++}
  if(S.calM<0){S.calM=11;S.calY--}
  render();
}

function showVF(){
  const f=document.getElementById('vf');
  if(f)f.style.display=f.style.display==='none'?'block':'none';
}

function saveVac(){
  const from=(document.getElementById('vfrom')||{}).value||'';
  const to=(document.getElementById('vto')||{}).value||'';
  if(!from||!to){showToast('Выберите даты');return}
  if(from>to){showToast('Дата начала не может быть позже конца');return}
  S.vacations.push({id:Date.now(),memberId:S.currentUser.id,from,to});
  save();
  const me=S.members.find(m=>m.id===S.currentUser.id);
  addNotif(`${me?.name.split(' ')[0]} добавил отпуск: ${from} — ${to}`,'🌴');
  showToast('Отпуск добавлен!');
  render();
}

function setRoom(r){S.activeRoom=r;render();setTimeout(scrollMsgs,50)}

function toggleNotif(){
  S.notifOpen=!S.notifOpen;
  if(S.notifOpen){S.notifications.forEach(n=>n.read=true);save()}
  render();
}

function clearNotifs(){S.notifications=[];save();render()}

function sendMsg(){
  const input=document.getElementById('cinput');
  const text=(input?.value||'').trim();
  if(!text)return;
  const msg={id:Date.now(),memberId:S.currentUser.id,text,
    time:new Date().toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'})};
  if(!S.msgs[S.activeRoom])S.msgs[S.activeRoom]=[];
  S.msgs[S.activeRoom].push(msg);
  save();
  render();
  setTimeout(()=>{scrollMsgs();const i=document.getElementById('cinput');if(i)i.focus()},30);
}

function saveProf(){
  const me=S.members.find(m=>m.id===S.currentUser.id);
  if(!me)return;
  me.phone=(document.getElementById('ep')||{}).value||me.phone;
  me.joined=(document.getElementById('ej')||{}).value||me.joined;
  const sk=(document.getElementById('es')||{}).value||'';
  me.skills=sk?sk.split(',').map(s=>s.trim()).filter(Boolean):me.skills;
  me.bio=(document.getElementById('eb')||{}).value||'';
  S.editingProfile=false;
  save();
  addNotif('Профиль успешно обновлён','✏️');
  showToast('Профиль сохранён!');
  render();
}

function upF(e){
  const files=e.target.files;
  if(!files.length)return;
  Array.from(files).forEach(f=>{
    S.files.push({
      id: String(Date.now())+Math.random(),
      name: f.name,
      memberId: S.currentUser.id,
      date: new Date().toLocaleDateString('ru'),
      size: f.size>1048576?(f.size/1048576).toFixed(1)+' МБ':Math.round(f.size/1024)+' КБ'
    });
  });
  save();
  addNotif(`${files.length} файл(ов) загружено в общие документы`,'📁');
  showToast(`Загружено: ${files.length} файл(ов)`);
  render();
}

function delF(id){
  S.files=S.files.filter(f=>f.id!==id);
  save();showToast('Файл удалён');render();
}

/* Close notif on outside click */
document.addEventListener('click', e=>{
  if(S.notifOpen && !e.target.closest('#npanel') && !e.target.closest('.notif-btn')){
    S.notifOpen=false;render();
  }
});

/* Init */
render();
</script>
</body>
</html>
