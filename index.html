<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RS Team — Reservoir Simulation</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f4fa;--bg2:#ffffff;--bg3:#f5f7fb;--bg4:#eaeff7;
  --accent:#2878e8;--accent2:#1a65d4;--green:#16b47a;--gold:#d4920a;
  --red:#e03a3a;--purple:#7c5ce8;
  --t1:#0f1f35;--t2:#4a6080;--t3:#8fa3be;
  --border:rgba(40,120,232,0.12);--border2:rgba(40,120,232,0.24);
  --card:#ffffff;--r:14px;
}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh}
body::after{content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 60% 40% at 80% 5%,rgba(40,120,232,0.04),transparent),
  radial-gradient(ellipse 50% 30% at 5% 95%,rgba(124,92,232,0.03),transparent);
  pointer-events:none;z-index:0}
.app{position:relative;z-index:1}

/* ── TOP NAV ── */
.topnav{height:54px;background:rgba(255,255,255,0.97);border-bottom:1px solid var(--border);box-shadow:0 1px 12px rgba(40,120,232,0.07);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 1.5rem;position:sticky;top:0;z-index:200;backdrop-filter:blur(20px)}
.tn-logo{display:flex;align-items:center;gap:9px;cursor:pointer}
.tn-logo-mark{width:30px;height:30px;border-radius:8px;
  background:linear-gradient(135deg,var(--accent),#60c8ff);
  display:flex;align-items:center;justify-content:center;
  font-family:'Space Grotesk';font-size:13px;font-weight:800;color:#fff}
.tn-logo-name{font-family:'Space Grotesk';font-size:15px;font-weight:700;color:var(--t1)}
.tn-search{flex:1;max-width:320px;margin:0 1.5rem;position:relative}
.tn-search input{width:100%;background:var(--bg3);border:1px solid var(--border);
  border-radius:20px;padding:7px 14px 7px 34px;color:var(--t1);font-size:13px;
  font-family:'Plus Jakarta Sans';outline:none;transition:border .2s}
.tn-search input:focus{border-color:var(--accent)}
.tn-search input::placeholder{color:var(--t3)}
.tn-search-ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);
  font-size:14px;color:var(--t3)}
.tn-right{display:flex;align-items:center;gap:6px}
.tn-btn{background:none;border:none;width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  font-size:16px;color:var(--t2);transition:all .2s;position:relative}
.tn-btn:hover{background:var(--bg3);color:var(--t1)}
.tn-badge{position:absolute;top:2px;right:2px;width:15px;height:15px;
  background:var(--red);border-radius:50%;font-size:9px;font-weight:700;
  color:#fff;display:flex;align-items:center;justify-content:center}
.tn-avatar{width:34px;height:34px;border-radius:50%;object-fit:cover;
  border:2px solid var(--accent);cursor:pointer;transition:opacity .2s}
.tn-avatar:hover{opacity:.85}
.tn-avatar-placeholder{width:34px;height:34px;border-radius:50%;
  background:var(--bg3);border:2px solid var(--accent);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;color:var(--accent);cursor:pointer}

/* ── LAYOUT ── */
.layout{display:grid;grid-template-columns:240px 1fr 280px;gap:0;
  max-width:1200px;margin:0 auto;padding:1.25rem 1rem;gap:1.25rem}

/* ── LEFT SIDEBAR ── */
.sidebar-left{position:sticky;top:70px;align-self:start}
.nav-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:0 2px 12px rgba(40,120,232,0.06)}
.nav-profile{padding:1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;cursor:pointer}
.nav-profile:hover{background:rgba(255,255,255,.02)}
.nav-pav{width:44px;height:44px;border-radius:50%;object-fit:cover;border:2px solid var(--accent);flex-shrink:0}
.nav-pav-ph{width:44px;height:44px;border-radius:50%;background:var(--bg3);
  border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;flex-shrink:0}
.nav-pname{font-weight:600;font-size:14px}
.nav-prole{font-size:11px;color:var(--accent);margin-top:2px}
.nav-items{padding:.5rem}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;
  cursor:pointer;font-size:14px;font-weight:500;color:var(--t2);
  transition:all .2s;border:none;background:none;width:100%;text-align:left;font-family:'Plus Jakarta Sans'}
.nav-item:hover{background:var(--bg3);color:var(--t1)}
.nav-item.active{background:rgba(61,142,240,.12);color:var(--accent)}
.nav-item-ico{width:20px;text-align:center;font-size:16px}
.nav-item-badge{margin-left:auto;background:var(--accent);color:#fff;
  border-radius:10px;padding:1px 7px;font-size:10px;font-weight:700}

/* ── FEED ── */
.feed{display:flex;flex-direction:column;gap:1rem}

/* Composer */
.composer{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1rem;box-shadow:0 2px 12px rgba(40,120,232,0.06)}
.composer-top{display:flex;gap:10px;align-items:flex-start}
.composer-input{flex:1;background:var(--bg3);border:1px solid var(--border);
  border-radius:10px;padding:10px 14px;color:var(--t1);font-size:14px;
  font-family:'Plus Jakarta Sans';resize:none;outline:none;transition:border .2s;min-height:44px;line-height:1.5}
.composer-input:focus{border-color:var(--accent);min-height:80px}
.composer-input::placeholder{color:var(--t3)}
.composer-actions{display:flex;align-items:center;justify-content:space-between;margin-top:.75rem}
.composer-tools{display:flex;gap:4px}
.ctool{background:none;border:none;color:var(--t3);cursor:pointer;font-size:16px;
  padding:6px;border-radius:8px;transition:all .2s}
.ctool:hover{color:var(--accent);background:rgba(61,142,240,.1)}
.post-btn{padding:8px 20px;border-radius:20px;border:none;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;font-weight:600;font-size:13px;cursor:pointer;
  transition:all .2s;font-family:'Plus Jakarta Sans'}
.post-btn:hover{opacity:.9;transform:translateY(-1px)}
.post-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.img-preview-wrap{margin-top:.75rem;position:relative;display:inline-block}
.img-preview{max-width:100%;max-height:300px;border-radius:10px;object-fit:cover;display:block}
.img-preview-rm{position:absolute;top:6px;right:6px;background:rgba(255,255,255,.9);
  color:var(--t1);border:1px solid var(--border);border-radius:50%;width:24px;height:24px;cursor:pointer;font-size:12px;
  display:flex;align-items:center;justify-content:center}

/* Post card */
.post{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;
  animation:fadeUp .3s ease;box-shadow:0 2px 12px rgba(40,120,232,0.06)}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.post-header{display:flex;align-items:center;gap:10px;padding:1rem 1rem .75rem}
.post-av{width:40px;height:40px;border-radius:50%;object-fit:cover;
  border:2px solid var(--border2);flex-shrink:0;cursor:pointer}
.post-av-ph{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;border:2px solid;cursor:pointer}
.post-author{flex:1}
.post-name{font-weight:600;font-size:14px;cursor:pointer}
.post-name:hover{color:var(--accent)}
.post-meta{font-size:11px;color:var(--t3);margin-top:2px}
.post-menu{background:none;border:none;color:var(--t3);cursor:pointer;font-size:18px;
  padding:4px 8px;border-radius:6px;transition:all .2s;line-height:1}
.post-menu:hover{background:var(--bg3);color:var(--t1)}
.post-text{padding:0 1rem .75rem;font-size:14px;line-height:1.65;color:var(--t1);white-space:pre-wrap}
.post-image{width:100%;max-height:480px;object-fit:cover;display:block}
.post-footer{padding:.625rem 1rem;border-top:1px solid var(--border);
  display:flex;align-items:center;gap:1rem}
.post-action{display:flex;align-items:center;gap:5px;background:none;border:none;
  color:var(--t3);cursor:pointer;font-size:13px;font-family:'Plus Jakarta Sans';
  padding:5px 10px;border-radius:8px;transition:all .2s}
.post-action:hover{background:var(--bg3);color:var(--t1)}
.post-action.liked{color:var(--red)}
.post-action.liked:hover{color:var(--red)}

/* Comments */
.comments{padding:.5rem 1rem 1rem;border-top:1px solid var(--border);display:none}
.comments.open{display:block}
.comment{display:flex;gap:8px;margin-bottom:.625rem;align-items:flex-start}
.comment-av{width:28px;height:28px;border-radius:50%;object-fit:cover;
  border:1.5px solid var(--border2);flex-shrink:0}
.comment-av-ph{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;border:1.5px solid}
.comment-bubble{background:var(--bg3);border-radius:10px;padding:7px 11px;flex:1}
.comment-name{font-size:12px;font-weight:600;margin-bottom:2px}
.comment-text{font-size:13px;color:var(--t2);line-height:1.5}
.comment-input-row{display:flex;gap:8px;align-items:center;margin-top:.625rem}
.comment-input{flex:1;background:var(--bg3);border:1px solid var(--border);
  border-radius:20px;padding:7px 14px;color:var(--t1);font-size:13px;
  font-family:'Plus Jakarta Sans';outline:none;transition:border .2s}
.comment-input:focus{border-color:var(--accent)}
.comment-send{background:var(--accent);border:none;border-radius:50%;
  width:30px;height:30px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:#fff;font-size:13px;flex-shrink:0;transition:opacity .2s}
.comment-send:hover{opacity:.85}

/* ── RIGHT SIDEBAR ── */
.sidebar-right{position:sticky;top:70px;align-self:start;display:flex;flex-direction:column;gap:1rem}
.widget{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem;box-shadow:0 2px 12px rgba(40,120,232,0.06)}
.widget-title{font-family:'Space Grotesk';font-size:13px;font-weight:700;color:var(--t2);
  letter-spacing:.5px;margin-bottom:.875rem}
.member-row{display:flex;align-items:center;gap:9px;margin-bottom:.75rem;cursor:pointer}
.member-row:last-child{margin-bottom:0}
.member-row:hover .mr-name{color:var(--accent)}
.mr-av{width:34px;height:34px;border-radius:50%;object-fit:cover;border:1.5px solid var(--border2);flex-shrink:0}
.mr-av-ph{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;border:1.5px solid}
.mr-info{flex:1;min-width:0}
.mr-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color .2s}
.mr-role{font-size:11px;color:var(--t3)}
.sdot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:4px}
.sdot.on{background:var(--green)}.sdot.vac{background:var(--gold)}

/* ── PAGES ── */
.page-wrap{display:flex;flex-direction:column;gap:1rem}

/* Profile page */
.profile-cover{height:160px;background:linear-gradient(135deg,#dbeafe,#ede9fe);
  border-radius:var(--r) var(--r) 0 0;position:relative;overflow:hidden}
.profile-cover-img{width:100%;height:100%;object-fit:cover}
.profile-cover-edit{position:absolute;bottom:8px;right:8px;background:rgba(255,255,255,0.85);
  border:1px solid var(--border);border-radius:8px;padding:5px 10px;
  font-size:11px;color:var(--t1);cursor:pointer;transition:all .2s}
.profile-cover-edit:hover{background:rgba(255,255,255,1)}
.profile-info-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:0 2px 12px rgba(40,120,232,0.06)}
.profile-info-inner{padding:0 1.5rem 1.5rem}
.profile-avatar-wrap{position:relative;display:inline-block;margin-top:-40px;margin-bottom:.75rem}
.profile-big-av{width:80px;height:80px;border-radius:50%;object-fit:cover;
  border:4px solid #fff;display:block;box-shadow:0 2px 12px rgba(40,120,232,0.12)}
.profile-big-av-ph{width:80px;height:80px;border-radius:50%;border:4px solid #fff;
  background:var(--bg3);display:flex;align-items:center;justify-content:center;
  font-size:26px;font-weight:700;box-shadow:0 2px 12px rgba(40,120,232,0.12)}
.profile-av-edit{position:absolute;bottom:2px;right:2px;width:24px;height:24px;
  background:var(--accent);border-radius:50%;display:flex;align-items:center;
  justify-content:center;cursor:pointer;font-size:12px;border:2px solid var(--bg2)}
.profile-name{font-family:'Space Grotesk';font-size:20px;font-weight:800}
.profile-role{color:var(--accent);font-size:13px;margin-top:3px;font-weight:500}
.profile-bio{font-size:13px;color:var(--t2);margin-top:.5rem;line-height:1.6}
.profile-stats{display:flex;gap:1.5rem;margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border)}
.pstat{text-align:center}
.pstat-n{font-family:'Space Grotesk';font-size:18px;font-weight:700}
.pstat-l{font-size:11px;color:var(--t3);margin-top:2px}
.profile-actions{display:flex;gap:.625rem;margin-top:1rem}
.btn-primary{padding:8px 20px;border-radius:20px;border:none;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;font-weight:600;font-size:13px;cursor:pointer;transition:all .2s;font-family:'Plus Jakarta Sans'}
.btn-primary:hover{opacity:.9}
.btn-secondary{padding:8px 20px;border-radius:20px;border:1px solid var(--border2);
  background:none;color:var(--t1);font-weight:500;font-size:13px;cursor:pointer;
  transition:all .2s;font-family:'Plus Jakarta Sans'}
.btn-secondary:hover{background:var(--bg3)}

/* Calendar page */
.cal-page{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1.5rem;box-shadow:0 2px 12px rgba(40,120,232,0.06)}
.cal-year-nav{display:flex;align-items:center;gap:12px;margin-bottom:1.25rem}
.cal-year-val{font-family:'Space Grotesk';font-size:18px;font-weight:700;min-width:56px;text-align:center}
.cnbtn{padding:6px 12px;border-radius:8px;border:1px solid var(--border);
  background:none;color:var(--t2);cursor:pointer;font-size:13px;transition:all .2s;font-family:'Plus Jakarta Sans'}
.cnbtn:hover{border-color:var(--accent);color:var(--accent)}
.year-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.75rem}
.mini-month{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:.75rem}
.mm-title{font-size:11px;font-weight:700;color:var(--t2);text-align:center;
  margin-bottom:.5rem;letter-spacing:.5px;font-family:'Space Grotesk'}
.mm-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px}
.mm-dh{text-align:center;font-size:8px;color:var(--t3);padding:2px 0}
.mm-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;
  border-radius:4px;font-size:9px;cursor:pointer;position:relative;color:var(--t3);transition:all .1s}
.mm-day:hover:not(.empty){background:var(--bg4);color:var(--t1)}
.mm-day.today{background:rgba(61,142,240,.25);color:var(--accent);font-weight:700}
.mm-day.hol{background:rgba(245,200,66,.14);color:var(--gold)}
.mm-day.myvac{background:rgba(61,142,240,.3);color:#fff;font-weight:600}
.mm-day.teamvac{background:rgba(47,217,154,.1);color:var(--green)}
.mm-day.empty{pointer-events:none;cursor:default}
.mm-day .md{position:absolute;bottom:1px;left:50%;transform:translateX(-50%);
  width:3px;height:3px;border-radius:50%;background:var(--green)}
.day-detail{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;
  padding:1.125rem;margin-bottom:1rem;animation:fdIn .15s ease}
@keyframes fdIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.dd-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:.875rem}
.dd-date{font-family:'Space Grotesk';font-size:15px;font-weight:700}
.cal-legend{display:flex;gap:1rem;margin-top:1rem;flex-wrap:wrap}
.li{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--t2)}
.ld{width:10px;height:10px;border-radius:3px}

/* Vac list in calendar */
.vac-item{background:var(--bg3);border:1px solid var(--border);border-radius:8px;
  padding:.625rem .875rem;margin-bottom:.5rem;display:flex;align-items:center;gap:10px}
.vac-item-info{flex:1}
.vac-item-dates{font-size:13px;font-weight:500}
.vac-item-who{font-size:11px;color:var(--t3);margin-top:2px}
.vac-actions{display:flex;gap:6px}
.vac-btn{background:none;border:1px solid var(--border);border-radius:6px;
  padding:4px 10px;font-size:11px;cursor:pointer;font-family:'Plus Jakarta Sans';transition:all .2s}
.vac-btn.edit{color:var(--accent);border-color:rgba(61,142,240,.3)}
.vac-btn.edit:hover{background:rgba(61,142,240,.1)}
.vac-btn.del{color:var(--red);border-color:rgba(240,88,88,.3)}
.vac-btn.del:hover{background:rgba(240,88,88,.1)}

/* Messages page */
.dm-layout{display:flex;gap:1rem}
.dm-list{width:280px;flex-shrink:0;background:var(--card);border:1px solid var(--border);
  border-radius:var(--r);overflow:hidden}
.dm-list-head{padding:1rem;border-bottom:1px solid var(--border);
  font-family:'Space Grotesk';font-size:14px;font-weight:700}
.dm-item{display:flex;align-items:center;gap:10px;padding:10px 14px;
  cursor:pointer;transition:background .2s;border-left:3px solid transparent}
.dm-item:hover{background:var(--bg3)}
.dm-item.active{background:rgba(61,142,240,.08);border-left-color:var(--accent)}
.dm-av{width:36px;height:36px;border-radius:50%;object-fit:cover;border:1.5px solid var(--border2);flex-shrink:0}
.dm-av-ph{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;border:1.5px solid}
.dm-info{flex:1;min-width:0}
.dm-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dm-preview{font-size:11px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.dm-badge{background:var(--accent);color:#fff;border-radius:10px;
  padding:1px 7px;font-size:10px;font-weight:700;flex-shrink:0}
.dm-chat{flex:1;background:var(--card);border:1px solid var(--border);
  border-radius:var(--r);display:flex;flex-direction:column;min-height:500px}
.dm-chat-hdr{padding:.875rem 1rem;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;flex-shrink:0}
.dm-chat-name{font-family:'Space Grotesk';font-size:14px;font-weight:700}
.dm-chat-role{font-size:11px;color:var(--t2)}
.dm-messages{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:.5rem}
.msg{display:flex;gap:8px;max-width:75%;align-items:flex-end}
.msg.me{flex-direction:row-reverse;align-self:flex-end}
.msg-body{}
.msg-meta{font-size:10px;color:var(--t3);margin-bottom:3px}
.msg.me .msg-meta{text-align:right}
.msg-bubble{background:var(--bg3);border:1px solid var(--border);
  border-radius:12px;padding:8px 12px;font-size:13px;line-height:1.5;word-break:break-word}
.msg.me .msg-bubble{background:rgba(61,142,240,.18);border-color:rgba(61,142,240,.3)}
.dm-input-bar{padding:.75rem 1rem;border-top:1px solid var(--border);
  display:flex;gap:8px;align-items:center}
.dm-input{flex:1;background:var(--bg3);border:1px solid var(--border);
  border-radius:20px;padding:8px 14px;color:var(--t1);font-size:13px;
  font-family:'Plus Jakarta Sans';outline:none;transition:border .2s}
.dm-input:focus{border-color:var(--accent)}
.dm-send{background:var(--accent);border:none;border-radius:50%;
  width:34px;height:34px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:#fff;font-size:14px;flex-shrink:0;transition:opacity .2s}
.dm-send:hover{opacity:.85}
.no-chat{flex:1;display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:.625rem;color:var(--t3);font-size:13px}

/* Files page */
.files-page{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1.5rem;box-shadow:0 2px 12px rgba(40,120,232,0.06)}
.upzone{border:2px dashed var(--border);border-radius:12px;padding:2rem;
  text-align:center;cursor:pointer;transition:all .2s;margin-bottom:1.25rem}
.upzone:hover{border-color:var(--accent);background:rgba(61,142,240,.03)}
.upico{font-size:30px;margin-bottom:.5rem}
.upt{font-size:13px;color:var(--t2)}
.upt span{color:var(--accent);font-weight:600}
.flist{display:flex;flex-direction:column;gap:.5rem}
.fitem{background:var(--bg3);border:1px solid var(--border);border-radius:10px;
  padding:.75rem 1rem;display:flex;align-items:center;gap:12px}
.fico{font-size:20px}
.fi{flex:1}
.fn{font-size:13px;font-weight:500}
.fm{font-size:11px;color:var(--t3);margin-top:2px}
.fdel{background:none;border:none;color:var(--t3);cursor:pointer;font-size:13px;
  padding:4px 8px;border-radius:6px;transition:all .2s}
.fdel:hover{color:var(--red);background:rgba(240,88,88,.1)}

/* AUTH */
.auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem}
.auth-wrap{width:100%;max-width:460px}
.auth-logo-big{width:56px;height:56px;border-radius:16px;
  background:linear-gradient(135deg,var(--accent),#60c8ff);
  margin:0 auto 1rem;display:flex;align-items:center;justify-content:center;
  font-family:'Space Grotesk';font-size:20px;font-weight:800;color:#fff}
.auth-title{font-family:'Space Grotesk';font-size:24px;font-weight:800;text-align:center;margin-bottom:4px}
.auth-sub{font-size:13px;color:var(--t2);text-align:center;margin-bottom:1.5rem}
.auth-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:2rem;box-shadow:0 4px 24px rgba(40,120,232,0.08)}
.atabs{display:flex;background:var(--bg3);border-radius:10px;padding:3px;margin-bottom:1.5rem;gap:3px}
.atab{flex:1;padding:8px;text-align:center;cursor:pointer;font-size:13px;font-weight:500;
  color:var(--t2);border-radius:8px;border:none;background:none;transition:all .2s;font-family:'Plus Jakarta Sans'}
.atab.active{background:var(--bg2);color:var(--accent);border:1px solid var(--border2)}
.fg{margin-bottom:.875rem}
label{display:block;font-size:10px;color:var(--t3);margin-bottom:4px;font-weight:500;letter-spacing:.5px}
input,select,textarea{width:100%;background:var(--bg3);border:1px solid var(--border);
  border-radius:10px;padding:9px 13px;color:var(--t1);font-size:13px;
  font-family:'Plus Jakarta Sans';transition:border .2s;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
input::placeholder,textarea::placeholder{color:var(--t3)}
select option{background:var(--bg2)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.submit-btn{width:100%;padding:11px;border-radius:10px;border:none;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;font-weight:700;font-size:14px;cursor:pointer;
  transition:all .2s;font-family:'Plus Jakarta Sans';margin-top:4px}
.submit-btn:hover{opacity:.9;transform:translateY(-1px)}
.submit-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.auth-hint{text-align:center;font-size:12px;color:var(--t3);margin-top:1rem}
.auth-hint span{color:var(--accent);cursor:pointer}
.fsec{font-size:10px;color:var(--t3);letter-spacing:1px;
  margin:.875rem 0 .625rem;padding-bottom:5px;border-bottom:1px solid var(--border)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(15,31,53,.5);z-index:500;
  display:flex;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(8px)}
.modal-box{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);
  width:100%;max-width:480px;max-height:88vh;overflow-y:auto;padding:1.75rem;
  box-shadow:0 8px 40px rgba(40,120,232,0.12)}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem}
.modal-title{font-family:'Space Grotesk';font-size:16px;font-weight:700}
.btnx{background:none;border:1px solid var(--border);color:var(--t2);
  width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:14px;
  display:flex;align-items:center;justify-content:center;transition:all .2s}
.btnx:hover{border-color:var(--red);color:var(--red)}

/* NOTIF PANEL */
.notif-panel{position:fixed;top:58px;right:1rem;width:320px;
  background:#fff;border:1px solid var(--border2);border-radius:var(--r);
  z-index:300;box-shadow:0 8px 32px rgba(40,120,232,0.12);display:none;max-height:420px;overflow-y:auto}
.notif-panel.open{display:block}
.np-head{padding:12px 16px 8px;border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
  position:sticky;top:0;background:#fff}
.np-title{font-family:'Space Grotesk';font-size:13px;font-weight:700}
.np-clear{font-size:11px;color:var(--accent);cursor:pointer;border:none;background:none}
.np-item{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;gap:10px}
.np-item.unread{background:rgba(61,142,240,.05)}
.np-ico{width:28px;height:28px;border-radius:50%;background:rgba(61,142,240,.1);
  display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.np-body{flex:1}
.np-text{font-size:12px;line-height:1.5}
.np-time{font-size:10px;color:var(--t3);margin-top:2px}
.np-empty{padding:1.5rem;text-align:center;font-size:13px;color:var(--t3)}

/* LOADING */
.loading-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);
  border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* UTILS */
.empty-state{text-align:center;padding:3rem 1rem;color:var(--t3);font-size:14px}
.empty-state-ico{font-size:40px;margin-bottom:.75rem}
.sep{border:none;border-top:1px solid var(--border);margin:.875rem 0}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;z-index:700;
  background:#fff;border:1px solid var(--green);border-radius:10px;
  padding:10px 16px;font-size:13px;color:var(--green);display:none;max-width:300px;
  box-shadow:0 4px 20px rgba(22,180,122,0.15)}
.toast.show{display:block;animation:si .3s ease}
.toast.err{border-color:var(--red);color:var(--red)}
@keyframes si{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:translateX(0)}}
.tag{padding:2px 8px;border-radius:5px;font-size:10px;font-weight:600;
  background:rgba(61,142,240,.1);color:var(--accent);border:1px solid rgba(61,142,240,.2)}
.tag.skill{background:rgba(47,217,154,.08);color:var(--green);border-color:rgba(47,217,154,.2)}
.tag.vac{background:rgba(245,200,66,.1);color:var(--gold);border-color:rgba(245,200,66,.2)}
.igrid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin:.75rem 0}
.iitem .il{font-size:10px;color:var(--t3);letter-spacing:.5px;margin-bottom:3px}
.iitem .iv{font-size:13px;font-weight:500}

@media(max-width:1100px){.layout{grid-template-columns:200px 1fr 240px}}
@media(max-width:900px){.layout{grid-template-columns:1fr};.sidebar-left,.sidebar-right{display:none}}
@media(max-width:600px){.auth-card{padding:1.5rem}.row2,.row3{grid-template-columns:1fr}}

/* ── BOTTOM MOBILE NAV ── */
.bottom-nav{display:none}
@media(max-width:760px){
  .sidebar-left,.sidebar-right{display:none !important}
  .layout{grid-template-columns:1fr !important;padding:1rem !important;padding-bottom:74px !important}
  .bottom-nav{
    display:flex;position:fixed;bottom:0;left:0;right:0;z-index:500;
    background:#fff;border-top:1px solid var(--border);
    box-shadow:0 -2px 16px rgba(40,120,232,0.10);
    height:60px;align-items:stretch;
    padding-bottom:env(safe-area-inset-bottom);
  }
  .bnav-item{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:2px;cursor:pointer;border:none;background:none;font-family:'Plus Jakarta Sans';
    color:var(--t3);transition:all .15s;padding:6px 2px;
    position:relative;-webkit-tap-highlight-color:transparent;
  }
  .bnav-item:active{background:var(--bg3)}
  .bnav-item.active{color:var(--accent)}
  .bnav-item.active .bnav-item-ico{transform:scale(1.15)}
  .bnav-item-ico{font-size:22px;line-height:1;transition:transform .15s}
  .bnav-item-label{font-size:10px;font-weight:500}
  .bnav-badge{position:absolute;top:4px;right:calc(50% - 20px);
    background:var(--red);color:#fff;border-radius:50%;
    width:15px;height:15px;font-size:9px;font-weight:700;
    display:flex;align-items:center;justify-content:center;
    border:2px solid #fff}
  .tn-search{display:none !important}
  .topnav{padding:0 1rem}
  .dm-layout{flex-direction:column !important;gap:.75rem}
  .dm-list{width:100% !important}
  .dm-chat{min-height:400px !important}
}

/* ── CODENAMES GAME ── */
.game-wrap{max-width:900px;margin:0 auto}
.game-lobby{background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:2rem;text-align:center;box-shadow:0 2px 12px rgba(40,120,232,0.06)}
.game-title{font-family:'Space Grotesk';font-size:24px;font-weight:800;margin-bottom:.5rem}
.game-sub{font-size:14px;color:var(--t2);margin-bottom:2rem}
.game-actions{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;margin-bottom:2rem}
.gbtn{padding:12px 28px;border-radius:12px;border:none;font-weight:700;font-size:15px;
  cursor:pointer;font-family:'Plus Jakarta Sans';transition:all .2s}
.gbtn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.gbtn-primary:hover{opacity:.9;transform:translateY(-1px)}
.gbtn-secondary{background:var(--bg3);color:var(--t1);border:1px solid var(--border)}
.gbtn-secondary:hover{background:var(--bg4)}
.room-code-display{font-family:'Space Grotesk';font-size:42px;font-weight:800;
  color:var(--accent);letter-spacing:8px;margin:1rem 0}
.room-join-row{display:flex;gap:.625rem;justify-content:center;margin-top:1rem}
.room-input{width:160px;text-align:center;font-size:20px;letter-spacing:4px;
  font-family:'Space Grotesk';font-weight:700;text-transform:uppercase}
/* Teams */
.teams-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin:1.5rem 0}
.team-box{border-radius:12px;padding:1.25rem;border:2px solid}
.team-red{background:rgba(224,58,58,.06);border-color:rgba(224,58,58,.25)}
.team-blue{background:rgba(40,120,232,.06);border-color:rgba(40,120,232,.25)}
.team-title{font-family:'Space Grotesk';font-size:14px;font-weight:700;margin-bottom:.75rem}
.team-title.red{color:var(--red)}.team-title.blue{color:var(--accent)}
.team-player{display:flex;align-items:center;gap:7px;margin-bottom:.5rem;font-size:13px}
.team-player-crown{font-size:12px}
.team-btns{display:flex;gap:.5rem;margin-top:.75rem;flex-wrap:wrap}
.tbtn{padding:5px 12px;border-radius:8px;border:none;font-size:12px;font-weight:600;
  cursor:pointer;font-family:'Plus Jakarta Sans';transition:all .2s}
.tbtn-red{background:rgba(224,58,58,.12);color:var(--red)}
.tbtn-red:hover{background:rgba(224,58,58,.2)}
.tbtn-blue{background:rgba(40,120,232,.12);color:var(--accent)}
.tbtn-blue:hover{background:rgba(40,120,232,.2)}
.tbtn-cap{background:rgba(245,200,66,.15);color:var(--gold)}
.tbtn-cap:hover{background:rgba(245,200,66,.25)}
/* Game board */
.game-board-wrap{display:flex;flex-direction:column;gap:.875rem}
.game-status-bar{background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:.875rem 1.25rem;display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:.5rem;box-shadow:0 2px 8px rgba(40,120,232,0.05)}
.game-score{display:flex;gap:1.5rem;align-items:center}
.score-red{font-family:'Space Grotesk';font-size:20px;font-weight:800;color:var(--red)}
.score-blue{font-family:'Space Grotesk';font-size:20px;font-weight:800;color:var(--accent)}
.score-sep{font-size:18px;color:var(--t3)}
.turn-indicator{padding:6px 14px;border-radius:20px;font-size:13px;font-weight:700}
.turn-red{background:rgba(224,58,58,.12);color:var(--red)}
.turn-blue{background:rgba(40,120,232,.12);color:var(--accent)}
.clue-display{background:var(--bg3);border-radius:10px;padding:.625rem 1rem;
  font-size:14px;font-weight:500;text-align:center}
.clue-word{font-weight:800;color:var(--accent)}
.clue-num{background:var(--accent);color:#fff;border-radius:50%;
  width:24px;height:24px;display:inline-flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;margin-left:4px}
/* Cards grid */
.cards-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:.5rem}
.game-card{border-radius:10px;padding:.75rem .5rem;text-align:center;cursor:pointer;
  border:2px solid transparent;transition:all .2s;font-weight:600;font-size:13px;
  min-height:64px;display:flex;align-items:center;justify-content:center;
  background:var(--card);box-shadow:0 2px 6px rgba(0,0,0,.06);
  user-select:none;-webkit-tap-highlight-color:transparent}
.game-card:hover:not(.revealed){transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.1);border-color:var(--border2)}
.game-card.revealed-red{background:#e03a3a;color:#fff;border-color:#c02828;cursor:default}
.game-card.revealed-blue{background:#2878e8;color:#fff;border-color:#1a65d4;cursor:default}
.game-card.revealed-neutral{background:#c8b89a;color:#fff;border-color:#b0a088;cursor:default}
.game-card.revealed-black{background:#1a1a2e;color:#fff;border-color:#000;cursor:default}
.game-card.spymaster-red{background:rgba(224,58,58,.15);border-color:rgba(224,58,58,.4);color:var(--red)}
.game-card.spymaster-blue{background:rgba(40,120,232,.15);border-color:rgba(40,120,232,.4);color:var(--accent)}
.game-card.spymaster-neutral{background:rgba(180,160,120,.15);border-color:rgba(180,160,120,.3);color:#8a7a60}
.game-card.spymaster-black{background:rgba(20,20,40,.15);border-color:rgba(20,20,40,.4);color:#333}
/* Clue input */
.clue-form{background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:1rem 1.25rem;display:flex;align-items:center;gap:.75rem;flex-wrap:wrap;
  box-shadow:0 2px 8px rgba(40,120,232,0.05)}
.clue-input{flex:1;min-width:140px;font-size:14px}
.clue-num-select{width:80px;font-size:14px}
.end-turn-btn{padding:8px 18px;border-radius:8px;border:1px solid var(--border);
  background:none;color:var(--t2);font-size:13px;font-weight:600;cursor:pointer;font-family:'Plus Jakarta Sans';transition:all .2s}
.end-turn-btn:hover{border-color:var(--accent);color:var(--accent)}
/* Win screen */
.win-screen{background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:3rem 2rem;text-align:center;box-shadow:0 2px 12px rgba(40,120,232,0.08)}
.win-emoji{font-size:64px;margin-bottom:1rem}
.win-title{font-family:'Space Grotesk';font-size:28px;font-weight:800;margin-bottom:.5rem}
.win-sub{font-size:15px;color:var(--t2);margin-bottom:2rem}
@media(max-width:600px){
  .cards-grid{grid-template-columns:repeat(5,1fr);gap:.25rem}
  .game-card{font-size:10px;padding:.5rem .25rem;min-height:48px;border-radius:7px}
  .teams-grid{grid-template-columns:1fr}
}

/* ── BIRTHDAYS WIDGET ── */
.bday-widget{background:linear-gradient(135deg,rgba(212,146,10,.08),rgba(224,58,58,.06));
  border:1px solid rgba(212,146,10,.25);border-radius:var(--r);padding:1.25rem;margin-bottom:1rem}
.bday-today{display:flex;align-items:center;gap:10px;margin-bottom:.5rem}
.bday-emoji{font-size:32px}
.bday-name{font-family:'Space Grotesk';font-size:15px;font-weight:700}
.bday-sub{font-size:12px;color:var(--t2)}
.bday-upcoming{font-size:12px;color:var(--t2);margin-top:.5rem;padding-top:.5rem;border-top:1px solid rgba(212,146,10,.2)}

/* ── POLLS ── */
.poll-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:1.25rem;margin-bottom:.875rem;box-shadow:0 2px 8px rgba(40,120,232,.05)}
.poll-q{font-weight:700;font-size:15px;margin-bottom:.875rem}
.poll-option{background:var(--bg3);border:1px solid var(--border);border-radius:8px;
  padding:9px 14px;margin-bottom:.5rem;cursor:pointer;transition:all .2s;
  display:flex;align-items:center;justify-content:space-between;position:relative;overflow:hidden}
.poll-option:hover{border-color:var(--accent)}
.poll-option.voted{border-color:var(--accent);background:rgba(40,120,232,.06)}
.poll-bar{position:absolute;left:0;top:0;bottom:0;background:rgba(40,120,232,.1);
  transition:width .5s ease;z-index:0}
.poll-option-text{position:relative;z-index:1;font-size:13px;font-weight:500}
.poll-pct{position:relative;z-index:1;font-size:12px;color:var(--accent);font-weight:700}
.poll-meta{font-size:11px;color:var(--t3);margin-top:.5rem}
.create-poll-form{background:var(--bg3);border:1px solid var(--border);border-radius:12px;
  padding:1.25rem;margin-bottom:1rem;display:none}
.poll-option-input{display:flex;gap:.5rem;margin-bottom:.5rem;align-items:center}
.remove-opt{background:none;border:none;color:var(--t3);cursor:pointer;font-size:16px;
  padding:4px;transition:color .2s}
.remove-opt:hover{color:var(--red)}

/* ── KANBAN ── */
.kanban-board{display:grid;grid-template-columns:repeat(3,1fr);gap:.875rem;overflow-x:auto}
.kanban-col{background:var(--bg3);border-radius:12px;padding:.875rem;min-height:300px}
.kanban-col-title{font-family:'Space Grotesk';font-size:13px;font-weight:700;
  margin-bottom:.875rem;display:flex;align-items:center;gap:6px}
.kanban-col-count{background:var(--bg4);border-radius:20px;padding:1px 8px;font-size:11px;font-weight:600;color:var(--t2)}
.kanban-card{background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:.875rem;margin-bottom:.625rem;cursor:pointer;transition:all .2s;
  box-shadow:0 1px 4px rgba(40,120,232,.04)}
.kanban-card:hover{border-color:var(--accent);box-shadow:0 3px 10px rgba(40,120,232,.1)}
.kanban-card-title{font-size:13px;font-weight:600;margin-bottom:.375rem}
.kanban-card-meta{font-size:11px;color:var(--t3);display:flex;align-items:center;gap:6px}
.kanban-add{width:100%;background:none;border:1.5px dashed var(--border);border-radius:8px;
  padding:8px;color:var(--t3);font-size:13px;cursor:pointer;transition:all .2s;font-family:'Plus Jakarta Sans'}
.kanban-add:hover{border-color:var(--accent);color:var(--accent)}
.ktag{padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600}
.ktag-todo{background:rgba(143,163,190,.15);color:var(--t2)}
.ktag-doing{background:rgba(40,120,232,.12);color:var(--accent)}
.ktag-done{background:rgba(22,180,122,.12);color:var(--green)}

/* ── CALC ── */
.calc-page{background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:1.5rem;box-shadow:0 2px 12px rgba(40,120,232,.06)}
.calc-tabs{display:flex;gap:4px;background:var(--bg3);border-radius:10px;padding:3px;margin-bottom:1.25rem}
.calc-tab{flex:1;padding:7px;text-align:center;border:none;background:none;border-radius:7px;
  font-size:12px;font-weight:600;color:var(--t2);cursor:pointer;transition:all .2s;font-family:'Plus Jakarta Sans'}
.calc-tab.active{background:var(--card);color:var(--accent);border:1px solid var(--border)}
.calc-section{display:none}
.calc-section.active{display:block}
.calc-group{background:var(--bg3);border-radius:10px;padding:1rem;margin-bottom:.875rem}
.calc-label{font-size:11px;color:var(--t3);letter-spacing:.5px;margin-bottom:.375rem;font-weight:500}
.calc-result{background:linear-gradient(135deg,rgba(40,120,232,.08),rgba(124,92,232,.06));
  border:1px solid var(--border2);border-radius:10px;padding:1rem;text-align:center;margin-top:.875rem}
.calc-result-val{font-family:'Space Grotesk';font-size:28px;font-weight:800;color:var(--accent)}
.calc-result-unit{font-size:13px;color:var(--t2);margin-top:3px}

/* ── WEATHER WIDGET ── */
.weather-widget{background:linear-gradient(135deg,#e8f4ff,#f0f8ff);
  border:1px solid rgba(40,120,232,.2);border-radius:var(--r);padding:1.25rem;

const hexA = (hex,a)=>{
  if(!hex||hex.length<7)return`rgba(61,142,240,${a})`;
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return`rgba(${r},${g},${b},${a})`;
};
const fmtDate = d=>{if(!d)return'—';const p=d.split('-');return p.length===3?`${p[2]}.${p[1]}.${p[0]}`:d};
const dmKey = (a,b)=>[String(a),String(b)].sort().join('_');
const scrollEl = id=>{const el=document.getElementById(id);if(el)el.scrollTop=el.scrollHeight};
const isOnVac = mid=>{const t=new Date().toISOString().split('T')[0];return Object.values(S.vacations||{}).some(v=>v.memberId===mid&&v.from<=t&&t<=v.to)};
const membersArr = ()=>Object.values(S.members||{});
const postsArr = ()=>Object.entries(S.posts||{}).map(([k,v])=>({...v,_key:k})).sort((a,b)=>b.ts-a.ts);
const timeAgo = ts=>{
  const d=Date.now()-ts;
  if(d<60000)return'только что';
  if(d<3600000)return Math.floor(d/60000)+' мин назад';
  if(d<86400000)return Math.floor(d/3600000)+' ч назад';
  return Math.floor(d/86400000)+' д назад';
};

function getBirthdays(){
  const today=new Date();
  const mm=String(today.getMonth()+1).padStart(2,'0');
  const dd=String(today.getDate()).padStart(2,'0');
  const todayMD=`${mm}-${dd}`;
  const results={today:[],soon:[]};
  membersArr().forEach(m=>{
    if(!m.birthday)return;
    const parts=m.birthday.split('-');
    if(parts.length<3)return;
    const mmd=`${parts[1]}-${parts[2]}`;
    if(mmd===todayMD){results.today.push(m);return;}
    // within next 7 days
    const bday=new Date(today.getFullYear(),parseInt(parts[1])-1,parseInt(parts[2]));
    if(bday<today)bday.setFullYear(today.getFullYear()+1);
    const diff=Math.ceil((bday-today)/(1000*60*60*24));
    if(diff<=7)results.soon.push({...m,daysLeft:diff});
  });
  return results;
}

/* ── CALENDAR ── */
function renderCalendar(){
  const y=S.calYear;
  const today=new Date();
  const todayStr=today.toISOString().split('T')[0];

  // Build vac map
  const vacD={};
  Object.entries(S.vacations||{}).forEach(([k,v])=>{
    let d=new Date(v.from);const e=new Date(v.to);
    while(d<=e){
      const ds=d.toISOString().split('T')[0];
      if(!vacD[ds])vacD[ds]=[];
      vacD[ds].push({...v,_key:k});
      d.setDate(d.getDate()+1);
    }
  });

  // ── Current month big calendar ──
  const curM=S.calMonth!==undefined?S.calMonth:today.getMonth();
  const curY=S.calYear||today.getFullYear();
  const fd=new Date(curY,curM,1).getDay();
  const off=fd===0?6:fd-1;
  const dim=new Date(curY,curM+1,0).getDate();
  const prevDim=new Date(curY,curM,0).getDate();

  // Get all events for current month
  const monthHols=Object.entries(HOLIDAYS)
    .filter(([k])=>k.startsWith(`${curY}-${String(curM+1).padStart(2,'0')}`));
  const monthVacs=Object.entries(S.vacations||{})
    .filter(([,v])=>v.from.substring(0,7)===`${curY}-${String(curM+1).padStart(2,'0')}`)
    .map(([k,v])=>({...v,_key:k}));
  const myVacsAll=Object.entries(S.vacations||{}).filter(([,v])=>v.memberId===S.user.id);

  // ── Big month grid ──
  let cells='';
  // Prev month grey days
  for(let i=0;i<off;i++){
    cells+=`<div class="big-day other">${prevDim-off+1+i}</div>`;
  }
  for(let d=1;d<=dim;d++){
    const ds=`${curY}-${String(curM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isT=ds===todayStr;
    const isH=!!HOLIDAYS[ds];
    const dayVacs=vacD[ds]||[];
    const isMyVac=dayVacs.some(v=>v.memberId===S.user.id);
    const teamVacs=dayVacs.filter(v=>v.memberId!==S.user.id);
    const isSel=S.selectedDay===ds;
    let cls='big-day';
    if(isSel) cls+=' big-sel';
    else if(isT) cls+=' big-today';
    if(isH) cls+=' big-hol';
    if(isMyVac) cls+=' big-myvac';

    const dots=teamVacs.slice(0,3).map(v=>{
      const mem=S.members[v.memberId];
      return`<span class="day-pip" style="background:${mem?mem.color||'#2878e8':'#2878e8'}"></span>`;
    }).join('');

    cells+=`<div class="${cls}" onclick="selectDay('${ds}')">
      <span class="big-day-num">${d}</span>
      ${isH?`<span class="big-day-hol">${HOLIDAYS[ds].split(' ')[0]}</span>`:''}
      ${dots?`<div class="day-pips">${dots}</div>`:''}
    </div>`;
  }
  // Next month fill
  const total=off+dim;
  const rem=(7-total%7)%7;
  for(let i=1;i<=rem;i++) cells+=`<div class="big-day other">${i}</div>`;

  // ── Selected day detail ──
  let detail='';
  if(S.selectedDay){
    const ds=S.selectedDay;
    const [dy,dm2,dd]=ds.split('-');
    const hol=HOLIDAYS[ds];
    const dayVacs=vacD[ds]||[];
    const myDV=dayVacs.filter(v=>v.memberId===S.user.id);
    const teamDV=[...new Map(dayVacs.filter(v=>v.memberId!==S.user.id).map(v=>[v._key,v])).values()];
    const isFut=ds>=todayStr;

    detail=`<div class="cal-detail-panel">
      <div class="cdp-head">
        <div class="cdp-date">${parseInt(dd)} ${MN_FULL[parseInt(dm2)-1]}</div>
        <button onclick="S.selectedDay=null;rerender()" class="cdp-close">✕</button>
      </div>
      ${hol?`<div class="cdp-holiday">🎉 ${escH(hol)}</div>`:''}
      ${myDV.length?`
        <div class="cdp-section">МОЙ ОТПУСК</div>
        ${[...new Map(myDV.map(v=>[v._key,v])).values()].map(v=>`
          <div class="cdp-vac-item">
            <span class="cdp-vac-range">📅 ${v.from} — ${v.to}</span>
            <div style="display:flex;gap:4px;margin-top:4px">
              <button class="vac-btn edit" onclick="openEditVac('${v._key}','${v.from}','${v.to}')">Изменить</button>
              <button class="vac-btn del" onclick="delVac('${v._key}')">Отменить</button>
            </div>
          </div>`).join('')}
      `:''}
      ${teamDV.length?`
        <div class="cdp-section" style="margin-top:${myDV.length?'.75rem':'0'}">КОЛЛЕГИ В ОТПУСКЕ</div>
        ${teamDV.map(v=>{
          const mem=S.members[v.memberId]||{name:'?'};
          return`<div style="display:flex;align-items:center;gap:8px;padding:.375rem 0">
            ${avImg(mem.avatar,mem.name,26,mem.color||COLORS[0])}
            <div>
              <div style="font-size:13px;font-weight:500">${escH(mem.name)}</div>
              <div style="font-size:11px;color:var(--t3)">${v.from} — ${v.to}</div>
            </div>
          </div>`;
        }).join('')}
      `:''}
      ${!myDV.length&&!teamDV.length&&!hol?`<div style="font-size:13px;color:var(--t3);padding:.5rem 0">Нет событий</div>`:''}
      ${isFut?`
        <div class="cdp-add-vac">
          <div class="cdp-section">ДОБАВИТЬ ОТПУСК</div>
          <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
            <input type="date" id="vfrom" value="${ds}" style="font-size:12px;padding:6px 10px;border-radius:8px;flex:1;min-width:120px">
            <span style="font-size:12px;color:var(--t2)">—</span>
            <input type="date" id="vto" value="${ds}" min="${ds}" style="font-size:12px;padding:6px 10px;border-radius:8px;flex:1;min-width:120px">
            <button onclick="saveVac()" style="padding:7px 14px;border-radius:8px;border:none;background:var(--accent);color:#fff;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap">+ Добавить</button>
          </div>
        </div>`:''}
    </div>`;
  }

  // ── Mini year strip ──
  const miniStrip=Array.from({length:12},(_,m)=>{
    const isActive=m===curM;
    const hasHol=Object.keys(HOLIDAYS).some(k=>k.startsWith(`${curY}-${String(m+1).padStart(2,'0')}`));
    const hasVac=Object.values(S.vacations||{}).some(v=>v.from.substring(0,7)===`${curY}-${String(m+1).padStart(2,'0')}`);
    return`<button class="mstrip-btn ${isActive?'active':''}" onclick="S.calMonth=${m};S.selectedDay=null;rerender()">
      <span class="mstrip-name">${MN_S[m]}</span>
      <div class="mstrip-dots">
        ${hasHol?'<span class="mstrip-dot" style="background:var(--gold)"></span>':''}
        ${hasVac?'<span class="mstrip-dot" style="background:var(--green)"></span>':''}
      </div>
    </button>`;
  }).join('');

  return`<div class="cal-outer">
    <!-- Header -->
    <div class="cal-header-bar">
      <div class="cal-header-left">
        <div class="cal-big-month">${MN_FULL[curM]}</div>
        <div class="cal-big-year">${curY}</div>
      </div>
      <div class="cal-header-right">
        <button class="cal-nav-btn" onclick="prevMonth()">←</button>
        <button class="cal-nav-btn" onclick="goToday()" style="padding:6px 14px;border-radius:8px;font-size:12px">Сегодня</button>
        <button class="cal-nav-btn" onclick="nextMonth()">→</button>
      </div>
    </div>

    <!-- Month strip -->
    <div class="month-strip">${miniStrip}</div>

    <!-- Main grid + detail panel -->
    <div class="cal-main-layout">
      <div class="big-cal-wrap">
        <!-- Day headers -->
        <div class="big-cal-grid">
          ${['Пн','Вт','Ср','Чт','Пт','Сб','Вс'].map(d=>`<div class="big-dh">${d}</div>`).join('')}
          ${cells}
        </div>
        <!-- Legend -->
        <div class="cal-legend" style="margin-top:.75rem">
          <div class="li"><div class="ld" style="background:var(--accent);border-radius:50%"></div>Сегодня</div>
          <div class="li"><div class="ld" style="background:rgba(40,120,232,.3)"></div>Мой отпуск</div>
          <div class="li"><div class="ld" style="background:rgba(212,146,10,.35)"></div>Праздник РК</div>
          <div class="li"><span style="font-size:10px">●</span> Отпуск коллеги</div>
        </div>
      </div>

      <!-- Right panel: detail + upcoming -->
      <div class="cal-right-col">
        ${detail}
        <!-- Upcoming vacations -->
        ${myVacsAll.length?`
          <div class="cal-upcoming">
            <div class="cdp-section">МОИ ОТПУСКА</div>
            ${myVacsAll.sort((a,b)=>a[1].from.localeCompare(b[1].from)).map(([k,v])=>`
              <div class="cdp-vac-item">
                <span class="cdp-vac-range">📅 ${v.from} — ${v.to}</span>
                <div style="display:flex;gap:4px;margin-top:4px">
                  <button class="vac-btn edit" onclick="openEditVac('${k}','${v.from}','${v.to}')">Изменить</button>
                  <button class="vac-btn del" onclick="delVac('${k}')">Отменить</button>
                </div>
              </div>`).join('')}
          </div>`:''}
        <!-- Upcoming holidays -->
        ${monthHols.length?`
          <div class="cal-upcoming">
            <div class="cdp-section">ПРАЗДНИКИ МЕСЯЦА</div>
            ${monthHols.map(([k,n])=>`
              <div style="display:flex;align-items:center;gap:8px;padding:.25rem 0">
                <span style="font-size:18px">🎉</span>
                <div>
                  <div style="font-size:13px;font-weight:500">${escH(n)}</div>
                  <div style="font-size:11px;color:var(--t3)">${k}</div>
                </div>
              </div>`).join('')}
          </div>`:''}
        <!-- Team on vacation this month -->
        ${monthVacs.filter(v=>v.memberId!==S.user.id).length?`
          <div class="cal-upcoming">
            <div class="cdp-section">ОТПУСКА КОЛЛЕГ</div>
            ${monthVacs.filter(v=>v.memberId!==S.user.id).map(v=>{
              const mem=S.members[v.memberId]||{name:'?'};
              return`<div style="display:flex;align-items:center;gap:8px;padding:.25rem 0">
                ${avImg(mem.avatar,mem.name,26,mem.color||COLORS[0])}
                <div>
                  <div style="font-size:13px;font-weight:500">${escH(mem.name)}</div>
                  <div style="font-size:11px;color:var(--t3)">${v.from} — ${v.to}</div>
                </div>
              </div>`;
            }).join('')}
          </div>`:''}
      </div>
    </div>
  </div>`;
}

window.prevMonth=()=>{
  const m=S.calMonth!==undefined?S.calMonth:new Date().getMonth();
  const y=S.calYear||new Date().getFullYear();
  if(m===0){S.calMonth=11;S.calYear=y-1;}else{S.calMonth=m-1;}
  S.selectedDay=null;rerender();
};
window.nextMonth=()=>{
  const m=S.calMonth!==undefined?S.calMonth:new Date().getMonth();
  const y=S.calYear||new Date().getFullYear();
  if(m===11){S.calMonth=0;S.calYear=y+1;}else{S.calMonth=m+1;}
  S.selectedDay=null;rerender();
};
window.goToday=()=>{
  const t=new Date();S.calMonth=t.getMonth();S.calYear=t.getFullYear();S.selectedDay=null;rerender();
};

/* ── FILES ── */
function gdriveDirect(url){
  // Convert Google Drive share link to direct download link
  if(!url)return'#';
  const m=url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if(m)return`https://drive.google.com/uc?export=download&id=${m[1]}`;
  return url;
}
function gdrivePreview(url){
  if(!url)return'#';
  const m=url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if(m)return`https://drive.google.com/file/d/${m[1]}/preview`;
  return url;
}
function gdriveViewUrl(url){
  if(!url)return'#';
  const m=url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if(m)return`https://drive.google.com/file/d/${m[1]}/view`;
  return url;
}
function fileIcon(name){
  const ext=(name||'').split('.').pop().toLowerCase();
  const map={pdf:'📄',xlsx:'📊',xls:'📊',docx:'📝',doc:'📝',
    pptx:'📊',ppt:'📊',dat:'💾',txt:'📋',csv:'📊',
    png:'🖼',jpg:'🖼',jpeg:'🖼',gif:'🖼',mp4:'🎬',
    avi:'🎬',mov:'🎬',zip:'📦',rar:'📦',mp3:'🎵'};
  return map[ext]||'📎';
}

/* ── MESSAGES ── */
function renderMessages(){
  const others=membersArr().filter(m=>m.id!==S.user.id);
  const sidebar=others.map(m=>{
    const key=dmKey(S.user.id,m.id);
    const msgs=Object.values(S.dms[key]||{}).sort((a,b)=>a.ts-b.ts);
    const last=msgs[msgs.length-1];
    const uc=msgs.filter(msg=>msg.from!==S.user.id&&!msg.read).length;
    return`<div class="dm-item ${S.activeDM===m.id?'active':''}" onclick="openDM('${m.id}')">
      ${avImg(m.avatar,m.name,36,m.color||COLORS[0],'dm-av')}
      <div class="dm-info">
        <div class="dm-name">${escH(m.name)}</div>
        <div class="dm-preview">${last?(last.from===S.user.id?'Вы: ':'')+escH(last.text.slice(0,28)):'Нет сообщений'}</div>
      </div>
      ${uc>0?`<span class="dm-badge">${uc}</span>`:''}
    </div>`;
  }).join('');

  let chat='';
  if(S.activeDM){
    const peer=S.members[S.activeDM];
    if(peer){
      const key=dmKey(S.user.id,peer.id);
      const msgs=Object.values(S.dms[key]||{}).sort((a,b)=>a.ts-b.ts);
      msgs.forEach(msg=>{if(msg.from!==S.user.id&&!msg.read&&msg._key)fbUpd(`dms/${key}/${msg._key}`,{read:true})});
      chat=`<div class="dm-chat">
        <div class="dm-chat-hdr">
          ${avImg(peer.avatar,peer.name,36,peer.color||COLORS[0])}
          <div><div class="dm-chat-name">${escH(peer.name)}</div><div class="dm-chat-role">${escH(peer.role||'')}</div></div>
        </div>
        <div class="dm-messages" id="dm-msgs">
          ${msgs.length?msgs.map(msg=>{
            const isMe=msg.from===S.user.id;
            const sender=isMe?(S.members[S.user.id]||S.user):peer;
            return`<div class="msg ${isMe?'me':''}">
              ${avImg(sender.avatar,sender.name,26,sender.color||COLORS[0])}
              <div class="msg-body">
                <div class="msg-meta">${isMe?'Вы':escH(peer.name.split(' ')[0])} · ${msg.time}</div>
                <div class="msg-bubble">${escH(msg.text)}</div>
              </div>
            </div>`;
          }).join(''):`<div class="no-chat"><span style="font-size:36px">👋</span>Начните диалог</div>`}
        </div>
        <div class="dm-input-bar">
          <input class="dm-input" id="dminp" placeholder="Написать ${escA(peer.name.split(' ')[0])}..."
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendDM('${peer.id}')}">
          <button class="dm-send" onclick="sendDM('${peer.id}')">➤</button>
        </div>
      </div>`;
    }
  } else {
    chat=`<div class="dm-chat"><div class="no-chat"><span style="font-size:40px">💬</span>Выберите коллегу</div></div>`;
  }

  return`<div class="dm-layout">
    <div class="dm-list">
      <div class="dm-list-head">Сообщения</div>
      ${others.length?sidebar:`<div style="padding:1rem;font-size:13px;color:var(--t3)">Коллеги появятся после регистрации</div>`}
    </div>
    ${chat}
  </div>`;
}

window.doLogin = async()=>{
  const email=(document.getElementById('le')||{}).value||'';
  if(!email){showToast('Введите email',true);return}
  const btn=document.getElementById('lbtn');if(btn){btn.disabled=true;btn.textContent='Проверяем...';}
  const members=await fbGet('members');
  if(members){
    const found=Object.values(members).find(m=>m.email===email.trim());
    if(found){
      S.user=found;S.page='feed';
      sessionStorage.setItem('rs_user',JSON.stringify(found));
      startListeners();rerender();return;
    }
  }
  showToast('Email не найден. Зарегистрируйтесь',true);
  if(btn){btn.disabled=false;btn.textContent='Войти';}
};

window.doReg = async()=>{
  const fn=(document.getElementById('rf')||{}).value||'';
  const ln=(document.getElementById('rl')||{}).value||'';
  const em=(document.getElementById('re')||{}).value||'';
  const ro=(document.getElementById('rr')||{}).value||'';
  const ph=(document.getElementById('rph')||{}).value||'';
  const p=(document.getElementById('rp')||{}).value||'';
  const p2=(document.getElementById('rp2')||{}).value||'';
  const bday=(document.getElementById('rbday')||{}).value||'';
  const fam=(document.getElementById('rfam')||{}).value||'';
  const join=(document.getElementById('rjoin')||{}).value||String(new Date().getFullYear());
  const proj=(document.getElementById('rproj')||{}).value||'';
  const skills=(document.getElementById('rskills')||{}).value||'';
  const bio=(document.getElementById('rbio')||{}).value||'';
  if(!fn||!ln||!em){showToast('Заполните имя, фамилию и email',true);return}
  if(p&&p!==p2){showToast('Пароли не совпадают',true);return}
  const btn=document.getElementById('rbtn');if(btn){btn.disabled=true;btn.textContent='Сохраняем...';}
  const existing=await fbGet('members');
  if(existing){
    const dup=Object.values(existing).find(m=>m.email===em.trim());
    if(dup){S.user=dup;S.page='feed';sessionStorage.setItem('rs_user',JSON.stringify(dup));startListeners();rerender();return;}
  }
  const colorIdx=existing?Object.keys(existing).length%COLORS.length:0;
  const id='m_'+Date.now();
  const nm={id,name:`${fn.trim()} ${ln.trim()}`,role:ro.trim()||'Сотрудник',
    email:em.trim(),phone:ph.trim(),joined:join.trim(),
    skills:skills?skills.split(',').map(s=>s.trim()).filter(Boolean):[],
    bio:bio.trim(),color:COLORS[colorIdx],birthday:bday,family:fam,
    project:proj.trim(),avatar:'',cover:''};
  await fbSet(`members/${id}`,nm);
  S.user=nm;S.page='feed';
  sessionStorage.setItem('rs_user',JSON.stringify(nm));
  startListeners();showToast('Добро пожаловать!');rerender();
};

window.saveProf = async()=>{
  const me=S.members[S.user.id]||S.user;
  const upd={
    phone:(document.getElementById('ep')||{}).value||me.phone||'',
    joined:(document.getElementById('ej')||{}).value||me.joined||'',
    birthday:(document.getElementById('ebday')||{}).value||'',
    family:(document.getElementById('efam')||{}).value||'',
    project:(document.getElementById('eproj')||{}).value||'',
    bio:(document.getElementById('eb')||{}).value||'',
  };
  const sk=(document.getElementById('es')||{}).value||'';
  upd.skills=sk?sk.split(',').map(s=>s.trim()).filter(Boolean):me.skills||[];
  await fbUpd(`members/${me.id}`,upd);
  S.user={...S.user,...upd};
  sessionStorage.setItem('rs_user',JSON.stringify(S.user));
  S.modal=null;showToast('Профиль сохранён!');rerender();
};

window.uploadAvatar = async(e)=>{
  const file=e.target.files[0];if(!file)return;
  if(file.size>800000){showToast('Фото должно быть меньше 800КБ',true);return}
  const reader=new FileReader();
  reader.onload=async ev=>{
    const dataUrl=ev.target.result;
    await fbUpd(`members/${S.user.id}`,{avatar:dataUrl});
    S.user={...S.user,avatar:dataUrl};
    sessionStorage.setItem('rs_user',JSON.stringify(S.user));
    showToast('Фото обновлено!');rerender();
  };
  reader.readAsDataURL(file);
};

window.uploadCover = async(e)=>{
  const file=e.target.files[0];if(!file)return;
  if(file.size>1200000){showToast('Обложка должна быть меньше 1.2МБ',true);return}
  const reader=new FileReader();
  reader.onload=async ev=>{
    await fbUpd(`members/${S.user.id}`,{cover:ev.target.result});
    S.user={...S.user,cover:ev.target.result};
    sessionStorage.setItem('rs_user',JSON.stringify(S.user));
    showToast('Обложка обновлена!');rerender();
  };
  reader.readAsDataURL(file);
};

function shuffle(arr){ return arr.slice().sort(()=>Math.random()-.5); }

function makeRoomCode(){
  return Math.random().toString(36).slice(2,6).toUpperCase();
}

function generateBoard(){
  const words = shuffle(CN_WORDS).slice(0, 25);
  // Red: 9, Blue: 8, Neutral: 7, Black: 1  (red goes first)
  const colors = shuffle([
    ...Array(9).fill('red'),
    ...Array(8).fill('blue'),
    ...Array(7).fill('neutral'),
    'black'
  ]);
  return words.map((w,i)=>({word:w, color:colors[i], revealed:false}));
}

/* ── RENDER GAME ── */
function renderGame(){
  const g = S.game;

  // No room joined yet → lobby
  if(!g || !S.gameRoom){
    return renderGameLobby();
  }

  // Check if I'm in this room
  const myId = S.user.id;
  const allPlayers = [
    ...(Object.values(g.redTeam||{})),
    ...(Object.values(g.blueTeam||{}))
  ];
  const imIn = allPlayers.some(p=>p.id===myId);
  if(!imIn) return renderGameLobby();

  // Win condition
  if(g.winner) return renderWinScreen(g);

  // Game started
  if(g.started) return renderGameBoard(g);

  // Waiting room
  return renderGameRoom(g);
}

function renderGameBoard(g){
  const myId=S.user.id;
  const isRedCap=g.redCaptain===myId;
  const isBlueCap=g.blueCaptain===myId;
  const isSpymaster=isRedCap||isBlueCap;
  const myTeam=Object.values(g.redTeam||{}).find(p=>p.id===myId)?'red':'blue';
  const isMyTurn=(g.turn===myTeam);
  const isMyTeamCap=(g.turn==='red'&&isRedCap)||(g.turn==='blue'&&isBlueCap);
  const cards=g.board||[];

  // Count remaining
  const redLeft=cards.filter(c=>c.color==='red'&&!c.revealed).length;
  const blueLeft=cards.filter(c=>c.color==='blue'&&!c.revealed).length;

  const cardHtml=cards.map((c,i)=>{
    let cls='game-card';
    if(c.revealed){
      cls+=` revealed-${c.color}`;
    } else if(isSpymaster){
      cls+=` spymaster-${c.color}`;
    }
    const canClick=isMyTurn&&!isMyTeamCap&&!c.revealed&&g.currentClue;
    return`<div class="${cls}" ${canClick?`onclick="guessCard(${i})"`:''}>
      ${escH(c.word)}
    </div>`;
  }).join('');

  const turnLabel=g.turn==='red'?'🔴 Красные':'🔵 Синие';
  const clueHtml=g.currentClue
    ? `<span class="clue-word">${escH(g.currentClue.word)}</span> <span class="clue-num">${g.currentClue.num}</span> · Угадано: ${g.currentClue.guessed||0}`
    : 'Ждём подсказку капитана...';

  return`<div class="game-wrap">
    <div class="game-board-wrap">
      <!-- Status bar -->
      <div class="game-status-bar">
        <div class="game-score">
          <span class="score-red">🔴 ${redLeft}</span>
          <span class="score-sep">vs</span>
          <span class="score-blue">${blueLeft} 🔵</span>
        </div>
        <span class="turn-indicator turn-${g.turn}">${turnLabel}</span>
        <div class="clue-display">${clueHtml}</div>
        <button class="gbtn gbtn-secondary" style="padding:6px 14px;font-size:12px" onclick="leaveRoom()">Выйти</button>
      </div>

      <!-- Cards -->
      <div class="cards-grid">${cardHtml}</div>

      <!-- Captain clue form -->
      ${isMyTeamCap&&isMyTurn&&!g.currentClue?`
        <div class="clue-form">
          <div style="font-size:13px;font-weight:600;color:var(--t2);white-space:nowrap">👑 Ваша подсказка:</div>
          <input class="clue-input" id="clue-word-inp" placeholder="Слово-подсказка" maxlength="30">
          <select class="clue-num-select" id="clue-num-sel">
            ${[1,2,3,4,5,6,7,8,9].map(n=>`<option value="${n}">${n}</option>`).join('')}
          </select>
          <button class="gbtn gbtn-primary" style="padding:8px 18px;font-size:13px" onclick="giveClue()">Дать подсказку</button>

      ${isMyTurn&&!isMyTeamCap&&g.currentClue?`
        <div style="text-align:center">
          <button class="end-turn-btn" onclick="endTurn()">Завершить ход →</button>

window.showJoinForm = ()=>{

window.createRoom = async()=>{
  const code=makeRoomCode();
  const me=S.members[S.user.id]||S.user;
  const playerData={id:me.id,name:me.name,avatar:me.avatar||'',color:me.color||COLORS[0]};
  const room={
    creatorId:me.id,
    redTeam:{[me.id]:playerData},
    blueTeam:{},
    redCaptain:null,blueCaptain:null,
    started:false,winner:null,
    turn:'red',board:null,currentClue:null,
    createdAt:Date.now()
  };
  await fbSet(`game/rooms/${code}`, room);
  S.gameRoom=code;
  fbListen(`game/rooms/${code}`, v=>{ S.game=v; if(S.page==='game')rerender(); });
  rerender();
};

window.joinRoom = async()=>{
  const code=(document.getElementById('room-code-inp')?.value||'').toUpperCase().trim();
  if(code.length!==4){showToast('Введите 4-буквенный код',true);return;}
  const room=await fbGet(`game/rooms/${code}`);
  if(!room){showToast('Комната не найдена',true);return;}
  const me=S.members[S.user.id]||S.user;
  const playerData={id:me.id,name:me.name,avatar:me.avatar||'',color:me.color||COLORS[0]};
  // Add to red team by default if not already in either
  const inRed=room.redTeam&&room.redTeam[me.id];
  const inBlue=room.blueTeam&&room.blueTeam[me.id];
  if(!inRed&&!inBlue){
    await fbUpd(`game/rooms/${code}/redTeam`,{[me.id]:playerData});
  }
  S.gameRoom=code;
  fbListen(`game/rooms/${code}`, v=>{ S.game=v; if(S.page==='game')rerender(); });
  rerender();
};

window.joinTeam = async(team)=>{
  if(!S.gameRoom)return;
  const me=S.members[S.user.id]||S.user;
  const playerData={id:me.id,name:me.name,avatar:me.avatar||'',color:me.color||COLORS[0]};
  const g=S.game;
  // Remove from other team
  if(team==='red'&&g.blueTeam&&g.blueTeam[me.id]){
    await fbDel(`game/rooms/${S.gameRoom}/blueTeam/${me.id}`);
    if(g.blueCaptain===me.id) await fbSet(`game/rooms/${S.gameRoom}/blueCaptain`,null);
  }
  if(team==='blue'&&g.redTeam&&g.redTeam[me.id]){
    await fbDel(`game/rooms/${S.gameRoom}/redTeam/${me.id}`);
    if(g.redCaptain===me.id) await fbSet(`game/rooms/${S.gameRoom}/redCaptain`,null);
  }
  await fbUpd(`game/rooms/${S.gameRoom}/${team}Team`,{[me.id]:playerData});
};

window.becomeCaptain = async(team)=>{
  if(!S.gameRoom)return;
  await fbSet(`game/rooms/${S.gameRoom}/${team}Captain`, S.user.id);
};

window.startGame = async()=>{
  if(!S.gameRoom||!S.game)return;
  const g=S.game;
  if(!g.redCaptain||!g.blueCaptain){showToast('Нужны оба капитана!',true);return;}
  const board=generateBoard();
  await fbUpd(`game/rooms/${S.gameRoom}`,{
    started:true, board, turn:'red', currentClue:null, winner:null
  });
};

window.giveClue = async()=>{
  if(!S.gameRoom)return;
  const word=(document.getElementById('clue-word-inp')?.value||'').trim();
  const num=parseInt(document.getElementById('clue-num-sel')?.value||'1');
  if(!word){showToast('Введите слово-подсказку',true);return;}
  await fbSet(`game/rooms/${S.gameRoom}/currentClue`,{word,num,guessed:0});
};

window.guessCard = async(idx)=>{
  if(!S.gameRoom||!S.game)return;
  const g=S.game;
  const card=g.board[idx];
  if(!card||card.revealed)return;
  const myTeam=Object.values(g.redTeam||{}).find(p=>p.id===S.user.id)?'red':'blue';
  if(g.turn!==myTeam)return;

  // Reveal card
  await fbUpd(`game/rooms/${S.gameRoom}/board/${idx}`,{revealed:true});

  // Update guessed count
  const guessed=(g.currentClue?.guessed||0)+1;
  await fbSet(`game/rooms/${S.gameRoom}/currentClue/guessed`, guessed);

  // Check win
  const board=[...g.board];
  board[idx]={...card,revealed:true};

  // Black card = instant loss
  if(card.color==='black'){
    const loser=myTeam;
    const winner=loser==='red'?'blue':'red';
    await fbSet(`game/rooms/${S.gameRoom}/winner`, winner);
    return;
  }

  // Check if team won
  const remaining=board.filter(c=>c.color===myTeam&&!c.revealed).length;
  if(remaining===0){
    await fbSet(`game/rooms/${S.gameRoom}/winner`, myTeam);
    return;
  }

  // Wrong color = end turn
  if(card.color!==myTeam){
    await endTurnLogic(myTeam);
    return;
  }

  // Correct! Check if used all guesses
  const maxGuesses=(g.currentClue?.num||1)+1; // +1 bonus guess
  if(guessed>=maxGuesses){
    await endTurnLogic(myTeam);
  }
};

async function endTurnLogic(currentTeam){
  const next=currentTeam==='red'?'blue':'red';
  await fbUpd(`game/rooms/${S.gameRoom}`,{turn:next, currentClue:null});
}

window.endTurn = async()=>{
  if(!S.gameRoom||!S.game)return;
  await endTurnLogic(S.game.turn);
};

window.rematch = async()=>{
  if(!S.gameRoom)return;
  const board=generateBoard();
  await fbUpd(`game/rooms/${S.gameRoom}`,{
    started:true, board, turn:'red', currentClue:null, winner:null
  });
};

window.leaveRoom = async()=>{
  if(!S.gameRoom||!S.game)return;
  const me=S.user.id;
  const g=S.game;
  if(g.redTeam&&g.redTeam[me]) await fbDel(`game/rooms/${S.gameRoom}/redTeam/${me}`);
  if(g.blueTeam&&g.blueTeam[me]) await fbDel(`game/rooms/${S.gameRoom}/blueTeam/${me}`);
  if(g.redCaptain===me) await fbSet(`game/rooms/${S.gameRoom}/redCaptain`,null);
  if(g.blueCaptain===me) await fbSet(`game/rooms/${S.gameRoom}/blueCaptain`,null);
  S.gameRoom=null; S.game=null;
  rerender();
};

function renderActivePolls(){
  const polls=Object.entries(S.polls||{}).sort((a,b)=>(b[1].ts||0)-(a[1].ts||0)).slice(0,3);
  if(!polls.length)return'';
  return polls.map(([id,p])=>{
    const total=Object.values(p.votes||{}).reduce((s,v)=>s+(v||0),0)||1;
    const myVote=p.userVotes&&p.userVotes[S.user.id];
    const isAuthor=p.authorId===S.user.id;
    return`<div class="poll-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.75rem">
        <div>
          <div style="font-size:11px;color:var(--t3);margin-bottom:3px">📊 ОПРОС</div>
          <div class="poll-q">${escH(p.question)}</div>
        </div>
        ${isAuthor?`<button class="fdel" onclick="delPoll('${id}')" title="Удалить">🗑</button>`:''}
      </div>
      ${(p.options||[]).map((opt,i)=>{
        const cnt=p.votes&&p.votes[i]?p.votes[i]:0;
        const pct=Math.round(cnt/total*100);
        const voted=myVote===String(i);
        return`<div class="poll-option ${voted?'voted':''}" onclick="votePoll('${id}',${i})">
          <div class="poll-bar" style="width:${myVote!==undefined?pct:0}%"></div>
          <span class="poll-option-text">${voted?'✓ ':''}${escH(opt)}</span>
          ${myVote!==undefined?`<span class="poll-pct">${pct}%</span>`:''}
        </div>`;
      }).join('')}
      <div class="poll-meta">
        ${Object.values(p.userVotes||{}).length} голосов · ${p.authorName||''}
        ${myVote===undefined?'<span style="color:var(--accent);margin-left:4px">· Нажмите чтобы проголосовать</span>':''}
      </div>
    </div>`;
  }).join('');
}

};
window.addPollOpt=()=>{

  n.innerHTML=`<input type="text" class="poll-opt-inp" placeholder="Вариант ${wrap.children.length+1}"><button class="remove-opt" onclick="removePollOpt(this)">✕</button>`;

window.removePollOpt=btn=>{

window.submitPoll=async()=>{
  const q=(document.getElementById('poll-q')?.value||'').trim();
  const opts=[...document.querySelectorAll('.poll-opt-inp')].map(i=>i.value.trim()).filter(Boolean);
  if(!q||opts.length<2){showToast('Вопрос и минимум 2 варианта',true);return;}
  const me=S.members[S.user.id]||S.user;
  await fbPush('polls',{question:q,options:opts,votes:{},userVotes:{},

window.votePoll=async(pollId,optIdx)=>{

window.fetchWeather=async()=>{
  try{
    const r=await fetch('https://api.open-meteo.com/v1/forecast?latitude=47.1167&longitude=51.8833&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m&wind_speed_unit=ms');
    const d=await r.json();
    const c=d.current;
    const code=c.weather_code;
    let main='Clear',desc='Ясно';
    if(code>=95){main='Thunderstorm';desc='Гроза';}
    else if(code>=71){main='Snow';desc='Снег';}
    else if(code>=61){main='Rain';desc='Дождь';}
    else if(code>=51){main='Drizzle';desc='Морось';}
    else if(code>=45){main='Fog';desc='Туман';}
    else if(code>=3){main='Clouds';desc='Облачно';}
    else if(code>=1){main='Clouds';desc='Переменная облачность';}
    const w={temp:c.temperature_2m,feels:c.apparent_temperature,humidity:c.relative_humidity_2m,
      wind:c.wind_speed_10m,main,desc,ts:Date.now()};
    S.weather=w;
    await fbSet('weather_cache',w);
    rerender();
  }catch(e){showToast('Не удалось загрузить погоду',true);}
};

function calcResult(val,unit){
  return`<div class="calc-result"><div class="calc-result-val">${val}</div><div class="calc-result-unit">${unit}</div></div>`;
}

function renderPressureCalc(){
  return`<div class="calc-section active">
    <div style="font-size:13px;color:var(--t2);margin-bottom:.875rem">Конвертер давления</div>
    <div class="calc-group">
      <div class="calc-label">ЗНАЧЕНИЕ</div>
      <input type="number" id="p-val" placeholder="Введите значение" oninput="calcPressure()">
      <div style="margin-top:.5rem"><label>ИЗ:</label>
        <select id="p-from" onchange="calcPressure()" style="margin-top:4px">
          <option value="psi">psi</option><option value="bar">bar</option>
          <option value="atm">атм</option><option value="mpa">МПа</option><option value="kpa">кПа</option>
        </select>
      </div>
    </div>
    <div id="p-result" style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-top:.75rem"></div>
  </div>`;
}
window.calcPressure=()=>{
  const v=parseFloat(document.getElementById('p-val')?.value)||0;
  const from=document.getElementById('p-from')?.value||'psi';
  const toBar={psi:0.0689476,bar:1,atm:1.01325,mpa:10,kpa:0.01};
  const fromBar={psi:14.5038,bar:1,atm:0.986923,mpa:0.1,kpa:100};
  const bar=v*(toBar[from]||1);
  const res=document.getElementById('p-result');
  if(!res)return;
  const units=['psi','bar','atm','mpa','kpa'];
  const labels={psi:'psi',bar:'bar',atm:'атм',mpa:'МПа',kpa:'кПа'};
  res.innerHTML=units.filter(u=>u!==from).map(u=>`
    <div class="calc-result">
      <div class="calc-result-val">${(bar*fromBar[u]).toFixed(4).replace(/\.?0+$/,'')}</div>
      <div class="calc-result-unit">${labels[u]}</div>
    </div>`).join('');
};

function renderFlowrateCalc(){
  return`<div class="calc-section active">
    <div style="font-size:13px;color:var(--t2);margin-bottom:.875rem">Расчёт дебита скважины</div>
    <div class="calc-group">
      <div class="calc-label">ПРОДУКТИВНОСТЬ (м³/сут/атм)</div>
      <input type="number" id="f-pi" placeholder="Индекс продуктивности" oninput="calcFlow()" step="0.1">
    </div>
    <div class="calc-group">
      <div class="calc-label">ПЛАСТОВОЕ ДАВЛЕНИЕ (атм)</div>
      <input type="number" id="f-pr" placeholder="Пластовое давление" oninput="calcFlow()">
    </div>
    <div class="calc-group">
      <div class="calc-label">ЗАБОЙНОЕ ДАВЛЕНИЕ (атм)</div>
      <input type="number" id="f-pwf" placeholder="Забойное давление" oninput="calcFlow()">
    </div>
    <div id="f-result"></div>
  </div>`;
}
window.calcFlow=()=>{
  const pi=parseFloat(document.getElementById('f-pi')?.value)||0;
  const pr=parseFloat(document.getElementById('f-pr')?.value)||0;
  const pwf=parseFloat(document.getElementById('f-pwf')?.value)||0;
  const q=pi*(pr-pwf);
  const res=document.getElementById('f-result');
  if(!res||!pi||!pr)return;
  res.innerHTML=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-top:.75rem">
    <div class="calc-result"><div class="calc-result-val">${q.toFixed(1)}</div><div class="calc-result-unit">м³/сут</div></div>
    <div class="calc-result"><div class="calc-result-val">${(q/6.29).toFixed(1)}</div><div class="calc-result-unit">баррель/сут</div></div>
    <div class="calc-result"><div class="calc-result-val">${(q*1000/24/3600).toFixed(4)}</div><div class="calc-result-unit">м³/с</div></div>
    <div class="calc-result"><div class="calc-result-val">${(q/30).toFixed(0)}</div><div class="calc-result-unit">м³/месяц</div></div>

    <div class="calc-group">

    </div>
    <div class="calc-group">
      <div class="calc-label">ТЕМПЕРАТУРА — °C в °F</div>

    </div>
    <div class="calc-group">
      <div class="calc-label">ДЛИНА — м в футы</div>
      <input type="number" id="u-m" placeholder="метры" oninput="document.getElementById('u-ft').value=(parseFloat(this.value)*3.28084).toFixed(2)">

function renderCO2Calc(){
  return`<div class="calc-section active">
    <div style="font-size:13px;color:var(--t2);margin-bottom:.875rem">Оценка выбросов CO₂</div>
    <div class="calc-group">
      <div class="calc-label">ДОБЫЧА НЕФТИ (т/год)</div>
      <input type="number" id="c-oil" placeholder="тонн нефти в год" oninput="calcCO2()">
    </div>
    <div class="calc-group">
      <div class="calc-label">ДОБЫЧА ГАЗА (млн. м³/год)</div>
      <input type="number" id="c-gas" placeholder="млн. м³ газа в год" oninput="calcCO2()">
    </div>
    <div id="c-result"></div>
  </div>`;
}
window.calcCO2=()=>{
  const oil=parseFloat(document.getElementById('c-oil')?.value)||0;
  const gas=parseFloat(document.getElementById('c-gas')?.value)||0;
  const co2oil=oil*3.07;
  const co2gas=gas*1000*1.96;
  const total=co2oil+co2gas;
  const res=document.getElementById('c-result');
  if(!res||(oil===0&&gas===0))return;
  res.innerHTML=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-top:.75rem">
    <div class="calc-result"><div class="calc-result-val">${(co2oil/1000).toFixed(1)}</div><div class="calc-result-unit">тыс. т CO₂/год (нефть)</div></div>
    <div class="calc-result"><div class="calc-result-val">${(co2gas/1000).toFixed(1)}</div><div class="calc-result-unit">тыс. т CO₂/год (газ)</div></div>
    <div class="calc-result" style="grid-column:span 2"><div class="calc-result-val">${(total/1000).toFixed(1)}</div><div class="calc-result-unit">тыс. т CO₂/год — итого</div></div>
  </div>`;
};


window.switchCalc = id => {
  ['pressure','flowrate','units'].forEach(t=>{
    const sec=document.getElementById('csec-'+t);
    const tab=document.getElementById('ctab-'+t);
    if(sec) sec.style.display = t===id ? 'block' : 'none';
    if(tab) tab.className = 'calc-tab' + (t===id ? ' active' : '');
  });
};

const QUIZ_ICONS = ['🔴','🔵','🟡','🟢'];
const QUIZ_TIME = 20; // секунд на вопрос

let quizTimer = null;
let quizTimeLeft = QUIZ_TIME;

/* ── HELPERS ── */
function quizKey(){ return S.quizRoomId ? `quiz/rooms/${S.quizRoomId}` : null; }
function makePin(){ return Math.floor(1000+Math.random()*9000).toString(); }
function quizMe(room){ return room&&room.players&&room.players[S.user.id]; }
function quizIsHost(room){ return room&&room.hostId===S.user.id; }

/* ── RENDER QUIZ ── */
function renderQuiz(){
  const room = S.quizRoom;
  if(!room || !S.quizRoomId){
    stopQuizTimer();
    return renderQuizLobby();
  }
  if(room.status==='waiting') return renderQuizWaiting(room);
  if(room.status==='question') return renderQuizQuestion(room);
  if(room.status==='leaderboard') return renderQuizLeaderboard(room);
  if(room.status==='finished') return renderQuizFinished(room);
  return renderQuizLobby();
}
