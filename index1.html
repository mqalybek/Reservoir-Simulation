<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RS Team Portal — Reservoir Simulation</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0e17;--bg2:#111827;--bg3:#1a2236;--bg4:#212d42;
  --accent:#4f8ef7;--accent2:#3a7ae0;--accentg:#4ff7c0;
  --gold:#f7c44f;--red:#f75f5f;--green:#4ff7a0;--purple:#a78bfa;
  --t1:#f0f4ff;--t2:#8fa3c0;--t3:#4a6080;
  --border:rgba(79,142,247,0.12);--border2:rgba(79,142,247,0.25);
  --card:rgba(17,24,39,0.9);--r:10px;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 80% 50% at 50% -20%,rgba(79,142,247,0.08),transparent),
  linear-gradient(var(--border) 1px,transparent 1px),
  linear-gradient(90deg,var(--border) 1px,transparent 1px);
  background-size:100% 100%,48px 48px,48px 48px;pointer-events:none;z-index:0}
.app{position:relative;z-index:1;display:flex;flex-direction:column;min-height:100vh}

/* NAV */
nav{display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;height:56px;
  background:rgba(10,14,23,0.95);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:200;backdrop-filter:blur(16px)}
.logo{display:flex;align-items:center;gap:8px}
.logo-mark{width:28px;height:28px;border-radius:7px;
  background:linear-gradient(135deg,var(--accent),var(--accentg));
  display:flex;align-items:center;justify-content:center;
  font-family:'Syne';font-size:12px;font-weight:700;color:#000}
.logo-text{font-family:'Syne';font-size:14px;font-weight:600;letter-spacing:.5px}
.logo-sub{font-size:11px;color:var(--t3);margin-left:4px}
.nav-tabs{display:flex;gap:2px}
.ntab{padding:6px 13px;border-radius:7px;cursor:pointer;font-size:13px;font-weight:500;
  color:var(--t2);transition:all .2s;border:none;background:none;font-family:'Inter'}
.ntab:hover{color:var(--t1);background:var(--bg3)}
.ntab.active{color:var(--accent);background:rgba(79,142,247,0.12)}
.nav-right{display:flex;align-items:center;gap:8px}
.notif-btn{position:relative;background:none;border:1px solid var(--border);border-radius:8px;
  width:34px;height:34px;cursor:pointer;color:var(--t2);
  display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .2s}
.notif-btn:hover{border-color:var(--accent);color:var(--accent)}
.notif-badge{position:absolute;top:-4px;right:-4px;background:var(--red);color:#fff;
  border-radius:50%;width:16px;height:16px;font-size:10px;font-weight:600;
  display:flex;align-items:center;justify-content:center}
.nav-av{width:32px;height:32px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--accentg));
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:#000;cursor:pointer;
  border:2px solid transparent;transition:all .2s}
.nav-av:hover{border-color:var(--accent)}
.btn-out{padding:5px 11px;border-radius:7px;border:1px solid var(--border);
  background:none;color:var(--t3);font-size:12px;cursor:pointer;
  transition:all .2s;font-family:'Inter'}
.btn-out:hover{border-color:var(--red);color:var(--red)}

/* NOTIF */
.notif-panel{position:fixed;top:60px;right:1rem;width:320px;
  background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);
  z-index:300;box-shadow:0 16px 48px rgba(0,0,0,.5);display:none;max-height:400px;overflow-y:auto}
.notif-panel.open{display:block}
.np-head{padding:14px 16px 10px;border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
  position:sticky;top:0;background:var(--bg2)}
.np-title{font-family:'Syne';font-size:13px;font-weight:600}
.np-clear{font-size:11px;color:var(--accent);cursor:pointer;border:none;background:none;font-family:'Inter'}
.np-item{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;gap:10px}
.np-item.unread{background:rgba(79,142,247,0.05)}
.np-icon{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:13px;flex-shrink:0;background:rgba(79,142,247,0.1)}
.np-body{flex:1}
.np-text{font-size:12px;line-height:1.5}
.np-time{font-size:11px;color:var(--t3);margin-top:2px}
.np-empty{padding:1.5rem;text-align:center;font-size:13px;color:var(--t3)}

/* AUTH */
.auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem}
.auth-wrap{width:100%;max-width:500px}
.auth-header{text-align:center;margin-bottom:1.5rem}
.auth-logo{width:52px;height:52px;border-radius:14px;
  background:linear-gradient(135deg,var(--accent),var(--accentg));
  margin:0 auto .75rem;display:flex;align-items:center;justify-content:center;
  font-family:'Syne';font-size:18px;font-weight:700;color:#000}
.auth-title{font-family:'Syne';font-size:22px;font-weight:700;margin-bottom:4px}
.auth-sub{font-size:13px;color:var(--t2)}
.auth-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;
  padding:1.75rem;backdrop-filter:blur(20px)}
.atabs{display:flex;background:var(--bg3);border-radius:8px;padding:3px;margin-bottom:1.25rem;gap:3px}
.atab{flex:1;padding:7px;text-align:center;cursor:pointer;font-size:13px;font-weight:500;
  color:var(--t2);border-radius:6px;border:none;background:none;transition:all .2s;font-family:'Inter'}
.atab.active{background:var(--bg2);color:var(--accent);border:1px solid var(--border)}

/* FORMS */
.fg{margin-bottom:.875rem}
label{display:block;font-size:10px;color:var(--t3);margin-bottom:4px;font-weight:500;letter-spacing:.5px}
input,select,textarea{width:100%;background:var(--bg3);border:1px solid var(--border);
  border-radius:8px;padding:8px 12px;color:var(--t1);font-size:13px;
  font-family:'Inter';transition:border .2s;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
input::placeholder,textarea::placeholder{color:var(--t3)}
select option{background:var(--bg2)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.btn{width:100%;padding:10px;border-radius:8px;border:none;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;font-weight:600;font-size:14px;cursor:pointer;
  transition:all .2s;font-family:'Inter';margin-top:4px}
.btn:hover{opacity:.9;transform:translateY(-1px)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.auth-hint{text-align:center;font-size:12px;color:var(--t3);margin-top:.875rem}
.auth-hint span{color:var(--accent);cursor:pointer}
.form-section{font-size:10px;color:var(--t3);letter-spacing:1px;
  margin:.875rem 0 .625rem;padding-bottom:5px;border-bottom:1px solid var(--border)}

/* LOADING */
.loading-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem}
.spinner{width:36px;height:36px;border:3px solid var(--border);
  border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:var(--t2)}

/* SHELL */
.shell{display:flex;flex:1;min-height:calc(100vh - 56px)}
.content{flex:1;overflow-y:auto;padding:1.5rem}
.ph{margin-bottom:1.25rem}
.pt{font-family:'Syne';font-size:18px;font-weight:700}
.ps{font-size:13px;color:var(--t2);margin-top:3px}

/* TEAM */
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:.75rem}
.mcard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:1.25rem;cursor:pointer;transition:all .25s}
.mcard:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 24px rgba(79,142,247,.12)}
.mcard-top{display:flex;gap:10px;align-items:center;margin-bottom:8px}
.mav{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;border:2px solid}
.mname{font-size:14px;font-weight:600}
.mrole{font-size:11px;color:var(--accent);margin-top:2px;font-weight:500}
.msep{border:none;border-top:1px solid var(--border);margin:8px 0}
.mrow{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.mrow span:first-child{color:var(--t2)}
.mtags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.tag{padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;
  background:rgba(79,142,247,.1);color:var(--accent);border:1px solid rgba(79,142,247,.2)}
.tag.vac{background:rgba(247,196,79,.1);color:var(--gold);border-color:rgba(247,196,79,.2)}
.tag.skill{background:rgba(79,247,192,.08);color:var(--accentg);border-color:rgba(79,247,192,.2)}
.sdot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:4px}
.sdot.on{background:var(--green)}.sdot.vac{background:var(--gold)}
.project-bar{background:rgba(167,139,250,0.08);border:1px solid rgba(167,139,250,0.2);
  border-radius:6px;padding:4px 8px;font-size:11px;color:var(--purple);
  margin-bottom:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:400;
  display:flex;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(6px)}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;
  width:100%;max-width:520px;max-height:88vh;overflow-y:auto;padding:1.75rem}
.mhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem}
.mtitle{font-family:'Syne';font-size:16px;font-weight:700}
.btnx{background:none;border:1px solid var(--border);color:var(--t2);
  width:30px;height:30px;border-radius:6px;cursor:pointer;font-size:14px;
  display:flex;align-items:center;justify-content:center;transition:all .2s}
.btnx:hover{border-color:var(--red);color:var(--red)}
.mav-lg{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:22px;font-weight:700;margin:0 auto 1rem;border:3px solid}
.mn{text-align:center;font-family:'Syne';font-size:17px;font-weight:700}
.mr-lbl{text-align:center;font-size:12px;color:var(--accent);margin-top:4px;margin-bottom:1.25rem;font-weight:500}
.igrid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1rem}
.iitem .il{font-size:10px;color:var(--t3);letter-spacing:.5px;margin-bottom:3px}
.iitem .iv{font-size:13px;font-weight:500}
.sec{font-size:10px;color:var(--t3);letter-spacing:1px;
  margin:1rem 0 .5rem;border-bottom:1px solid var(--border);padding-bottom:5px}

/* CALENDAR */
.year-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.625rem}
.mini-month{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.625rem}
.mm-title{font-family:'Syne';font-size:11px;font-weight:700;color:var(--t2);
  text-align:center;margin-bottom:.375rem;letter-spacing:.5px}
.mm-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px}
.mm-dh{text-align:center;font-size:8px;color:var(--t3);padding:1px 0;font-weight:500}
.mm-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;
  border-radius:3px;font-size:9px;cursor:pointer;position:relative;color:var(--t3);transition:background .1s}
.mm-day:hover{background:var(--bg4);color:var(--t1)}
.mm-day.today{background:rgba(79,142,247,.25);color:var(--accent);font-weight:700}
.mm-day.hol{background:rgba(247,196,79,.15);color:var(--gold)}
.mm-day.vac{background:rgba(79,247,160,.1);color:var(--accentg)}
.mm-day.selected{background:rgba(79,142,247,.4);color:#fff;font-weight:700}
.mm-day .md{position:absolute;bottom:1px;left:50%;transform:translateX(-50%);
  width:3px;height:3px;border-radius:50%;background:var(--accentg)}
.mm-day.empty{pointer-events:none}
.cal-year-nav{display:flex;align-items:center;gap:10px;margin-bottom:.875rem}
.cal-year-val{font-family:'Syne';font-size:16px;font-weight:700;min-width:50px;text-align:center}
.cnbtn{padding:5px 10px;border-radius:6px;border:1px solid var(--border);
  background:none;color:var(--t2);cursor:pointer;font-size:12px;transition:all .2s;font-family:'Inter'}
.cnbtn:hover{border-color:var(--accent);color:var(--accent)}
.day-popup{background:var(--bg2);border:1px solid var(--border2);border-radius:10px;
  padding:1rem;margin-bottom:.75rem;animation:fdIn .15s ease}
@keyframes fdIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.day-popup-hd{font-family:'Syne';font-size:14px;font-weight:700;
  margin-bottom:.625rem;display:flex;justify-content:space-between;align-items:center}
.cal-legend{display:flex;gap:1rem;margin-top:.75rem;flex-wrap:wrap}
.li{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--t2)}
.ld{width:10px;height:10px;border-radius:3px}

/* FILES */
.upzone{border:2px dashed var(--border);border-radius:10px;padding:1.25rem;
  text-align:center;cursor:pointer;transition:all .2s;margin-bottom:1rem}
.upzone:hover{border-color:var(--accent);background:rgba(79,142,247,.04)}
.upico{font-size:26px;margin-bottom:5px}
.upt{font-size:13px;color:var(--t2)}
.upt span{color:var(--accent);font-weight:500}
.flist{display:flex;flex-direction:column;gap:6px}
.fitem{background:var(--card);border:1px solid var(--border);border-radius:8px;
  padding:9px 13px;display:flex;align-items:center;gap:10px}
.fico{font-size:18px}
.fi{flex:1}
.fn{font-size:13px;font-weight:500}
.fm{font-size:11px;color:var(--t3);margin-top:1px}
.fdel{background:none;border:none;color:var(--t3);cursor:pointer;font-size:13px;transition:color .2s;padding:4px}
.fdel:hover{color:var(--red)}

/* DM CHAT */
.chat-layout{display:flex;flex:1;height:calc(100vh - 56px)}
.dm-sidebar{width:240px;flex-shrink:0;border-right:1px solid var(--border);
  overflow-y:auto;background:rgba(10,14,23,.6)}
.dm-head{padding:.875rem 1rem .5rem;font-size:10px;color:var(--t3);letter-spacing:1px}
.dm-item{display:flex;align-items:center;gap:10px;padding:9px 12px;
  cursor:pointer;transition:all .2s;border-left:2px solid transparent}
.dm-item:hover{background:var(--bg3)}
.dm-item.active{background:rgba(79,142,247,.1);border-left-color:var(--accent)}
.dm-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;border:1.5px solid}
.dm-info{flex:1;min-width:0}
.dm-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dm-last{font-size:11px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.dm-badge{background:var(--accent);color:#000;border-radius:50%;
  width:16px;height:16px;font-size:10px;font-weight:700;
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.chat-main{flex:1;display:flex;flex-direction:column;min-height:0}
.chat-hdr{padding:.875rem 1rem;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;flex-shrink:0}
.chat-hdr-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:11px;font-weight:700;border:1.5px solid;flex-shrink:0}
.chat-hdr-name{font-family:'Syne';font-size:14px;font-weight:700}
.chat-hdr-sub{font-size:11px;color:var(--t2)}
.messages{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:.5rem}
.msg{display:flex;gap:8px;align-items:flex-end;max-width:72%}
.msg.me{flex-direction:row-reverse;align-self:flex-end}
.msg-av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;border:1px solid}
.msg-meta{font-size:10px;color:var(--t3);margin-bottom:2px}
.msg.me .msg-meta{text-align:right}
.msg-bubble{background:var(--bg3);border:1px solid var(--border);border-radius:10px;
  padding:7px 11px;font-size:13px;line-height:1.5;word-break:break-word}
.msg.me .msg-bubble{background:rgba(79,142,247,.18);border-color:rgba(79,142,247,.3)}
.chat-input-bar{padding:.75rem 1rem;border-top:1px solid var(--border);
  display:flex;gap:8px;align-items:center;flex-shrink:0}
.chat-input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:8px;
  padding:8px 12px;color:var(--t1);font-size:13px;font-family:'Inter';outline:none;transition:border .2s}
.chat-input:focus{border-color:var(--accent)}
.chat-send{padding:8px 14px;border-radius:8px;border:none;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;font-weight:600;font-size:13px;cursor:pointer;white-space:nowrap;font-family:'Inter'}
.chat-send:hover{opacity:.88}
.no-chat{flex:1;display:flex;align-items:center;justify-content:center;
  font-size:14px;color:var(--t3);flex-direction:column;gap:.625rem}

/* PROFILE */
.pcard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1.5rem;margin-bottom:1rem}
.ptop{display:flex;align-items:center;gap:1.25rem;margin-bottom:1.25rem}
.pav{width:68px;height:68px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:24px;font-weight:700;flex-shrink:0}
.pname{font-family:'Syne';font-size:18px;font-weight:700}
.prole{color:var(--accent);font-size:13px;margin-top:3px;font-weight:500}
.pemail{color:var(--t2);font-size:12px;margin-top:2px}
.btedit{padding:7px 14px;border-radius:7px;border:1px solid var(--border);
  background:none;color:var(--t2);font-size:12px;cursor:pointer;transition:all .2s;font-family:'Inter';white-space:nowrap}
.btedit:hover{border-color:var(--accent);color:var(--accent)}
.sep{border:none;border-top:1px solid var(--border);margin:1rem 0}

/* TOAST */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;z-index:600;
  background:var(--bg2);border:1px solid var(--green);border-radius:8px;
  padding:10px 16px;font-size:12px;color:var(--green);display:none;max-width:280px}
.toast.show{display:block;animation:si .3s ease}
.toast.err{border-color:var(--red);color:var(--red)}
@keyframes si{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:translateX(0)}}
.empty{text-align:center;padding:2rem;color:var(--t3);font-size:13px}

@media(max-width:960px){.year-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:700px){
  .year-grid{grid-template-columns:repeat(2,1fr)}
  .logo-sub,.dm-info,.dm-head{display:none}
  .dm-sidebar{width:56px}
  .row2,.row3{grid-template-columns:1fr}
  .igrid{grid-template-columns:1fr}
  .ptop{flex-direction:column;text-align:center}
}
@media(max-width:480px){
  nav{padding:0 .75rem}
  .nav-tabs{display:none}
  .content{padding:1rem}
}
</style>
</head>

const fbRef = path => ref(db, path);

async function fbSet(path, val){ await set(fbRef(path), val) }
async function fbUpdate(path, val){ await update(fbRef(path), val) }
async function fbPush(path, val){ return await push(fbRef(path), val) }
async function fbGet(path){
  const snap = await get(fbRef(path));
  return snap.exists() ? snap.val() : null;
}
function fbListen(path, cb){
  onValue(fbRef(path), snap => cb(snap.exists() ? snap.val() : null));
}

/* ══════════════════════════════════
   UTILS
══════════════════════════════════ */
function ini(n){return(n||'??').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()}
function hexA(hex,a){
  if(!hex||hex.length<7)return`rgba(79,142,247,${a})`;
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return`rgba(${r},${g},${b},${a})`;
}
function escH(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function escA(s){return(s||'').replace(/"/g,'&quot;')}
function fmtDate(d){if(!d)return'—';const p=d.split('-');return p.length===3?`${p[2]}.${p[1]}.${p[0]}`:d}
function dmKey(a,b){return[String(a),String(b)].sort().join('_')}
function isOnVac(memberId){
  const today=new Date().toISOString().split('T')[0];
  return Object.values(S.vacations||{}).some(v=>v.memberId===memberId&&v.from<=today&&today<=v.to);
}
function scrollMsgs(){const el=document.getElementById('msgs');if(el)el.scrollTop=el.scrollHeight}
function membersArray(){return Object.values(S.members||{})}
function unreadCount(){return(S.notifications||[]).filter(n=>!n.read).length}

function showToast(msg, isErr=false){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.className='toast show'+(isErr?' err':'');
  setTimeout(()=>el.className='toast',2600);
}

/* ─── CALENDAR ─── */
function renderCalendar(){
  const y=S.calYear;
  const todayStr=new Date().toISOString().split('T')[0];
  const vacD={};
  Object.values(S.vacations||{}).forEach(v=>{
    let d=new Date(v.from);const e=new Date(v.to);
    while(d<=e){
      const k=d.toISOString().split('T')[0];
      if(!vacD[k])vacD[k]=[];
      const mem=S.members[v.memberId];
      if(mem)vacD[k].push({name:mem.name,color:mem.color});
      d.setDate(d.getDate()+1);
    }
  });

  const months=Array.from({length:12},(_,m)=>{
    const fd=new Date(y,m,1).getDay(),off=fd===0?6:fd-1,dim=new Date(y,m+1,0).getDate();
    let cells='';
    for(let i=0;i<off;i++)cells+=`<div class="mm-day empty"></div>`;
    for(let d=1;d<=dim;d++){
      const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const isT=ds===todayStr,isH=!!HOLIDAYS[ds],isV=!!vacD[ds],isSel=S.selectedDay===ds;
      let cls='mm-day';
      if(isSel)cls+=' selected';else if(isT)cls+=' today';
      if(isH&&!isSel)cls+=' hol';if(isV&&!isSel)cls+=' vac';
      cells+=`<div class="${cls}" onclick="selectDay('${ds}')">${d}${isV&&!isSel?'<div class="md"></div>':''}</div>`;
    }
    return`<div class="mini-month">
      <div class="mm-title">${MN_SHORT[m]}</div>
      <div class="mm-grid">
        ${['П','В','С','Ч','П','С','В'].map(d=>`<div class="mm-dh">${d}</div>`).join('')}
        ${cells}
      </div>
    </div>`;
  }).join('');

  let popup='';
  if(S.selectedDay){
    const ds=S.selectedDay;
    const [dy,dm,dd]=ds.split('-');
    const hol=HOLIDAYS[ds],dayVacs=vacD[ds]||[],isFuture=ds>=todayStr;
    popup=`<div class="day-popup">
      <div class="day-popup-hd">
        <span>${parseInt(dd)} ${MN_FULL[parseInt(dm)-1]} ${dy}</span>
        <button class="btnx" onclick="S.selectedDay=null;render()">✕</button>
      </div>
      ${hol?`<div style="margin-bottom:.5rem">
        <span style="background:rgba(247,196,79,.12);border:1px solid rgba(247,196,79,.25);
          border-radius:5px;padding:3px 9px;font-size:12px;color:var(--gold)">🎉 ${hol}</span>
      </div>`:''}
      ${dayVacs.length?`
        <div style="font-size:10px;color:var(--t3);letter-spacing:.5px;margin-bottom:.375rem">В ОТПУСКЕ</div>
        ${dayVacs.map(v=>`<div style="display:flex;align-items:center;gap:7px;margin-bottom:5px;font-size:13px">
          <span style="width:8px;height:8px;border-radius:50%;background:${v.color};display:inline-block;flex-shrink:0"></span>
          ${escH(v.name)}</div>`).join('')}
      `:`<div style="font-size:13px;color:var(--t3);margin-bottom:${isFuture?'.75rem':'0'}">${hol?'':'Нет событий'}</div>`}
      ${isFuture?`
        <div style="border-top:1px solid var(--border);padding-top:.75rem;margin-top:${dayVacs.length?'.75rem':'0'}">
          <div style="font-size:10px;color:var(--t3);letter-spacing:.5px;margin-bottom:.375rem">ДОБАВИТЬ ОТПУСК С ЭТОЙ ДАТЫ</div>
          <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
            <span style="font-size:12px;color:var(--t2)">по</span>
            <input type="date" id="vto-q" value="${ds}" min="${ds}"
              style="flex:1;min-width:130px;padding:6px 10px;font-size:12px">
            <button onclick="saveVacFromDay('${ds}')"
              style="padding:7px 13px;border-radius:7px;border:none;

              + Добавить
            </button>
          </div>
        </div>`:''}
    </div>`;
  }
  return`
    <div class="ph"><div class="pt">Календарь ${y}</div>
      <div class="ps">Нажмите на день — увидите детали и сможете добавить отпуск</div></div>
    <div class="cal-year-nav">
      <button class="cnbtn" onclick="S.calYear--;render()">← ${y-1}</button>
      <div class="cal-year-val">${y}</div>
      <button class="cnbtn" onclick="S.calYear++;render()">${y+1} →</button>
    </div>

      <div class="li"><div class="ld" style="background:rgba(79,142,247,.4)"></div>Сегодня</div>
      <div class="li"><div class="ld" style="background:rgba(247,196,79,.4)"></div>Праздник РК</div>

    pptx:'📊',dat:'💾',txt:'📋',csv:'📊',png:'🖼',jpg:'🖼',jpeg:'🖼',zip:'📦',rar:'📦'};
  const fItem=([id,f],canDel)=>{
    const ext=(f.name.split('.').pop()||'').toLowerCase();
    const mem=S.members[f.memberId]||{name:''};
    return`<div class="fitem">
      <div class="fico">${ICONS[ext]||'📎'}</div>
      <div class="fi"><div class="fn">${escH(f.name)}</div>
        <div class="fm">${escH(mem.name)} · ${f.date} · ${f.size}</div></div>
      ${canDel?`<button class="fdel" onclick="delF('${id}')">🗑</button>`:''}
    </div>`;
  };
  return`
    <div class="ph"><div class="pt">Файлы</div><div class="ps">Документы, отчёты, модели отдела</div></div>
    <div class="upzone" onclick="document.getElementById('fi').click()">
      <div class="upico">📁</div>
      <div class="upt">Перетащите или <span>выберите файл</span></div>
      <div style="font-size:11px;color:var(--t3);margin-top:3px">PDF, XLSX, DOCX, DAT, CSV и другие</div>
      <input type="file" id="fi" style="display:none" onchange="upF(event)" multiple>
    </div>
    <div style="font-size:10px;color:var(--t3);letter-spacing:1px;margin-bottom:.5rem">МОИ ФАЙЛЫ (${myF.length})</div>
    ${myF.length?`<div class="flist">${myF.map(f=>fItem(f,true)).join('')}</div>`
      :'<div class="empty">Вы ещё не загружали файлы</div>'}
    ${tmF.length?`
      <div class="sep"></div>
      <div style="font-size:10px;color:var(--t3);letter-spacing:1px;margin-bottom:.5rem">ФАЙЛЫ КОМАНДЫ (${tmF.length})</div>
      <div class="flist">${tmF.map(f=>fItem(f,false)).join('')}</div>`:''}`;
}

/* ─── DM CHAT ─── */
function renderDMLayout(){
  const others=membersArray().filter(m=>m.id!==S.currentUser.id);
  const sidebar=others.map(m=>{
    const key=dmKey(S.currentUser.id,m.id);
    const msgs=Object.values(S.dms[key]||{});
    msgs.sort((a,b)=>a.ts-b.ts);
    const last=msgs[msgs.length-1];
    const uc=msgs.filter(msg=>msg.from!==S.currentUser.id&&!msg.read).length;
    return`<div class="dm-item ${S.activeDM===m.id?'active':''}" onclick="openDM('${m.id}')">
      <div class="dm-av" style="background:${hexA(m.color,.12)};color:${m.color};border-color:${hexA(m.color,.35)}">${ini(m.name)}</div>
      <div class="dm-info">
        <div class="dm-name">${escH(m.name)}</div>
        <div class="dm-last">${last?(last.from===S.currentUser.id?'Вы: ':'')+escH(last.text.slice(0,26))+'…':'Нет сообщений'}</div>
      </div>
      ${uc>0?`<div class="dm-badge">${uc}</div>`:''}
    </div>`;
  }).join('');

  let main='';
  if(S.activeDM){
    const peer=S.members[S.activeDM];
    if(peer){
      const key=dmKey(S.currentUser.id,peer.id);
      const msgs=Object.values(S.dms[key]||{});
      msgs.sort((a,b)=>a.ts-b.ts);
      // mark as read
      msgs.forEach(msg=>{
        if(msg.from!==S.currentUser.id&&!msg.read&&msg._key){
          fbUpdate(`dms/${key}/${msg._key}`,{read:true});
        }
      });
      main=`<div class="chat-main">
        <div class="chat-hdr">
          <div class="chat-hdr-av" style="background:${hexA(peer.color,.12)};color:${peer.color};border-color:${hexA(peer.color,.35)}">${ini(peer.name)}</div>
          <div><div class="chat-hdr-name">${escH(peer.name)}</div><div class="chat-hdr-sub">${escH(peer.role)}</div></div>
        </div>
        <div class="messages" id="msgs">
          ${msgs.length?msgs.map(msg=>{
            const isMe=msg.from===S.currentUser.id;
            const sender=isMe?S.currentUser:peer;
            return`<div class="msg ${isMe?'me':''}">
              <div class="msg-av" style="background:${hexA(sender.color,.12)};color:${sender.color};border-color:${hexA(sender.color,.3)}">${ini(sender.name)}</div>
              <div>
                <div class="msg-meta">${isMe?'Вы':escH(peer.name.split(' ')[0])} · ${msg.time}</div>
                <div class="msg-bubble">${escH(msg.text)}</div>
              </div>
            </div>`;
          }).join(''):`<div class="empty" style="margin:auto">Начните диалог с ${escH(peer.name.split(' ')[0])} 👋</div>`}
        </div>
        <div class="chat-input-bar">
          <input class="chat-input" id="cinput" placeholder="Написать ${escA(peer.name.split(' ')[0])}..."
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendDM('${peer.id}')}">
          <button class="chat-send" onclick="sendDM('${peer.id}')">Отправить →</button>
        </div>
      </div>`;
    }
  } else {
    main=`<div class="no-chat">
      <span style="font-size:40px">💬</span>
      <span>Выберите коллегу для личного диалога</span>
      <span style="font-size:12px;color:var(--t3)">Сообщения хранятся в общей базе данных</span>
    </div>`;
  }
  return`<div class="chat-layout"><div class="dm-sidebar">
    <div class="dm-head">ЛИЧНЫЕ СООБЩЕНИЯ</div>${sidebar}</div>${main}</div>`;
}

/* ─── PROFILE ─── */
function renderProfile(){
  const me=S.members[S.currentUser.id];
  if(!me)return`<div class="empty">Профиль не найден</div>`;
  return`
    <div class="ph"><div class="pt">Мой профиль</div><div class="ps">Личная информация и настройки</div></div>
    <div class="pcard">
      <div class="ptop">
        <div class="pav" style="background:${hexA(me.color,.12)};border:3px solid ${hexA(me.color,.45)};color:${me.color}">${ini(me.name)}</div>
        <div style="flex:1">
          <div class="pname">${escH(me.name)}</div>
          <div class="prole">${escH(me.role)}</div>
          <div class="pemail">${escH(me.email)}</div>
          ${me.project?`<div style="margin-top:6px;display:inline-flex;align-items:center;gap:5px;
            background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.25);
            border-radius:6px;padding:4px 9px;font-size:12px;color:var(--purple)">⚙ ${escH(me.project)}</div>`:''}
        </div>
        <button class="btedit" onclick="toggleEdit()">✏ Редактировать</button>
      </div>
      ${S.editingProfile?renderEditForm(me):''}
    </div>
    <div class="pcard">
      <div style="font-size:10px;color:var(--t3);letter-spacing:1px;margin-bottom:.75rem">ИНФОРМАЦИЯ</div>
      <div class="igrid">
        <div class="iitem"><div class="il">ОТДЕЛ</div><div class="iv">Reservoir Simulation</div></div>
        <div class="iitem"><div class="il">В КОМПАНИИ С</div><div class="iv">${escH(me.joined||'—')}</div></div>
        <div class="iitem"><div class="il">ТЕЛЕФОН</div><div class="iv">${escH(me.phone||'—')}</div></div>
        <div class="iitem"><div class="il">СТАТУС</div><div class="iv" style="color:var(--green)">● Активен</div></div>
        ${me.birthday?`<div class="iitem"><div class="il">ДЕНЬ РОЖДЕНИЯ</div><div class="iv">${fmtDate(me.birthday)}</div></div>`:''}
        ${me.family?`<div class="iitem"><div class="il">СЕМЕЙНЫЙ СТАТУС</div><div class="iv">${escH(me.family)}</div></div>`:''}
      </div>
      <div class="sep"></div>
      <div style="font-size:10px;color:var(--t3);letter-spacing:1px;margin-bottom:.5rem">НАВЫКИ</div>
      <div class="mtags">
        ${(me.skills||[]).map(s=>`<span class="tag skill">${escH(s)}</span>`).join('')
          ||`<span style="color:var(--t3);font-size:13px">Не указаны</span>`}
      </div>
      ${me.bio?`<div class="sep"></div>
        <div style="font-size:10px;color:var(--t3);letter-spacing:1px;margin-bottom:.5rem">О СЕБЕ</div>
        <p style="font-size:13px;color:var(--t2);line-height:1.7">${escH(me.bio)}</p>`:''}
    </div>`;
}

function renderEditForm(me){return`
  <div style="border-top:1px solid var(--border);padding-top:1.125rem">
    <div class="form-section" style="margin-top:0">КОНТАКТЫ</div>
    <div class="row2">
      <div class="fg"><label>ТЕЛЕФОН</label><input type="tel" id="ep" value="${escA(me.phone||'')}"></div>
      <div class="fg"><label>ГОД НАЧАЛА РАБОТЫ</label><input type="text" id="ej" value="${escA(me.joined||'')}"></div>
    </div>
    <div class="form-section">ЛИЧНОЕ</div>
    <div class="row2">
      <div class="fg"><label>ДАТА РОЖДЕНИЯ</label><input type="date" id="ebday" value="${me.birthday||''}"></div>
      <div class="fg"><label>СЕМЕЙНЫЙ СТАТУС</label>
        <select id="efam">
          <option value="" ${!me.family?'selected':''}>Не указано</option>
          <option value="Холост / не замужем" ${me.family==='Холост / не замужем'?'selected':''}>Холост / не замужем</option>
          <option value="Женат / замужем" ${me.family==='Женат / замужем'?'selected':''}>Женат / замужем</option>
          <option value="Разведён / разведена" ${me.family==='Разведён / разведена'?'selected':''}>Разведён / разведена</option>
          <option value="Помолвлен / помолвлена" ${me.family==='Помолвлен / помолвлена'?'selected':''}>Помолвлен / помолвлена</option>
        </select>
      </div>
    </div>
    <div class="form-section">РАБОЧЕЕ</div>
    <div class="fg"><label>ТЕКУЩИЙ ПРОЕКТ / ЧЕМ ЗАНЯТ</label>
      <input type="text" id="eproj" value="${escA(me.project||'')}" placeholder="Адаптация модели пласта..."></div>
    <div class="fg"><label>НАВЫКИ (через запятую)</label>
      <input type="text" id="es" value="${escA((me.skills||[]).join(', '))}"></div>
    <div class="fg"><label>О СЕБЕ</label>
      <textarea id="eb" rows="3">${me.bio||''}</textarea></div>
    <button class="btn" onclick="saveProf()">Сохранить изменения</button>
  </div>`
}

/* ══════════════════════════════════
   ACTIONS
══════════════════════════════════ */
window.setAt = t=>{ S.authTab=t; render(); };
window.gp = p=>{ S.page=p; S.notifOpen=false; S.modalMemberId=null; S.editingProfile=false; render(); if(p==='chat')setTimeout(scrollMsgs,80); };
window.logout = ()=>{ S.currentUser=null; S.page='auth'; render(); };
window.openM = id=>{ S.modalMemberId=id; render(); };
window.closeM = ()=>{ S.modalMemberId=null; render(); };
window.toggleEdit = ()=>{ S.editingProfile=!S.editingProfile; render(); };
window.toggleNotif = ()=>{ S.notifOpen=!S.notifOpen; if(S.notifOpen){(S.notifications||[]).forEach(n=>n.read=true);}render(); };
window.clearNotifs = ()=>{ S.notifications=[]; render(); };
window.selectDay = ds=>{ S.selectedDay=S.selectedDay===ds?null:ds; render(); };
window.openDM = id=>{ S.activeDM=id; S.page='chat'; S.modalMemberId=null; render(); setTimeout(scrollMsgs,80); };

window.doLogin = async()=>{
  const email=(document.getElementById('le')||{}).value||'';
  if(!email){showToast('Введите email',true);return}
  const btn=document.getElementById('login-btn');
  if(btn){btn.disabled=true;btn.textContent='Проверяем...';}
  const members=await fbGet('members');
  if(members){
    const found=Object.values(members).find(m=>m.email===email.trim());
    if(found){
      S.currentUser=found; S.page='team';
      startListeners(); render(); return;
    }
  }
  showToast('Email не найден. Зарегистрируйтесь',true);
  if(btn){btn.disabled=false;btn.textContent='Войти в систему';}
};

window.doReg = async()=>{
  const fn=(document.getElementById('rf')||{}).value||'';
  const ln=(document.getElementById('rl')||{}).value||'';
  const em=(document.getElementById('re')||{}).value||'';
  const ro=(document.getElementById('rr')||{}).value||'';
  const ph=(document.getElementById('rph')||{}).value||'';
  const p=(document.getElementById('rp')||{}).value||'';
  const p2=(document.getElementById('rp2')||{}).value||'';
  const bday=(document.getElementById('rbday')||{}).value||'';
  const fam=(document.getElementById('rfam')||{}).value||'';
  const join=(document.getElementById('rjoin')||{}).value||String(new Date().getFullYear());
  const proj=(document.getElementById('rproj')||{}).value||'';
  const skills=(document.getElementById('rskills')||{}).value||'';
  const bio=(document.getElementById('rbio')||{}).value||'';
  if(!fn||!ln||!em){showToast('Заполните имя, фамилию и email',true);return}
  if(p&&p!==p2){showToast('Пароли не совпадают',true);return}
  const btn=document.getElementById('reg-btn');
  if(btn){btn.disabled=true;btn.textContent='Сохраняем...';}
  // check duplicate email
  const existing=await fbGet('members');
  if(existing){
    const dup=Object.values(existing).find(m=>m.email===em.trim());
    if(dup){S.currentUser=dup;S.page='team';startListeners();render();return;}
  }
  const colorIdx=existing?Object.keys(existing).length%COLORS.length:0;
  const id='m_'+Date.now();
  const nm={id,name:`${fn.trim()} ${ln.trim()}`,role:ro.trim()||'Сотрудник',
    email:em.trim(),phone:ph.trim(),joined:join.trim(),
    skills:skills?skills.split(',').map(s=>s.trim()).filter(Boolean):[],
    bio:bio.trim(),color:COLORS[colorIdx],birthday:bday,family:fam,project:proj.trim()};
  await fbSet(`members/${id}`, nm);
  S.currentUser=nm; S.page='team';
  startListeners(); showToast('Аккаунт создан!'); render();
};

window.saveProf = async()=>{
  const me=S.members[S.currentUser.id];if(!me)return;
  const updates={
    phone:(document.getElementById('ep')||{}).value||me.phone,
    joined:(document.getElementById('ej')||{}).value||me.joined,
    birthday:(document.getElementById('ebday')||{}).value||'',
    family:(document.getElementById('efam')||{}).value||'',
    project:(document.getElementById('eproj')||{}).value||'',
    bio:(document.getElementById('eb')||{}).value||'',
  };
  const sk=(document.getElementById('es')||{}).value||'';
  updates.skills=sk?sk.split(',').map(s=>s.trim()).filter(Boolean):me.skills;
  await fbUpdate(`members/${me.id}`, updates);
  S.currentUser={...S.currentUser,...updates};
  S.editingProfile=false; showToast('Профиль сохранён!'); render();
};

window.saveVacFromDay = async(from)=>{
  const toEl=document.getElementById('vto-q');
  const to=toEl?toEl.value:from;
  if(!to||to<from){showToast('Выберите корректную конечную дату',true);return}
  const vac={memberId:S.currentUser.id,from,to,ts:Date.now()};
  await fbPush('vacations', vac);
  showToast('Отпуск добавлен!'); S.selectedDay=null; render();
};

window.sendDM = async(peerId)=>{
  const input=document.getElementById('cinput');
  const text=(input?.value||'').trim();if(!text)return;
  const key=dmKey(S.currentUser.id,peerId);
  const msg={from:S.currentUser.id,text,ts:Date.now(),
    time:new Date().toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'}),read:false};
  await fbPush(`dms/${key}`, msg);
  if(input)input.value='';
  setTimeout(()=>{scrollMsgs();document.getElementById('cinput')?.focus()},50);
};

window.upF = async(e)=>{
  const files=e.target.files;if(!files.length)return;
  for(const f of Array.from(files)){
    const meta={name:f.name,memberId:S.currentUser.id,
      date:new Date().toLocaleDateString('ru'),
      size:f.size>1048576?(f.size/1048576).toFixed(1)+' МБ':Math.round(f.size/1024)+' КБ',
      ts:Date.now()};
    await fbPush('files', meta);
  }
  showToast(`Загружено: ${files.length} файл(ов)`); render();
};

window.delF = async(id)=>{
  await remove(fbRef(`files/${id}`));
  showToast('Файл удалён');
};

/* ══════════════════════════════════
   INIT
══════════════════════════════════ */
S.page='loading'; render();

// Check if user was logged in (use sessionStorage so login persists only in tab)
const savedUser = sessionStorage.getItem('rs_user');
if(savedUser){
  try{
    S.currentUser=JSON.parse(savedUser);
    S.page='team';
    startListeners();
    render();
  }catch{
    S.page='auth'; render();
  }
} else {
  S.page='auth'; render();
}

// Save current user to session on login
const _origLogin=window.doLogin;
window.doLogin=async()=>{
  await _origLogin();
  if(S.currentUser) sessionStorage.setItem('rs_user',JSON.stringify(S.currentUser));
};
const _origReg=window.doReg;
window.doReg=async()=>{
  await _origReg();
  if(S.currentUser) sessionStorage.setItem('rs_user',JSON.stringify(S.currentUser));
};
window.logout=()=>{
  sessionStorage.removeItem('rs_user');
  S.currentUser=null; S.page='auth'; render();
};

document.addEventListener('click',e=>{
  if(S.notifOpen&&!e.target.closest('#npanel')&&!e.target.closest('.notif-btn')){
    S.notifOpen=false;render();
  }
});
</script>
</body>
